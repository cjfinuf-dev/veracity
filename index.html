function BalanceSheetView() {
  const theme = TOOL_THEMES.rptBs;
  const glEntries = React.useMemo(() => { try { return JSON.parse(localStorage.getItem(GL_STORAGE_KEY)) || []; } catch { return []; } }, []);
  const [asOfDate, setAsOfDate] = React.useState(new Date().toISOString().slice(0, 10));
  const [compareDate, setCompareDate] = React.useState('');
  const dark = useDarkMode();
  const fmt = (n) => { const neg = n < 0; return (neg ? '(' : '') + '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + (neg ? ')' : ''); };

  const computeTotals = (cutoff) => {
    const filtered = glEntries.filter(e => e.date <= cutoff);
    const acctTotals = {};
    filtered.forEach(e => {
      (e.entries || []).forEach(l => {
        if (!acctTotals[l.account]) acctTotals[l.account] = { debit: 0, credit: 0 };
        acctTotals[l.account].debit += l.debit || 0;
        acctTotals[l.account].credit += l.credit || 0;
      });
    });
    const assetCats = ['Current Assets', 'Fixed Assets', 'Other Assets'];
    const liabCats = ['Current Liabilities', 'Long-Term Liabilities'];
    const sections = { assets: {}, liabilities: {}, equity: {} };
    assetCats.forEach(c => sections.assets[c] = []);
    liabCats.forEach(c => sections.liabilities[c] = []);
    sections.equity['Equity'] = [];

    Object.entries(acctTotals).forEach(([account, t]) => {
      const info = getAllAccounts().find(a => a.account === account) || { category: 'Other' };
      const stmt = COA_STATEMENT_MAP[info.category];
      if (stmt !== 'Balance Sheet') return;
      const balance = t.debit - t.credit;
      const row = { account, category: info.category, balance };
      if (assetCats.includes(info.category)) sections.assets[info.category].push(row);
      else if (liabCats.includes(info.category)) sections.liabilities[info.category].push(row);
      else if (info.category === 'Equity') sections.equity['Equity'].push(row);
    });

    let netIncome = 0;
    Object.entries(acctTotals).forEach(([account, t]) => {
      const info = getAllAccounts().find(a => a.account === account) || { category: 'Other' };
      const stmt = COA_STATEMENT_MAP[info.category];
      if (stmt === 'Income Statement') {
        if (info.category === 'Revenue') netIncome += (t.credit - t.debit);
        else netIncome -= (t.debit - t.credit);
      }
    });

    const totalAssets = Object.values(sections.assets).flat().reduce((s, r) => s + r.balance, 0);
    const totalLiabilities = Object.values(sections.liabilities).flat().reduce((s, r) => s + Math.abs(r.balance), 0);
    const totalEquity = sections.equity['Equity'].reduce((s, r) => s + Math.abs(r.balance), 0) + netIncome;
    return { sections, netIncome, totalAssets, totalLiabilities, totalEquity };
  };

  const current = computeTotals(asOfDate);
  const prior = compareDate ? computeTotals(compareDate) : null;
  const hasCompare = !!prior;
  const cols = hasCompare ? '2fr 1fr 1fr 1fr' : '2fr 1fr';

  const selStyle = {padding:'6px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface2)' : '#fff', color:'var(--text)', fontSize:13};

  const getPriorBalance = (sectionKey, account) => {
    if (!prior) return 0;
    const allRows = Object.values(prior.sections[sectionKey]).flat();
    const match = allRows.find(r => r.account === account);
    return match ? match.balance : 0;
  };

  const renderSubcategory = (catName, rows, sectionKey) => {
    if (rows.length === 0) return null;
    const sorted = [...rows].sort((a, b) => a.account.localeCompare(b.account));
    const subtotal = rows.reduce((s, r) => s + r.balance, 0);
    const priorSubtotal = hasCompare ? rows.reduce((s, r) => s + getPriorBalance(sectionKey, r.account), 0) : 0;
    return (
      <React.Fragment key={catName}>
        <div style={{padding:'8px 16px 4px', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', textTransform:'uppercase', letterSpacing:1}}>{catName}</div>
        {sorted.map(r => {
          const pb = hasCompare ? getPriorBalance(sectionKey, r.account) : 0;
          const displayBal = sectionKey === 'assets' ? r.balance : Math.abs(r.balance);
          const displayPrior = sectionKey === 'assets' ? pb : Math.abs(pb);
          return (
            <div key={r.account} style={{display:'grid', gridTemplateColumns:cols, gap:0, padding:'6px 16px 6px 32px', borderBottom:'1px solid var(--border)', fontSize:13}}>
              <span style={{color:'var(--brand-tan)'}}>{r.account}</span>
              <span style={{textAlign:'right', fontWeight:500, color:'var(--text)'}}>{fmt(displayBal)}</span>
              {hasCompare && <span style={{textAlign:'right', fontWeight:500, color:'var(--text-muted)'}}>{fmt(displayPrior)}</span>}
              {hasCompare && <span style={{textAlign:'right', fontWeight:500, color: (displayBal - displayPrior) >= 0 ? 'var(--forest-green)' : '#ef4444'}}>{fmt(displayBal - displayPrior)}</span>}
            </div>
          );
        })}
        <div style={{display:'grid', gridTemplateColumns:cols, gap:0, padding:'6px 16px 6px 32px', borderBottom:'1px solid var(--border)', fontSize:12, fontWeight:600}}>
          <span style={{color:'var(--charcoal-slate)'}}>Total {catName}</span>
          <span style={{textAlign:'right', color:'var(--charcoal-slate)'}}>{fmt(sectionKey === 'assets' ? subtotal : Math.abs(subtotal))}</span>
          {hasCompare && <span style={{textAlign:'right', color:'var(--text-muted)'}}>{fmt(sectionKey === 'assets' ? priorSubtotal : Math.abs(priorSubtotal))}</span>}
          {hasCompare && (() => { const cv = sectionKey === 'assets' ? subtotal : Math.abs(subtotal); const pv = sectionKey === 'assets' ? priorSubtotal : Math.abs(priorSubtotal); return <span style={{textAlign:'right', color: (cv-pv) >= 0 ? 'var(--forest-green)' : '#ef4444'}}>{fmt(cv-pv)}</span>; })()}
        </div>
      </React.Fragment>
    );
  };

  const renderSection = (title, sectionData, sectionKey) => (
    <div style={{marginBottom:4}}>
      <div style={{padding:'10px 16px', fontSize:13, fontWeight:700, color:'var(--charcoal-slate)', textTransform:'uppercase', letterSpacing:1, borderBottom:'2px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>{title}</div>
      {Object.values(sectionData).every(rows => rows.length === 0) ? (
        <div style={{padding:16, color:'var(--text-muted)', fontSize:12}}>No accounts with balances.</div>
      ) : Object.entries(sectionData).map(([cat, rows]) => renderSubcategory(cat, rows, sectionKey))}
    </div>
  );

  const exportCSV = () => {
    const rows = [hasCompare ? ['Account','Category','Current','Prior','Variance'] : ['Account','Category','Balance']];
    const addSection = (title, sectionData, sectionKey) => {
      rows.push([`--- ${title} ---`]);
      Object.entries(sectionData).forEach(([cat, accts]) => {
        accts.sort((a, b) => a.account.localeCompare(b.account)).forEach(r => {
          const bal = sectionKey === 'assets' ? r.balance : Math.abs(r.balance);
          if (hasCompare) {
            const pb = getPriorBalance(sectionKey, r.account);
            const pbal = sectionKey === 'assets' ? pb : Math.abs(pb);
            rows.push([r.account, cat, bal.toFixed(2), pbal.toFixed(2), (bal - pbal).toFixed(2)]);
          } else {
            rows.push([r.account, cat, bal.toFixed(2)]);
          }
        });
      });
    };
    addSection('Assets', current.sections.assets, 'assets');
    rows.push(hasCompare ? ['Total Assets','', current.totalAssets.toFixed(2), prior.totalAssets.toFixed(2), (current.totalAssets-prior.totalAssets).toFixed(2)] : ['Total Assets','', current.totalAssets.toFixed(2)]);
    addSection('Liabilities', current.sections.liabilities, 'liabilities');
    addSection('Equity', current.sections.equity, 'equity');
    if (current.netIncome !== 0) rows.push(hasCompare ? ['Net Income (Current Period)','Equity', current.netIncome.toFixed(2), prior.netIncome.toFixed(2), (current.netIncome-prior.netIncome).toFixed(2)] : ['Net Income (Current Period)','Equity', current.netIncome.toFixed(2)]);
    rows.push(hasCompare ? ['Total Liabilities + Equity','', (current.totalLiabilities+current.totalEquity).toFixed(2), (prior.totalLiabilities+prior.totalEquity).toFixed(2), ((current.totalLiabilities+current.totalEquity)-(prior.totalLiabilities+prior.totalEquity)).toFixed(2)] : ['Total Liabilities + Equity','', (current.totalLiabilities+current.totalEquity).toFixed(2)]);
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Balance_Sheet_${asOfDate}.csv`; a.click();
  };

  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Balance Sheet</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
        <label style={{fontSize:12, fontWeight:600, color:'var(--charcoal-slate)'}}>As of:</label>
        <input type="date" value={asOfDate} onChange={e => setAsOfDate(e.target.value)} style={{...selStyle, padding:'4px 8px'}} />
        <label style={{fontSize:12, fontWeight:600, color:'var(--charcoal-slate)', marginLeft:12}}>Compare to:</label>
        <input type="date" value={compareDate} onChange={e => setCompareDate(e.target.value)} style={{...selStyle, padding:'4px 8px'}} />
        {compareDate && <button onClick={() => setCompareDate('')} style={{background:'none', border:'none', color:'#ef4444', fontSize:11, cursor:'pointer', fontWeight:600}}>Clear</button>}
        <div style={{marginLeft:'auto', display:'flex', gap:6, alignItems:'center'}}>
          <TableIO data={(() => { const r = []; const add = (title, secs, sk) => { Object.entries(secs).forEach(([cat, accts]) => accts.sort((a,b) => a.account.localeCompare(b.account)).forEach(a => { const bal = sk==='assets' ? a.balance : Math.abs(a.balance); r.push({Section:title, Account:a.account, Category:cat, Balance:bal}); })); }; add('Assets', current.sections.assets, 'assets'); add('Liabilities', current.sections.liabilities, 'liabilities'); add('Equity', current.sections.equity, 'equity'); return r; })()} filename={`Balance_Sheet_${asOfDate}`} />
          <button onClick={() => window.print()} style={{background:'none', border:'1px solid var(--border)', color:'var(--charcoal-slate)', borderRadius:'var(--radius-sm)', padding:'6px 12px', fontSize:12, cursor:'pointer', fontWeight:600}}>Print</button>
        </div>
      </div>
      {hasCompare && (
        <div style={{display:'grid', gridTemplateColumns:cols, gap:0, padding:'8px 16px', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', textTransform:'uppercase', letterSpacing:0.5, borderBottom:'2px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb', borderRadius:'var(--radius-md) var(--radius-md) 0 0', border:'1px solid var(--border)'}}>
          <span>Account</span><span style={{textAlign:'right'}}>{asOfDate}</span><span style={{textAlign:'right'}}>{compareDate}</span><span style={{textAlign:'right'}}>Variance</span>
        </div>
      )}
      <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius: hasCompare ? '0 0 var(--radius-md) var(--radius-md)' : 'var(--radius-md)', overflow:'hidden'}}>
        {renderSection('Assets', current.sections.assets, 'assets')}
        <div style={{display:'grid', gridTemplateColumns:cols, padding:'10px 16px', fontWeight:700, fontSize:13, borderBottom:'2px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
          <span style={{color:'var(--brand-tan)'}}>Total Assets</span>
          <span style={{textAlign:'right', color:'var(--brand-tan)'}}>{fmt(current.totalAssets)}</span>
          {hasCompare && <span style={{textAlign:'right', color:'var(--text-muted)'}}>{fmt(prior.totalAssets)}</span>}
          {hasCompare && <span style={{textAlign:'right', color: (current.totalAssets - prior.totalAssets) >= 0 ? 'var(--forest-green)' : '#ef4444'}}>{fmt(current.totalAssets - prior.totalAssets)}</span>}
        </div>
        {renderSection('Liabilities', current.sections.liabilities, 'liabilities')}
        {renderSection('Equity', current.sections.equity, 'equity')}
        {current.netIncome !== 0 && (
          <div style={{display:'grid', gridTemplateColumns:cols, padding:'8px 16px 8px 32px', borderBottom:'1px solid var(--border)', fontSize:13}}>
            <span style={{color:'var(--copper)', fontStyle:'italic'}}>Net Income (Current Period)</span>
            <span style={{textAlign:'right', fontWeight:500, color:'var(--text)'}}>{fmt(current.netIncome)}</span>
            {hasCompare && <span style={{textAlign:'right', fontWeight:500, color:'var(--text-muted)'}}>{fmt(prior.netIncome)}</span>}
            {hasCompare && <span style={{textAlign:'right', fontWeight:500, color: (current.netIncome - prior.netIncome) >= 0 ? 'var(--forest-green)' : '#ef4444'}}>{fmt(current.netIncome - prior.netIncome)}</span>}
          </div>
        )}
        <div style={{display:'grid', gridTemplateColumns:cols, padding:'10px 16px', fontWeight:700, fontSize:13, borderBottom:'2px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
          <span style={{color:'var(--brand-tan)'}}>Total Liabilities + Equity</span>
          <span style={{textAlign:'right', color:'var(--brand-tan)'}}>{fmt(current.totalLiabilities + current.totalEquity)}</span>
          {hasCompare && <span style={{textAlign:'right', color:'var(--text-muted)'}}>{fmt(prior.totalLiabilities + prior.totalEquity)}</span>}
          {hasCompare && <span style={{textAlign:'right', color: ((current.totalLiabilities+current.totalEquity) - (prior.totalLiabilities+prior.totalEquity)) >= 0 ? 'var(--forest-green)' : '#ef4444'}}>{fmt((current.totalLiabilities+current.totalEquity) - (prior.totalLiabilities+prior.totalEquity))}</span>}
        </div>
        <div style={{padding:'12px 16px', fontSize:12, fontWeight:600, color: Math.abs(current.totalAssets - (current.totalLiabilities + current.totalEquity)) < 0.01 ? 'var(--forest-green)' : '#ef4444'}}>
          {Math.abs(current.totalAssets - (current.totalLiabilities + current.totalEquity)) < 0.01 ? 'A = L + E — Balanced' : `Out of balance by ${fmt(current.totalAssets - (current.totalLiabilities + current.totalEquity))}`}
        </div>
      </div>
    </div>
  );
}

function IncomeStatementView() {
  const theme = TOOL_THEMES.rptIs;
  const glEntries = React.useMemo(() => { try { return JSON.parse(localStorage.getItem(GL_STORAGE_KEY)) || []; } catch { return []; } }, []);
  const [dateFrom, setDateFrom] = React.useState('');
  const [dateTo, setDateTo] = React.useState('');
  const dark = useDarkMode();
  const fmt = (n) => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const filtered = glEntries.filter(e => {
    if (dateFrom && e.date < dateFrom) return false;
    if (dateTo && e.date > dateTo) return false;
    return true;
  });

  const accountTotals = {};
  filtered.forEach(e => {
    (e.entries || []).forEach(l => {
      if (!accountTotals[l.account]) accountTotals[l.account] = { debit: 0, credit: 0 };
      accountTotals[l.account].debit += l.debit || 0;
      accountTotals[l.account].credit += l.credit || 0;
    });
  });

  const sections = { revenue: [], cogs: [], opex: [] };
  Object.entries(accountTotals).forEach(([account, t]) => {
    const info = getAllAccounts().find(a => a.account === account) || { category: 'Other' };
    if (COA_STATEMENT_MAP[info.category] !== 'Income Statement') return;
    if (info.category === 'Revenue') sections.revenue.push({ account, amount: t.credit - t.debit });
    else if (info.category === 'Cost of Goods Sold') sections.cogs.push({ account, amount: t.debit - t.credit });
    else if (info.category === 'Operating Expenses') sections.opex.push({ account, amount: t.debit - t.credit });
  });

  const totalRevenue = sections.revenue.reduce((s, r) => s + r.amount, 0);
  const totalCOGS = sections.cogs.reduce((s, r) => s + r.amount, 0);
  const grossProfit = totalRevenue - totalCOGS;
  const totalOpex = sections.opex.reduce((s, r) => s + r.amount, 0);
  const netIncome = grossProfit - totalOpex;

  const selStyle = {padding:'6px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface2)' : '#fff', color:'var(--text)', fontSize:13};

  const renderSection = (title, rows) => (
    <>
      <div style={{padding:'10px 16px', fontSize:11, fontWeight:700, color:'var(--rust)', textTransform:'uppercase', letterSpacing:1}}>{title}</div>
      {rows.sort((a, b) => a.account.localeCompare(b.account)).map(r => (
        <div key={r.account} style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:0, padding:'6px 16px', borderBottom:'1px solid var(--border)', fontSize:13}}>
          <span style={{color:'var(--brand-tan)'}}>{r.account}</span>
          <span style={{textAlign:'right', color:'var(--text)'}}>{r.amount < 0 ? '(' : ''}{fmt(r.amount)}{r.amount < 0 ? ')' : ''}</span>
        </div>
      ))}
    </>
  );

  const subtotalRow = (label, value, color) => (
    <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', padding:'10px 16px', fontWeight:700, fontSize:13, borderTop:'2px solid var(--border)', borderBottom:'2px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
      <span style={{color: color || 'var(--rust)'}}>{label}</span>
      <span style={{textAlign:'right', color: value >= 0 ? (color || 'var(--brand-tan)') : '#ef4444'}}>{value < 0 ? '(' : ''}{fmt(value)}{value < 0 ? ')' : ''}</span>
    </div>
  );

  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Income Statement</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
        <label style={{fontSize:12, fontWeight:600, color:'var(--charcoal-slate)'}}>Period:</label>
        <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{...selStyle, padding:'4px 8px'}} />
        <span style={{fontSize:12, color:'var(--text-muted)'}}>to</span>
        <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{...selStyle, padding:'4px 8px'}} />
        {(dateFrom || dateTo) && <button onClick={() => { setDateFrom(''); setDateTo(''); }} style={{background:'none', border:'none', color:'#ef4444', fontSize:11, cursor:'pointer', fontWeight:600}}>Clear</button>}
        <div style={{marginLeft:'auto'}}><TableIO data={[...sections.revenue.map(r => ({Section:'Revenue', Account:r.account, Amount:r.amount})), ...sections.cogs.map(r => ({Section:'COGS', Account:r.account, Amount:r.amount})), ...sections.opex.map(r => ({Section:'Operating Expenses', Account:r.account, Amount:r.amount}))]} filename={`Income_Statement_${new Date().toISOString().slice(0,10)}`} /></div>
      </div>
      <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
        {sections.revenue.length > 0 && renderSection('Revenue', sections.revenue)}
        {subtotalRow('Total Revenue', totalRevenue, 'var(--brand-tan)')}
        {sections.cogs.length > 0 && renderSection('Cost of Goods Sold', sections.cogs)}
        {sections.cogs.length > 0 && subtotalRow('Gross Profit', grossProfit, 'var(--copper)')}
        {sections.opex.length > 0 && renderSection('Operating Expenses', sections.opex)}
        {subtotalRow('Net Income', netIncome, netIncome >= 0 ? 'var(--brand-tan)' : '#ef4444')}
        {filtered.length === 0 && <div style={{padding:30, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>No transactions recorded yet.</div>}
      </div>
    </div>
  );
}

function CashFlowView() {
  const theme = TOOL_THEMES.rptCf;
  const dark = useDarkMode();
  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Cash Flow Statement</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />

      {(() => {
        const [startDate, setStartDate] = React.useState(() => {
          const d = new Date(); d.setDate(1); return d.toISOString().slice(0,10);
        });
        const [endDate, setEndDate] = React.useState(() => new Date().toISOString().slice(0,10));

        const glEntries = React.useMemo(() => {
          try { return JSON.parse(localStorage.getItem(GL_STORAGE_KEY) || '[]'); }
          catch { return []; }
        }, []);

        const classifyCashFlowActivity = (account) => {
          const num = parseInt(account.match(/^\d+/)?.[0] || '0');
          if (num >= 4000 && num <= 6999) return 'operating';
          if (num >= 1200 && num <= 1299) return 'investing';
          if (num >= 1400 && num <= 1699) return 'investing';
          if (num >= 2300 && num <= 2499) return 'financing';
          if (num >= 3000 && num <= 3999) return 'financing';
          if (account.includes('1100') || account.includes('Accounts Receivable')) return 'operating';
          if (account.includes('2000') || account.includes('Accounts Payable')) return 'operating';
          if (account.includes('1300') || account.includes('Inventory')) return 'operating';
          return 'operating';
        };

        const computeCashFlow = () => {
          const filtered = glEntries.filter(e => e.date >= startDate && e.date <= endDate);
          const activities = { operating: [], investing: [], financing: [] };
          const accountTotals = {};

          filtered.forEach(entry => {
            (entry.entries || []).forEach(line => {
              const activity = classifyCashFlowActivity(line.account);
              const amount = (line.debit || 0) - (line.credit || 0);
              if (!accountTotals[line.account]) accountTotals[line.account] = { account: line.account, amount: 0, activity };
              accountTotals[line.account].amount += amount;
            });
          });

          Object.values(accountTotals).forEach(item => {
            if (Math.abs(item.amount) > 0.01) activities[item.activity].push(item);
          });

          const sumActivity = (act) => act.reduce((sum, item) => sum + item.amount, 0);
          const cashAccounts = Object.values(accountTotals).filter(a => a.account.includes('1000') || a.account.toLowerCase().includes('cash'));
          const netCashChange = cashAccounts.reduce((sum, a) => sum + a.amount, 0);

          return {
            operating: activities.operating,
            investing: activities.investing,
            financing: activities.financing,
            netOperating: sumActivity(activities.operating) - netCashChange,
            netInvesting: sumActivity(activities.investing),
            netFinancing: sumActivity(activities.financing),
            netCashChange
          };
        };

        const cf = computeCashFlow();

        const renderActivity = (title, items, net, color) => (
          <div key={title} style={{marginBottom:24}}>
            <div style={{padding:'10px 16px', background:color, borderRadius:'var(--radius-sm)', marginBottom:8}}>
              <h3 style={{fontSize:14, fontWeight:700, color:'#fff', margin:0}}>{title}</h3>
            </div>
            {items.length === 0 ? (
              <div style={{padding:'12px 16px', fontSize:13, color:'var(--text-muted)', fontStyle:'italic'}}>No activity in this period</div>
            ) : (
              <div style={{marginBottom:8}}>
                {items.map((item, i) => (
                  <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'6px 16px', fontSize:13, borderBottom: i < items.length - 1 ? '1px solid var(--border)' : 'none'}}>
                    <span style={{color:'var(--text)'}}>{item.account}</span>
                    <span style={{fontWeight:500, color: item.amount >= 0 ? '#2D6A4F' : '#ef4444'}}>{fmt(item.amount)}</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{display:'flex', justifyContent:'space-between', padding:'8px 16px', fontSize:14, fontWeight:700, background: dark ? 'var(--surface)' : '#f9fafb', borderRadius:'var(--radius-sm)'}}>
              <span style={{color:'var(--text)'}}>Net Cash from {title}</span>
              <span style={{color: net >= 0 ? '#2D6A4F' : '#ef4444'}}>{fmt(net)}</span>
            </div>
          </div>
        );

        return (
          <div>
            <PeriodSelector
              startDate={startDate} endDate={endDate}
              onStartChange={setStartDate} onEndChange={setEndDate}
              dark={dark}
            />
            <div style={{display:'flex', gap:8, marginBottom:16, justifyContent:'flex-end'}}>
              <button onClick={() => {
                const rows = [
                  { Activity: 'Operating', Account: '', Amount: '' },
                  ...cf.operating.map(i => ({ Activity: '', Account: i.account, Amount: i.amount })),
                  { Activity: '', Account: 'Net Operating', Amount: cf.netOperating },
                  { Activity: 'Investing', Account: '', Amount: '' },
                  ...cf.investing.map(i => ({ Activity: '', Account: i.account, Amount: i.amount })),
                  { Activity: '', Account: 'Net Investing', Amount: cf.netInvesting },
                  { Activity: 'Financing', Account: '', Amount: '' },
                  ...cf.financing.map(i => ({ Activity: '', Account: i.account, Amount: i.amount })),
                  { Activity: '', Account: 'Net Financing', Amount: cf.netFinancing },
                  { Activity: '', Account: 'Net Cash Change', Amount: cf.netCashChange }
                ];
                universalExportCSV(rows, `Cash_Flow_${startDate}_to_${endDate}`, ['Activity', 'Account', 'Amount']);
              }} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--brand-green)', color:'var(--brand-tan)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>
                Export CSV
              </button>
            </div>
            <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:20}}>
              {renderActivity('Operating Activities', cf.operating, cf.netOperating, '#059669')}
              {renderActivity('Investing Activities', cf.investing, cf.netInvesting, '#0891b2')}
              {renderActivity('Financing Activities', cf.financing, cf.netFinancing, '#7c3aed')}
              <div style={{marginTop:24, padding:'12px 16px', background: cf.netCashChange >= 0 ? 'rgba(45,106,79,0.1)' : 'rgba(239,68,68,0.1)', border: `2px solid ${cf.netCashChange >= 0 ? '#2D6A4F' : '#ef4444'}`, borderRadius:'var(--radius-md)'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <span style={{fontSize:16, fontWeight:700, color:'var(--text)'}}>Net Change in Cash</span>
                  <span style={{fontSize:20, fontWeight:700, color: cf.netCashChange >= 0 ? '#2D6A4F' : '#ef4444'}}>{fmt(cf.netCashChange)}</span>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function BudgetingView() {
  const theme = TOOL_THEMES.budgeting;
  const dark = useDarkMode();
  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Budgeting</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />
      <ToolHint theme={theme} />

      {(() => {
        const STORAGE_KEY = 'veracity-budgets';
        const [budgets, setBudgets] = React.useState(() => {
          try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
        });
        const [selectedId, setSelectedId] = React.useState(null);
        const [budgetTab, setBudgetTab] = React.useState('revenue');
        const [showForm, setShowForm] = React.useState(false);
        const [editingLine, setEditingLine] = React.useState(null);
        const [lineForm, setLineForm] = React.useState({ account: '', budgeted: '' });

        React.useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(budgets)); }, [budgets]);

        const selected = budgets.find(b => b.id === selectedId);

        const getGLActuals = (account, startDate, endDate) => {
          const entries = JSON.parse(localStorage.getItem(GL_STORAGE_KEY) || '[]');
          return entries
            .filter(e => e.date >= startDate && e.date <= endDate)
            .flatMap(e => e.entries || [])
            .filter(line => line.account === account)
            .reduce((sum, line) => sum + ((line.debit || 0) - (line.credit || 0)), 0);
        };

        const getPeriodDates = (year, period, month, quarter) => {
          if (period === 'annual') return { startDate: `${year}-01-01`, endDate: `${year}-12-31` };
          if (period === 'monthly') return { startDate: `${year}-${String(month).padStart(2,'0')}-01`, endDate: new Date(year, month, 0).toISOString().slice(0,10) };
          const qStart = (quarter - 1) * 3 + 1;
          return { startDate: `${year}-${String(qStart).padStart(2,'0')}-01`, endDate: new Date(year, qStart + 2, 0).toISOString().slice(0,10) };
        };

        const computeActuals = (budget) => {
          if (!budget) return budget;
          const { startDate, endDate } = getPeriodDates(budget.year, budget.period, budget.month, budget.quarter);
          return {
            ...budget,
            lineItems: budget.lineItems.map(item => {
              const actual = getGLActuals(item.account, startDate, endDate);
              const variance = actual - item.budgeted;
              const variancePct = item.budgeted !== 0 ? (variance / item.budgeted * 100) : 0;
              return { ...item, actual, variance, variancePct };
            })
          };
        };

        const budgetWithActuals = computeActuals(selected);

        const createBudget = () => {
          const name = prompt('Budget Name:', `FY ${new Date().getFullYear()} Budget`);
          if (!name) return;
          const newBudget = {
            id: Date.now().toString(),
            name,
            year: new Date().getFullYear(),
            period: 'annual',
            month: null,
            quarter: null,
            type: 'revenue',
            lineItems: [],
            status: 'draft',
            createdDate: new Date().toISOString()
          };
          setBudgets([...budgets, newBudget]);
          setSelectedId(newBudget.id);
        };

        const deleteBudget = (id) => {
          if (!confirm('Delete this budget?')) return;
          setBudgets(budgets.filter(b => b.id !== id));
          if (selectedId === id) setSelectedId(null);
        };

        const addLineItem = () => {
          if (!lineForm.account || !lineForm.budgeted) return;
          const newLine = { account: lineForm.account, budgeted: parseFloat(lineForm.budgeted), actual: 0, variance: 0, variancePct: 0 };
          if (editingLine !== null) {
            setBudgets(budgets.map(b => b.id === selectedId ? {
              ...b, lineItems: b.lineItems.map((item, i) => i === editingLine ? newLine : item)
            } : b));
          } else {
            setBudgets(budgets.map(b => b.id === selectedId ? {...b, lineItems: [...b.lineItems, newLine]} : b));
          }
          setLineForm({ account: '', budgeted: '' });
          setEditingLine(null);
          setShowForm(false);
        };

        const deleteLineItem = (index) => {
          setBudgets(budgets.map(b => b.id === selectedId ? {...b, lineItems: b.lineItems.filter((_, i) => i !== index)} : b));
        };

        const filterLineItems = (items) => {
          if (!items) return [];
          const typeMap = { revenue: 4000, expense: 5000, capex: 1400 };
          const baseNum = typeMap[budgetTab] || 4000;
          const rangeEnd = budgetTab === 'expense' ? 6999 : budgetTab === 'revenue' ? 4999 : 1699;
          return items.filter(item => {
            const num = parseInt(item.account.match(/^\d+/)?.[0] || '0');
            return num >= baseNum && num <= rangeEnd;
          });
        };

        const filtered = filterLineItems(budgetWithActuals?.lineItems);
        const totals = filtered.reduce((acc, item) => ({
          budgeted: acc.budgeted + item.budgeted,
          actual: acc.actual + (item.actual || 0),
          variance: acc.variance + (item.variance || 0)
        }), { budgeted: 0, actual: 0, variance: 0 });

        return (
          <div>
            <div style={{display:'flex', gap:8, marginBottom:16, alignItems:'center'}}>
              <select value={selectedId || ''} onChange={e => setSelectedId(e.target.value)} style={sharedSelStyle(dark)}>
                <option value="">Select a budget...</option>
                {budgets.map(b => <option key={b.id} value={b.id}>{b.name} ({b.year})</option>)}
              </select>
              <button onClick={createBudget} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--brand-green)', color:'var(--brand-tan)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>New Budget</button>
              {selectedId && <button onClick={() => deleteBudget(selectedId)} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'#ef4444', color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Delete</button>}
              {selectedId && <button onClick={() => {
                const rows = filtered.map(item => ({ Account: item.account, Budgeted: item.budgeted, Actual: item.actual, Variance: item.variance, 'Variance %': item.variancePct.toFixed(1) }));
                universalExportCSV(rows, `Budget_${selected.name}`, ['Account', 'Budgeted', 'Actual', 'Variance', 'Variance %']);
              }} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--brand-green)', color:'var(--brand-tan)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer', marginLeft:'auto'}}>Export CSV</button>}
            </div>

            {!selectedId ? (
              <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:40, textAlign:'center'}}>
                <div style={{fontSize:48, marginBottom:16, opacity:0.3}}>📋</div>
                <h3 style={{fontSize:16, fontWeight:600, color:'var(--text)', marginBottom:8}}>No Budget Selected</h3>
                <p style={{fontSize:13, color:'var(--text-muted)'}}>Create a new budget or select an existing one to get started.</p>
              </div>
            ) : (
              <div>
                <ModuleTabs
                  tabs={[{id:'revenue',label:'Revenue Budget'},{id:'expense',label:'Expense Budget'},{id:'capex',label:'Capital Expenditures'}]}
                  activeTab={budgetTab}
                  onTabChange={setBudgetTab}
                  accentColor={theme.accent}
                />

                <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 16px', borderBottom:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
                    <h4 style={{fontSize:14, fontWeight:600, color:'var(--text)', margin:0}}>{filtered.length} Line Items</h4>
                    <button onClick={() => { setShowForm(true); setEditingLine(null); setLineForm({account:'',budgeted:''}); }} style={{padding:'4px 12px', borderRadius:'var(--radius-sm)', background:theme.accent, color:'#fff', border:'none', fontSize:12, fontWeight:600, cursor:'pointer'}}>Add Line Item</button>
                  </div>

                  {showForm && (
                    <div style={{padding:16, borderBottom:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
                      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr auto', gap:8, alignItems:'end'}}>
                        <div>
                          <label style={sharedLblStyle}>Account</label>
                          <input value={lineForm.account} onChange={e => setLineForm({...lineForm, account:e.target.value})} placeholder="e.g. 4000 Product Sales" style={sharedInputStyle(dark)} />
                        </div>
                        <div>
                          <label style={sharedLblStyle}>Budgeted Amount</label>
                          <input type="number" value={lineForm.budgeted} onChange={e => setLineForm({...lineForm, budgeted:e.target.value})} placeholder="0.00" style={sharedInputStyle(dark)} />
                        </div>
                        <div style={{display:'flex',gap:4}}>
                          <button onClick={addLineItem} style={{padding:'8px 16px', borderRadius:'var(--radius-sm)', background:theme.accent, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>{editingLine !== null ? 'Update' : 'Add'}</button>
                          <button onClick={() => {setShowForm(false); setEditingLine(null);}} style={{padding:'8px 16px', borderRadius:'var(--radius-sm)', background:'var(--border)', color:'var(--text)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Cancel</button>
                        </div>
                      </div>
                    </div>
                  )}

                  {filtered.length === 0 ? (
                    <div style={{padding:40, textAlign:'center'}}>
                      <p style={{fontSize:13, color:'var(--text-muted)', fontStyle:'italic'}}>No line items yet. Click "Add Line Item" to get started.</p>
                    </div>
                  ) : (
                    <div>
                      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr auto', gap:8, padding:'8px 16px', fontSize:11, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', borderBottom:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
                        <span>Account</span><span style={{textAlign:'right'}}>Budgeted</span><span style={{textAlign:'right'}}>Actual</span><span style={{textAlign:'right'}}>Variance $</span><span style={{textAlign:'right'}}>Variance %</span><span></span>
                      </div>
                      {filtered.map((item, i) => (
                        <div key={i} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr auto', gap:8, padding:'8px 16px', fontSize:13, borderBottom: i < filtered.length - 1 ? '1px solid var(--border)' : 'none'}}>
                          <span style={{color:'var(--text)'}}>{item.account}</span>
                          <span style={{textAlign:'right', fontWeight:500}}>{fmt(item.budgeted)}</span>
                          <span style={{textAlign:'right', fontWeight:500}}>{fmt(item.actual || 0)}</span>
                          <span style={{textAlign:'right', fontWeight:600, color: Math.abs(item.variance) < 0.01 ? 'var(--text-muted)' : (budgetTab === 'revenue' ? (item.variance >= 0 ? '#2D6A4F' : '#ef4444') : (item.variance <= 0 ? '#2D6A4F' : '#ef4444'))}}>{fmt(item.variance || 0)}</span>
                          <span style={{textAlign:'right', fontWeight:600, color: Math.abs(item.variancePct) < 1 ? 'var(--text-muted)' : (budgetTab === 'revenue' ? (item.variance >= 0 ? '#2D6A4F' : '#ef4444') : (item.variance <= 0 ? '#2D6A4F' : '#ef4444'))}}>{item.variancePct.toFixed(1)}%</span>
                          <div style={{display:'flex',gap:4}}>
                            <button onClick={() => {setEditingLine(i); setLineForm({account:item.account, budgeted:item.budgeted}); setShowForm(true);}} style={{fontSize:11, padding:'2px 6px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'transparent', color:'var(--text-muted)', cursor:'pointer'}}>Edit</button>
                            <button onClick={() => deleteLineItem(i)} style={{fontSize:11, padding:'2px 6px', border:'1px solid #ef4444', borderRadius:'var(--radius-sm)', background:'transparent', color:'#ef4444', cursor:'pointer'}}>✕</button>
                          </div>
                        </div>
                      ))}
                      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr auto', gap:8, padding:'10px 16px', fontSize:14, fontWeight:700, borderTop:'2px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
                        <span style={{color:'var(--text)'}}>Total</span>
                        <span style={{textAlign:'right', color:theme.accent}}>{fmt(totals.budgeted)}</span>
                        <span style={{textAlign:'right', color:theme.accent}}>{fmt(totals.actual)}</span>
                        <span style={{textAlign:'right', color: Math.abs(totals.variance) < 0.01 ? 'var(--text-muted)' : (budgetTab === 'revenue' ? (totals.variance >= 0 ? '#2D6A4F' : '#ef4444') : (totals.variance <= 0 ? '#2D6A4F' : '#ef4444'))}}>{fmt(totals.variance)}</span>
                        <span style={{textAlign:'right', color: Math.abs(totals.variance) < 0.01 ? 'var(--text-muted)' : (budgetTab === 'revenue' ? (totals.variance >= 0 ? '#2D6A4F' : '#ef4444') : (totals.variance <= 0 ? '#2D6A4F' : '#ef4444'))}}>{totals.budgeted !== 0 ? (totals.variance / totals.budgeted * 100).toFixed(1) : '0.0'}%</span>
                        <span></span>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

function ForecastingView() {
  const theme = TOOL_THEMES.forecasting;
  const dark = useDarkMode();
  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Forecasting</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />
      <ToolHint theme={theme} />

      {(() => {
        const STORAGE_KEY = 'veracity-forecasts';
        const [forecasts, setForecasts] = React.useState(() => {
          try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
        });
        const [selectedId, setSelectedId] = React.useState(null);
        const [forecastTab, setForecastTab] = React.useState('revenue');
        const [showForm, setShowForm] = React.useState(false);
        const [lineForm, setLineForm] = React.useState({ account: '', method: 'manual', growthRate: 5 });
        const [manualValues, setManualValues] = React.useState(Array(12).fill(''));

        React.useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(forecasts)); }, [forecasts]);

        const selected = forecasts.find(f => f.id === selectedId);

        const getMonthlyActuals = (account, endDate, periods) => {
          const entries = JSON.parse(localStorage.getItem(GL_STORAGE_KEY) || '[]');
          const end = new Date(endDate);
          const result = [];
          for (let i = periods - 1; i >= 0; i--) {
            const monthStart = new Date(end.getFullYear(), end.getMonth() - i, 1);
            const monthEnd = new Date(end.getFullYear(), end.getMonth() - i + 1, 0);
            const startStr = monthStart.toISOString().slice(0, 10);
            const endStr = monthEnd.toISOString().slice(0, 10);
            const total = entries
              .filter(e => e.date >= startStr && e.date <= endStr)
              .flatMap(e => e.entries || [])
              .filter(line => line.account === account)
              .reduce((sum, line) => sum + ((line.debit || 0) - (line.credit || 0)), 0);
            result.push(total);
          }
          return result;
        };

        const linearRegression = (values) => {
          const n = values.length;
          if (n === 0) return { predict: () => 0 };
          const sumX = values.reduce((a, b, i) => a + i, 0);
          const sumY = values.reduce((a, b) => a + b, 0);
          const sumXY = values.reduce((a, b, i) => a + i * b, 0);
          const sumX2 = values.reduce((a, b, i) => a + i * i, 0);
          const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
          const intercept = (sumY - slope * sumX) / n;
          return { predict: (x) => slope * x + intercept };
        };

        const applyGrowthRate = (baseValue, rate, periods) => {
          const result = [];
          for (let i = 0; i < periods; i++) {
            result.push(baseValue * Math.pow(1 + rate / 100, i + 1));
          }
          return result;
        };

        const projectLineItem = (item, historical) => {
          if (item.method === 'manual') return item.projected;
          if (item.method === 'linear') {
            const model = linearRegression(historical);
            return Array(12).fill(0).map((_, i) => model.predict(historical.length + i));
          }
          if (item.method === 'growth') {
            const lastActual = historical[historical.length - 1] || 0;
            return applyGrowthRate(lastActual, item.growthRate || 5, 12);
          }
          return Array(12).fill(0);
        };

        const createForecast = () => {
          const name = prompt('Forecast Name:', `${new Date().getFullYear()} Forecast`);
          if (!name) return;
          const newForecast = {
            id: Date.now().toString(),
            name,
            type: 'revenue',
            startDate: new Date().toISOString().slice(0, 10),
            periods: 12,
            lineItems: [],
            createdDate: new Date().toISOString(),
            lastUpdated: new Date().toISOString()
          };
          setForecasts([...forecasts, newForecast]);
          setSelectedId(newForecast.id);
        };

        const deleteForecast = (id) => {
          if (!confirm('Delete this forecast?')) return;
          setForecasts(forecasts.filter(f => f.id !== id));
          if (selectedId === id) setSelectedId(null);
        };

        const addLineItem = () => {
          if (!lineForm.account) return;
          const historical = getMonthlyActuals(lineForm.account, new Date().toISOString().slice(0, 10), 12);
          const projected = lineForm.method === 'manual' ? manualValues.map(v => parseFloat(v) || 0) : projectLineItem({ method: lineForm.method, growthRate: parseFloat(lineForm.growthRate) }, historical);
          const newLine = { account: lineForm.account, method: lineForm.method, growthRate: parseFloat(lineForm.growthRate), historical, projected };
          setForecasts(forecasts.map(f => f.id === selectedId ? {...f, lineItems: [...f.lineItems, newLine], lastUpdated: new Date().toISOString()} : f));
          setLineForm({ account: '', method: 'manual', growthRate: 5 });
          setManualValues(Array(12).fill(''));
          setShowForm(false);
        };

        const deleteLineItem = (index) => {
          setForecasts(forecasts.map(f => f.id === selectedId ? {...f, lineItems: f.lineItems.filter((_, i) => i !== index)} : f));
        };

        const filterLineItems = (items) => {
          if (!items) return [];
          const typeMap = { revenue: 4000, expense: 5000, cash: 1000 };
          const baseNum = typeMap[forecastTab] || 4000;
          const rangeEnd = forecastTab === 'expense' ? 6999 : forecastTab === 'revenue' ? 4999 : 1099;
          return items.filter(item => {
            const num = parseInt(item.account.match(/^\d+/)?.[0] || '0');
            return num >= baseNum && num <= rangeEnd;
          });
        };

        const filtered = filterLineItems(selected?.lineItems);
        const monthLabels = Array(12).fill(0).map((_, i) => {
          const d = new Date(); d.setMonth(d.getMonth() + i + 1);
          return d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
        });

        return (
          <div>
            <div style={{display:'flex', gap:8, marginBottom:16, alignItems:'center'}}>
              <select value={selectedId || ''} onChange={e => setSelectedId(e.target.value)} style={sharedSelStyle(dark)}>
                <option value="">Select a forecast...</option>
                {forecasts.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
              </select>
              <button onClick={createForecast} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--brand-green)', color:'var(--brand-tan)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>New Forecast</button>
              {selectedId && <button onClick={() => deleteForecast(selectedId)} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'#ef4444', color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Delete</button>}
              {selectedId && <button onClick={() => {
                const rows = [];
                filtered.forEach(item => {
                  rows.push({ Account: item.account, Type: 'Historical', ...item.historical.slice(0, 6).reduce((acc, v, i) => ({ ...acc, [`M${i+1}`]: v }), {}) });
                  rows.push({ Account: item.account, Type: 'Projected', ...item.projected.slice(0, 6).reduce((acc, v, i) => ({ ...acc, [`M${i+1}`]: v }), {}) });
                });
                universalExportCSV(rows, `Forecast_${selected.name}`, ['Account', 'Type', 'M1', 'M2', 'M3', 'M4', 'M5', 'M6']);
              }} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--brand-green)', color:'var(--brand-tan)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer', marginLeft:'auto'}}>Export CSV</button>}
            </div>

            {!selectedId ? (
              <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:40, textAlign:'center'}}>
                <div style={{fontSize:48, marginBottom:16, opacity:0.3}}>📈</div>
                <h3 style={{fontSize:16, fontWeight:600, color:'var(--text)', marginBottom:8}}>No Forecast Selected</h3>
                <p style={{fontSize:13, color:'var(--text-muted)'}}>Create a new forecast or select an existing one to get started.</p>
              </div>
            ) : (
              <div>
                <ModuleTabs
                  tabs={[{id:'revenue',label:'Revenue Forecast'},{id:'expense',label:'Expense Forecast'},{id:'cash',label:'Cash Forecast'}]}
                  activeTab={forecastTab}
                  onTabChange={setForecastTab}
                  accentColor={theme.accent}
                />

                <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 16px', borderBottom:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
                    <h4 style={{fontSize:14, fontWeight:600, color:'var(--text)', margin:0}}>{filtered.length} Forecast Items</h4>
                    <button onClick={() => {setShowForm(true); setLineForm({account:'',method:'manual',growthRate:5}); setManualValues(Array(12).fill(''));}} style={{padding:'4px 12px', borderRadius:'var(--radius-sm)', background:theme.accent, color:'#fff', border:'none', fontSize:12, fontWeight:600, cursor:'pointer'}}>Add Item</button>
                  </div>

                  {showForm && (
                    <div style={{padding:16, borderBottom:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#f9fafb'}}>
                      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:8, marginBottom:8}}>
                        <div><label style={sharedLblStyle}>Account</label><input value={lineForm.account} onChange={e => setLineForm({...lineForm, account:e.target.value})} placeholder="e.g. 4000 Product Sales" style={sharedInputStyle(dark)} /></div>
                        <div><label style={sharedLblStyle}>Method</label><select value={lineForm.method} onChange={e => setLineForm({...lineForm, method:e.target.value})} style={sharedSelStyle(dark)}><option value="manual">Manual</option><option value="linear">Linear Trend</option><option value="growth">Growth Rate</option></select></div>
                        {lineForm.method === 'growth' && <div><label style={sharedLblStyle}>Growth Rate (%)</label><input type="number" value={lineForm.growthRate} onChange={e => setLineForm({...lineForm, growthRate:e.target.value})} style={sharedInputStyle(dark)} /></div>}
                      </div>
                      {lineForm.method === 'manual' && (
                        <div><label style={{...sharedLblStyle, marginBottom:8}}>Monthly Projections (next 12 months)</label><div style={{display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap:4}}>
                          {manualValues.map((v, i) => <input key={i} type="number" value={v} onChange={e => setManualValues(manualValues.map((val, idx) => idx === i ? e.target.value : val))} placeholder={monthLabels[i]} style={{...sharedInputStyle(dark), fontSize:11, padding:'4px 6px'}} />)}
                        </div></div>
                      )}
                      <div style={{display:'flex',gap:4, marginTop:8}}>
                        <button onClick={addLineItem} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:theme.accent, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Add</button>
                        <button onClick={() => setShowForm(false)} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--border)', color:'var(--text)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Cancel</button>
                      </div>
                    </div>
                  )}

                  {filtered.length === 0 ? (
                    <div style={{padding:40, textAlign:'center'}}><p style={{fontSize:13, color:'var(--text-muted)', fontStyle:'italic'}}>No forecast items yet. Click "Add Item" to get started.</p></div>
                  ) : (
                    <div style={{padding:16}}>
                      {filtered.map((item, i) => (
                        <div key={i} style={{marginBottom:20, padding:12, border:'1px solid var(--border)', borderRadius:'var(--radius-md)', background: dark ? 'var(--surface)' : '#fff'}}>
                          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
                            <div><span style={{fontSize:14, fontWeight:600, color:'var(--text)'}}>{item.account}</span><span style={{fontSize:11, color:'var(--text-muted)', marginLeft:8}}>Method: {item.method}{item.method === 'growth' && ` (${item.growthRate}%)`}</span></div>
                            <button onClick={() => deleteLineItem(i)} style={{fontSize:11, padding:'2px 8px', border:'1px solid #ef4444', borderRadius:'var(--radius-sm)', background:'transparent', color:'#ef4444', cursor:'pointer'}}>Delete</button>
                          </div>
                          <div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Historical (Last 6 Months): {item.historical.slice(-6).map(v => fmt(v)).join(' • ')}</div>
                          <div style={{fontSize:11, color:theme.accent, fontWeight:600}}>Projected (Next 6 Months): {item.projected.slice(0, 6).map(v => fmt(v)).join(' • ')}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// --- System Owner Portal ---
function SystemOwnerPortal() {
  const theme = TOOL_THEMES['system-owner'];
  const dark = useDarkMode();
  const [soTab, setSOTab] = useState('dashboard');
  const [soData, setSOData] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('veracity-so-data'));
      if (saved && saved.clients) return saved;
    } catch {}
    return JSON.parse(JSON.stringify(VIAM_DATA));
  });
  const [modalState, setModalState] = useState(null);
  const [clientSearch, setClientSearch] = useState('');
  const [clientDistFilter, setClientDistFilter] = useState('');
  const [clientStatusFilter, setClientStatusFilter] = useState('');
  const [distSearch, setDistSearch] = useState('');
  const [matchSearch, setMatchSearch] = useState('');

  const saveData = (newData) => { setSOData(newData); localStorage.setItem('veracity-so-data', JSON.stringify(newData)); };

  const fmtCur = (v) => { const n = typeof v === 'string' ? parseFloat(v.replace(/[^0-9.-]/g,'')) : (v||0); return isNaN(n) ? '$0' : '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); };
  const fmtPhone = (v) => { if (!v) return '\u2014'; const d = String(v).replace(/\D/g,''); if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`; return v; };
  const fmtPct = (v) => { if (v === null || v === undefined || v === '') return '\u2014'; const n = typeof v === 'string' ? parseFloat(v) : v; return isNaN(n) ? '\u2014' : n.toFixed(2) + '%'; };

  const statusColor = (s) => {
    const sl = (s||'').toLowerCase();
    if (sl.includes('approved') || sl.includes('wire transfer received')) return { bg: '#e8f5e9', border: '#a5d6a7', color: '#2e7d32' };
    if (sl.includes('agreement') || sl.includes('addendum') || sl.includes('ppa')) return { bg: '#e3f2fd', border: '#90caf9', color: '#1565c0' };
    if (sl.includes('requested') || sl.includes('wire transfer sent')) return { bg: '#fff8e1', border: '#ffe082', color: '#e65100' };
    return { bg: 'var(--surface2)', border: 'var(--border)', color: 'var(--text)' };
  };

  const allDistributors = [...new Set(soData.clients.map(c => c.Distributors).filter(Boolean).flatMap(d => d.split(',').map(x => x.trim().replace(/\s*\([\d.]+%\)\s*$/,'')).filter(Boolean)))].sort();
  const allStatuses = [...new Set(soData.clients.map(c => c.Status).filter(Boolean))].sort();

  const filteredClients = soData.clients.filter(c => {
    const q = clientSearch.toLowerCase();
    const matchesSearch = !q || Object.values(c).some(v => String(v||'').toLowerCase().includes(q));
    const matchesDist = !clientDistFilter || (c.Distributors||'').includes(clientDistFilter);
    const matchesStatus = !clientStatusFilter || c.Status === clientStatusFilter;
    return matchesSearch && matchesDist && matchesStatus;
  });

  const filteredDists = soData.distributors.filter(d => {
    const q = distSearch.toLowerCase();
    return !q || Object.values(d).some(v => String(v||'').toLowerCase().includes(q));
  });

  const filteredMatching = soData.matching.filter(m => {
    const q = matchSearch.toLowerCase();
    return !q || Object.values(m).some(v => String(v||'').toLowerCase().includes(q));
  });

  const soImportHandler = (type) => (rows, mode) => {
    const newData = JSON.parse(JSON.stringify(soData));
    newData[type] = mode === 'replace' ? rows : [...newData[type], ...rows];
    saveData(newData);
  };

  const openModal = (type, idx, mode) => setModalState({ type, idx, mode, editData: mode === 'edit' ? { ...(type === 'clients' ? soData.clients[idx] : type === 'distributors' ? soData.distributors[idx] : soData.matching[idx]) } : null });
  const closeModal = () => setModalState(null);
  const saveModal = () => {
    if (!modalState || !modalState.editData) return;
    const newData = JSON.parse(JSON.stringify(soData));
    newData[modalState.type][modalState.idx] = modalState.editData;
    saveData(newData);
    closeModal();
  };
  const updateEditField = (key, val) => setModalState(prev => ({ ...prev, editData: { ...prev.editData, [key]: val } }));

    padding: '8px 16px', fontSize: 13, fontWeight: soTab === t ? 600 : 400, cursor: 'pointer',
    background: soTab === t ? theme.accent : 'transparent', color: soTab === t ? '#fff' : 'var(--text-muted)',
    border: 'none', borderRadius: 'var(--radius-sm)', fontFamily: 'inherit', transition: 'all 150ms',
  });

  const cardStyle = { background: dark ? 'var(--surface2)' : '#fff', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)', padding: '16px 20px' };
  const inputStyle = { width: '100%', padding: '6px 10px', fontSize: 13, border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', background: dark ? 'var(--surface2)' : '#fff', color: 'var(--text)', fontFamily: 'inherit' };

    const distGroups = {};
    clients.forEach(c => { (c.Distributors||'').split(',').map(x => x.trim().replace(/\s*\([\d.]+%\)\s*$/,'')).filter(Boolean).forEach(d => { if (!distGroups[d]) distGroups[d] = 0; distGroups[d]++; }); });
    const topDists = Object.entries(distGroups).sort((a,b) => b[1]-a[1]).slice(0,10);

    const topOwners = Object.entries(ownerGroups).sort((a,b) => b[1].count-a[1].count).slice(0,10);

    const minDP = dpValues.length > 0 ? Math.min(...dpValues) : 0;
    const maxClient = clients.find(c => c.Downpayment === maxDP);
    const minClient = clients.find(c => c.Downpayment === minDP);

      { label: 'Total Distributors', value: soData.distributors.length },
      { label: 'Total Matches', value: soData.matching.length },
      { label: 'Total Downpayment', value: fmtCur(totalDP) },
      { label: 'Total DP Received', value: fmtCur(totalRcv) },
      { label: 'Collection Rate', value: collRate.toFixed(1) + '%' },
    ];

    return (
      <div style={{display:'flex', flexDirection:'column', gap:20}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:12}}>
          {kpis.map(k => (
            <div key={k.label} style={{...cardStyle, borderLeft:`3px solid ${theme.accent}`}}>
              <div style={{fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.04em', color:'var(--text-muted)', marginBottom:4}}>{k.label}</div>
              <div style={{fontSize:22, fontWeight:700, color:'var(--text)'}}>{k.value}</div>
            </div>
          ))}
        </div>

        <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:16}}>
          <div style={cardStyle}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
              <h3 style={{fontSize:14, fontWeight:600, color:'var(--text)', margin:0}}>Clients by Status</h3>
              <TableIO data={Object.entries(statusGroups).map(([s,v]) => ({Status:s, Count:v.count, 'Total DP':v.dp}))} filename="clients_by_status" />
            </div>
            <table className="tool-table"><thead><tr><th>Status</th><th style={{textAlign:'right'}}>Count</th><th style={{textAlign:'right'}}>Total DP</th></tr></thead>
              <tbody>{Object.entries(statusGroups).sort((a,b)=>b[1].count-a[1].count).map(([s,v]) => {
                const sc = statusColor(s);
                return <tr key={s}><td><span style={{display:'inline-block', padding:'2px 8px', borderRadius:9999, fontSize:11, fontWeight:500, background:sc.bg, color:sc.color, border:`1px solid ${sc.border}`}}>{s}</span></td><td style={{textAlign:'right'}}>{v.count}</td><td style={{textAlign:'right'}}>{fmtCur(v.dp)}</td></tr>;
              })}</tbody>
            </table>
          </div>
          <div style={cardStyle}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
              <h3 style={{fontSize:14, fontWeight:600, color:'var(--text)', margin:0}}>Top Distributors by Client Count</h3>
              <TableIO data={topDists.map(([d,c]) => ({Distributor:d, Clients:c}))} filename="top_distributors" />
            </div>
            <table className="tool-table"><thead><tr><th>Distributor</th><th style={{textAlign:'right'}}>Clients</th></tr></thead>
              <tbody>{topDists.map(([d,c]) => <tr key={d}><td>{d}</td><td style={{textAlign:'right'}}>{c}</td></tr>)}</tbody>
            </table>
          </div>
          <div style={cardStyle}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
              <h3 style={{fontSize:14, fontWeight:600, color:'var(--text)', margin:0}}>Top System Owners by Match Count</h3>

  return (

function ConstructionTrackerView() {
  const theme = TOOL_THEMES.construction;
  const dark = useDarkMode();
  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Construction Tracker</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />
      <ToolHint theme={theme} />

      {(() => {
        const STORAGE_KEY = 'veracity-construction-projects';
        const [projects, setProjects] = React.useState(() => {
          try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
        });
        const [ctTab, setCtTab] = React.useState('dashboard');
        const [selectedId, setSelectedId] = React.useState(null);
        const [phaseFilter, setPhaseFilter] = React.useState('all');
        const [showProjectForm, setShowProjectForm] = React.useState(false);
        const [showCOForm, setShowCOForm] = React.useState(false);
        const [showMilestoneForm, setShowMilestoneForm] = React.useState(false);
        const [projectForm, setProjectForm] = React.useState({ projectName: '', client: '', phase: 'bidding', startDate: new Date().toISOString().slice(0,10), targetEndDate: '', budgetOriginal: '' });
        const [coForm, setCOForm] = React.useState({ date: new Date().toISOString().slice(0,10), description: '', amount: '' });
        const [msForm, setMsForm] = React.useState({ name: '', targetDate: '' });

        React.useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); }, [projects]);

        const selected = projects.find(p => p.id === selectedId);

        const getPhaseColor = (phase) => {
          const colors = { bidding: '#94a3b8', 'pre-construction': '#60a5fa', 'active-build': '#fbbf24', 'punch-list': '#fb923c', closeout: '#22c55e' };
          return colors[phase] || '#94a3b8';
        };

        const calculateProjectHealth = (project) => {
          const budgetPct = project.budget.current > 0 ? (project.budget.spent / project.budget.current * 100) : 0;
          const budgetHealth = budgetPct < 90 ? 'green' : budgetPct < 100 ? 'yellow' : 'red';
          const completeMilestones = project.milestones.filter(m => m.status === 'complete').length;
          const scheduleHealth = completeMilestones / project.milestones.length >= 0.7 ? 'green' : completeMilestones / project.milestones.length >= 0.4 ? 'yellow' : 'red';
          return { budgetHealth, scheduleHealth };
        };

        const createProject = () => {
          if (!projectForm.projectName || !projectForm.budgetOriginal) return;
          const newProject = {
            id: Date.now().toString(),
            projectName: projectForm.projectName,
            client: projectForm.client,
            phase: projectForm.phase,
            startDate: projectForm.startDate,
            targetEndDate: projectForm.targetEndDate,
            actualEndDate: null,
            budget: { original: parseFloat(projectForm.budgetOriginal), changeOrders: [], current: parseFloat(projectForm.budgetOriginal), spent: 0, committed: 0, remaining: parseFloat(projectForm.budgetOriginal) },
            milestones: [],
            team: { projectManager: '', superintendent: '', architect: '', generalContractor: '' },
            notes: []
          };
          setProjects([...projects, newProject]);
          setSelectedId(newProject.id);
          setProjectForm({ projectName: '', client: '', phase: 'bidding', startDate: new Date().toISOString().slice(0,10), targetEndDate: '', budgetOriginal: '' });
          setShowProjectForm(false);
        };

        const deleteProject = (id) => {
          if (!confirm('Delete this project?')) return;
          setProjects(projects.filter(p => p.id !== id));
          if (selectedId === id) setSelectedId(null);
        };

        const advancePhase = () => {
          if (!selected) return;
          const phases = ['bidding', 'pre-construction', 'active-build', 'punch-list', 'closeout'];
          const currentIndex = phases.indexOf(selected.phase);
          if (currentIndex < phases.length - 1) {
            if (confirm(`Advance to ${phases[currentIndex + 1].replace('-', ' ')}?`)) {
              setProjects(projects.map(p => p.id === selectedId ? {...p, phase: phases[currentIndex + 1]} : p));
            }
          }
        };

        const addChangeOrder = () => {
          if (!coForm.description || !coForm.amount) return;
          const newCO = { id: Date.now().toString(), date: coForm.date, description: coForm.description, amount: parseFloat(coForm.amount), approved: true };
          setProjects(projects.map(p => p.id === selectedId ? {
            ...p,
            budget: {
              ...p.budget,
              changeOrders: [...p.budget.changeOrders, newCO],
              current: p.budget.current + newCO.amount,
              remaining: p.budget.remaining + newCO.amount
            }
          } : p));
          setCOForm({ date: new Date().toISOString().slice(0,10), description: '', amount: '' });
          setShowCOForm(false);
        };

        const addMilestone = () => {
          if (!msForm.name || !msForm.targetDate) return;
          const newMs = { id: Date.now().toString(), name: msForm.name, targetDate: msForm.targetDate, actualDate: null, status: 'pending' };
          setProjects(projects.map(p => p.id === selectedId ? {...p, milestones: [...p.milestones, newMs]} : p));
          setMsForm({ name: '', targetDate: '' });
          setShowMilestoneForm(false);
        };

        const updateMilestone = (updatedMs) => {
          setProjects(projects.map(p => p.id === selectedId ? {...p, milestones: p.milestones.map(m => m.id === updatedMs.id ? updatedMs : m)} : p));
        };

        const updateBudgetSpent = (newSpent) => {
          setProjects(projects.map(p => p.id === selectedId ? {...p, budget: {...p.budget, spent: parseFloat(newSpent), remaining: p.budget.current - parseFloat(newSpent)}} : p));
        };

        const filtered = phaseFilter === 'all' ? projects : projects.filter(p => p.phase === phaseFilter);
        const totalBudget = projects.reduce((sum, p) => sum + p.budget.current, 0);
        const totalSpent = projects.reduce((sum, p) => sum + p.budget.spent, 0);
        const overdueMilestones = projects.flatMap(p => p.milestones.filter(m => m.status !== 'complete' && m.targetDate < new Date().toISOString().slice(0,10)));

        return (
          <div>
            <ModuleTabs
              tabs={[{id:'dashboard',label:'Dashboard'},{id:'projects',label:'Projects'},{id:'budgets',label:'Budgets'},{id:'milestones',label:'Milestones'}]}
              activeTab={ctTab}
              onTabChange={setCtTab}
              accentColor={theme.accent}
            />

            {ctTab === 'dashboard' && (
              <div>
                <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:16, marginBottom:24}}>
                  <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:16}}>
                    <div style={{fontSize:11, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Total Projects</div>
                    <div style={{fontSize:24, fontWeight:700, color:theme.accent}}>{projects.length}</div>
                  </div>
                  <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:16}}>
                    <div style={{fontSize:11, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Total Budget</div>
                    <div style={{fontSize:24, fontWeight:700, color:theme.accent}}>{fmt(totalBudget)}</div>
                  </div>
                  <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:16}}>
                    <div style={{fontSize:11, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Total Spent</div>
                    <div style={{fontSize:24, fontWeight:700, color:'#2D6A4F'}}>{fmt(totalSpent)}</div>
                  </div>
                  <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:16}}>
                    <div style={{fontSize:11, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Overdue Milestones</div>
                    <div style={{fontSize:24, fontWeight:700, color:overdueMilestones.length > 0 ? '#ef4444' : '#2D6A4F'}}>{overdueMilestones.length}</div>
                  </div>
                </div>
                <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:16}}>
                  <h4 style={{fontSize:14, fontWeight:600, color:'var(--text)', marginBottom:12}}>Projects by Phase</h4>
                  {['bidding', 'pre-construction', 'active-build', 'punch-list', 'closeout'].map(phase => {
                    const count = projects.filter(p => p.phase === phase).length;
                    return (
                      <div key={phase} style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
                        <div style={{width:100, fontSize:12, color:'var(--text-muted)', textTransform:'capitalize'}}>{phase.replace('-', ' ')}</div>
                        <div style={{flex:1, height:20, background:'var(--surface)', borderRadius:4, overflow:'hidden'}}>
                          <div style={{height:'100%', width: `${projects.length > 0 ? (count/projects.length*100) : 0}%`, background:getPhaseColor(phase)}} />

                        <div style={{fontSize:12, fontWeight:600, color:'var(--text)'}}>{count}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {ctTab === 'projects' && (
              <div>
                <div style={{display:'flex', gap:8, marginBottom:16, alignItems:'center'}}>
                  <select value={phaseFilter} onChange={e => setPhaseFilter(e.target.value)} style={sharedSelStyle(dark)}>

                    <option value="bidding">Bidding</option>
                    <option value="pre-construction">Pre-Construction</option>
                    <option value="active-build">Active Build</option>
                    <option value="punch-list">Punch List</option>
                    <option value="closeout">Closeout</option>
                  </select>
                  <button onClick={() => setShowProjectForm(true)} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--brand-green)', color:'var(--brand-tan)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>New Project</button>
                </div>

                {showProjectForm && (
                  <div style={{background: dark ? 'var(--surface)' : '#f9fafb', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:16, marginBottom:16}}>
                    <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:8, marginBottom:8}}>
                      <div><label style={sharedLblStyle}>Project Name</label><input value={projectForm.projectName} onChange={e => setProjectForm({...projectForm, projectName:e.target.value})} style={sharedInputStyle(dark)} /></div>
                      <div><label style={sharedLblStyle}>Client</label><input value={projectForm.client} onChange={e => setProjectForm({...projectForm, client:e.target.value})} style={sharedInputStyle(dark)} /></div>

                        <span style={{fontSize:13, color:'var(--text-muted)', alignSelf:'center'}}>Remaining: {fmt(selected.budget.remaining)}</span>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {ctTab === 'milestones' && (
              <div>
                {!selected ? (
                  <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:40, textAlign:'center'}}>

                      <button onClick={advancePhase} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:theme.accent, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Advance Phase</button>

                    {showMilestoneForm && (

                          <div><label style={sharedLblStyle}>Target Date</label><input type="date" value={msForm.targetDate} onChange={e => setMsForm({...msForm, targetDate:e.target.value})} style={sharedInputStyle(dark)} /></div>
                        </div>
                        <div style={{display:'flex', gap:4}}><button onClick={addMilestone} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:theme.accent, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Add</button><button onClick={() => setShowMilestoneForm(false)} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--border)', color:'var(--text)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Cancel</button></div>
                      </div>
                    )}

                    <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:16}}>
                      {selected.milestones.length === 0 ? (
                        <p style={{fontSize:13, color:'var(--text-muted)', fontStyle:'italic', textAlign:'center', padding:20}}>No milestones yet</p>
                      ) : (
                        <MilestoneTimeline milestones={selected.milestones} onUpdate={updateMilestone} dark={dark} />
