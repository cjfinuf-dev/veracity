// Universal Table I/O — shared export/import utilities
// ═══════════════════════════════════════════════════

function universalExportCSV(rows, filename, columns) {
  if (!rows.length) return;
  const keys = columns || Object.keys(rows[0]).filter(k => k !== 'Actions');
  const esc = (v) => { const s = String(v ?? ''); return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const csv = [keys.join(','), ...rows.map(r => keys.map(k => esc(r[k])).join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename + '.csv'; a.click(); URL.revokeObjectURL(a.href);
}

function universalExportXLSX(rows, filename, columns) {
  if (!rows.length) return;
  const keys = columns || Object.keys(rows[0]).filter(k => k !== 'Actions');
  const esc = (v) => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let xml = '<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?>';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">';
  xml += '<Worksheet ss:Name="Sheet1"><Table>';
  xml += '<Row>' + keys.map(k => `<Cell><Data ss:Type="String">${esc(k)}</Data></Cell>`).join('') + '</Row>';
  rows.forEach(r => { xml += '<Row>' + keys.map(k => { const v = r[k]; const num = typeof v === 'number' && !isNaN(v); return `<Cell><Data ss:Type="${num ? 'Number' : 'String'}">${num ? v : esc(v)}</Data></Cell>`; }).join('') + '</Row>'; });
  xml += '</Table></Worksheet></Workbook>';
  const blob = new Blob([xml], { type: 'application/vnd.ms-excel' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename + '.xlsx'; a.click(); URL.revokeObjectURL(a.href);
}

function universalExportJSON(rows, filename) {
  if (!rows.length) return;
  const blob = new Blob([JSON.stringify(rows, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename + '.json'; a.click(); URL.revokeObjectURL(a.href);
}

function universalDownloadTemplate(columns, filename) {
  const csv = columns.join(',') + '\n';
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = (filename || 'import_template') + '.csv'; a.click(); URL.revokeObjectURL(a.href);
}

function parseImportCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return { error: 'CSV must have a header row and at least one data row.' };
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].match(/("([^"]|"")*"|[^,]*)/g) || [];
    const row = {};
    headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim().replace(/^"|"$/g, '').replace(/""/g, '"'); });
    rows.push(row);
  }
  return { headers, rows };
}

function TableIO({ data, filename, columns, templateColumns, onImport, onImportClick }) {
  const [showExport, setShowExport] = React.useState(false);
  const [showImportModal, setShowImportModal] = React.useState(false);
  const [importPreview, setImportPreview] = React.useState(null);
  const [importError, setImportError] = React.useState('');
  const exportRef = React.useRef(null);

  // Close export dropdown on outside click
  React.useEffect(() => {
    if (!showExport) return;
    const handler = (e) => { if (exportRef.current && !exportRef.current.contains(e.target)) setShowExport(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [showExport]);

  const cols = columns || (data && data.length ? Object.keys(data[0]).filter(k => k !== 'Actions') : []);
  const tplCols = templateColumns || cols;

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImportError(''); setImportPreview(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      if (file.name.endsWith('.json')) {
        try {
          const json = JSON.parse(text);
          const rows = Array.isArray(json) ? json : Object.values(json).find(v => Array.isArray(v)) || [];
          if (!rows.length) { setImportError('No records found in JSON.'); return; }
          setImportPreview(rows);
        } catch { setImportError('Invalid JSON file.'); }
      } else {
        const result = parseImportCSV(text);
        if (result.error) { setImportError(result.error); return; }
        setImportPreview(result.rows);
      }
    };
    reader.readAsText(file);
  };

  const confirmImport = (mode) => {
    if (!importPreview || !onImport) return;
    onImport(importPreview, mode);
    setShowImportModal(false); setImportPreview(null); setImportError('');
  };

  return (
    <div className="table-io">
      {/* Export button */}
      <div ref={exportRef} style={{position:'relative'}}>
        <button className="table-io-btn" data-active={showExport} title="Export" onClick={() => setShowExport(!showExport)}>
          {Icons.ioExport}
        </button>
        {showExport && (
          <div className="table-io-dropdown">
            <button onClick={() => { universalExportCSV(data, filename, cols); setShowExport(false); }}>CSV</button>
            <button onClick={() => { universalExportXLSX(data, filename, cols); setShowExport(false); }}>Excel (XLSX)</button>
            <button onClick={() => { universalExportJSON(data, filename); setShowExport(false); }}>JSON</button>
          </div>
        )}
      </div>

      {/* Import button */}
      {(onImport || onImportClick) && (
        <button className="table-io-btn" title="Import" onClick={() => {
          if (onImportClick) { onImportClick(); return; }
          setShowImportModal(true); setImportPreview(null); setImportError('');
        }}>
          {Icons.ioImport}
        </button>
      )}

      {/* Import modal */}
      {showImportModal && (
        <div className="auth-overlay" onClick={() => setShowImportModal(false)}>
          <div className="auth-modal" style={{maxWidth:580}} onClick={e => e.stopPropagation()}>
            <h3 style={{margin:'0 0 4px', fontSize:16, fontWeight:600, color:'var(--copper)'}}>Import Data</h3>
            <p style={{fontSize:12, color:'var(--text-muted)', margin:'0 0 12px'}}>Upload a CSV or JSON file with matching column headers.</p>
            <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:12}}>
              <button onClick={() => universalDownloadTemplate(tplCols, filename + '_template')} style={{fontSize:12, padding:'6px 12px', border:'1px solid var(--copper)', borderRadius:'var(--radius-sm)', background:'none', color:'var(--copper)', cursor:'pointer', fontFamily:'inherit', fontWeight:500, whiteSpace:'nowrap'}}>
                Download Template
              </button>
              <input type="file" accept=".csv,.json,.txt" onChange={handleFile} style={{fontSize:12}} />
            </div>
            {importError && <div style={{color:'#ef4444', fontSize:12, marginBottom:8}}>{importError}</div>}
            {importPreview && (
              <div>
                <div style={{fontSize:13, fontWeight:500, marginBottom:8}}>{importPreview.length} records ready</div>
                <div style={{maxHeight:200, overflow:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', marginBottom:12}}>
                  <table className="tool-table" style={{marginTop:0, fontSize:11}}>
                    <thead><tr>{Object.keys(importPreview[0]).slice(0,6).map(k => <th key={k}>{k}</th>)}{Object.keys(importPreview[0]).length > 6 && <th>...</th>}</tr></thead>
                    <tbody>{importPreview.slice(0,5).map((r, i) => <tr key={i}>{Object.keys(importPreview[0]).slice(0,6).map(k => <td key={k}>{String(r[k]||'').slice(0,30)}</td>)}{Object.keys(importPreview[0]).length > 6 && <td>...</td>}</tr>)}</tbody>
                  </table>
                  {importPreview.length > 5 && <div style={{fontSize:11, color:'var(--text-muted)', padding:4, textAlign:'center'}}>...and {importPreview.length - 5} more</div>}
                </div>
                <div style={{display:'flex', gap:8}}>
                  <button onClick={() => confirmImport('append')} style={{background:'var(--copper)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 16px', fontSize:12, cursor:'pointer', fontWeight:600, fontFamily:'inherit'}}>Append ({importPreview.length})</button>
                  <button onClick={() => confirmImport('replace')} style={{background:'none', border:'1px solid var(--copper)', color:'var(--copper)', borderRadius:'var(--radius-sm)', padding:'8px 16px', fontSize:12, cursor:'pointer', fontWeight:600, fontFamily:'inherit'}}>Replace All</button>
                  <button onClick={() => setShowImportModal(false)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'8px 16px', fontSize:12, cursor:'pointer', fontFamily:'inherit'}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function ToolExplainer({ theme }) {
  const [open, setOpen] = React.useState(false);
  const dark = useDarkMode();
  if (!theme || !theme.description) return null;
  const accent = theme.accent;
  const accentLight = dark ? theme.bg : theme.light;
  const accentBorder = dark ? `${accent}40` : theme.border;
  const exampleBg = dark ? `${accent}0F` : '#fff';
  return (
    <div style={{
      background: accentLight, border: `1.5px solid ${accentBorder}`,
      borderLeft: `4px solid ${accent}`,
      borderRadius: 'var(--radius-md)', marginBottom: 16, overflow: 'hidden',
    }}>
      <button onClick={() => setOpen(!open)} style={{
        width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '10px 16px', background: 'none', border: 'none', cursor: 'pointer',
        fontSize: 13, fontWeight: 600, color: accent,
      }}>
        <span>{open ? '\u25BC' : '\u25B6'} What is this?</span>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke={accent} strokeWidth="2" style={{transition:'transform 150ms', transform: open ? 'rotate(180deg)' : 'rotate(0deg)'}}><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      {open && (
        <div style={{ padding: '0 16px 14px', fontSize: 13, lineHeight: 1.7, color: 'var(--text)' }}>
          <p style={{ margin: '0 0 10px' }}>{theme.description}</p>
          <p style={{ margin: '0 0 10px' }}>
            <span style={{ fontWeight: 600, color: accent }}>Why it matters: </span>
            {theme.whyItMatters}
          </p>
          {theme.howToUse && (
            <p style={{ margin: '0 0 10px' }}>
              <span style={{ fontWeight: 600, color: accent }}>How to use: </span>
              {theme.howToUse}
            </p>
          )}
          {theme.example && (
            <div style={{
              background: exampleBg, border: `1px solid ${accentBorder}`, borderRadius: 'var(--radius-sm)',
              padding: '10px 14px', marginTop: 4,
            }}>
              <span style={{ fontWeight: 600, color: accent, fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.03em' }}>Example: </span>
              <span style={{ fontSize: 13 }}>{theme.example}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ToolHint({ theme, visible }) {
  const dark = useDarkMode();
  if (!visible) return null;
  const bg = dark ? `rgba(${parseInt(theme.accent.slice(1,3),16)},${parseInt(theme.accent.slice(3,5),16)},${parseInt(theme.accent.slice(5,7),16)},0.08)` : theme.light;
  const border = dark ? `rgba(${parseInt(theme.accent.slice(1,3),16)},${parseInt(theme.accent.slice(3,5),16)},${parseInt(theme.accent.slice(5,7),16)},0.25)` : theme.border;
  return (
    <div style={{
      display: 'flex', alignItems: 'flex-start', gap: 10,
      background: bg, border: `1px solid ${border}`,
      borderLeft: `3px solid ${theme.accent}`,
      borderRadius: 'var(--radius-md)', padding: '12px 16px',
      marginBottom: 16, fontSize: 13, color: dark ? 'rgba(255,255,255,0.7)' : 'var(--text)', lineHeight: 1.6,
    }}>
      <span style={{ color: theme.accent, fontWeight: 700, fontSize: 14, flexShrink: 0 }}>TIP</span>
      <span>{theme.hint}</span>
    </div>
  );
}

function sectionAllItems(sec) {
  return sec.subgroups ? sec.subgroups.flatMap(sg => sg.items) : (sec.items || []);
}

const ALL_TOOLS = Object.values(NAV_SECTIONS).flatMap(sec =>
  sectionAllItems(sec).map(item => ({ id: item.id, label: item.label, nav: item.nav, section: sec.label }))
);
const SECTION_COLORS = { Accounting: '#16a34a', Finance: '#3b82f6', 'Project Trackers': '#fbbf24' };

function viewToActiveId(view) {
  if (view === 'home') return 'home';
  if (view === 'asc-browse' || view === 'asc-detail') return 'asc';
  if (view === 'modules' || view === 'module-detail') return 'modules';
  if (view === 'dashboard' || view === 'detail' || view === 'reports') return 'dashboard';
  if (view === 'system-owner') return 'system-owner';
  return view;
}

function viewToSection(view) {
  const activeId = viewToActiveId(view);
  for (const [key, sec] of Object.entries(NAV_SECTIONS)) {
    if (sectionAllItems(sec).some(i => i.id === activeId)) return key;
  }
  return null;
}

function viewToSubgroup(view) {
  const activeId = viewToActiveId(view);
  for (const [, sec] of Object.entries(NAV_SECTIONS)) {
    if (!sec.subgroups) continue;
    for (const sg of sec.subgroups) {
      if (sg.items.some(i => i.id === activeId)) return sg.id;
    }
  }
  return null;
}

function NavRail({ view, onNavigate, onToggleHelp, onOpenSettings, showMobileHelp, navPinned, setNavPinned, activeSection, setActiveSection, activeSubgroup, setActiveSubgroup, user, onSignOut }) {
  const [hovered, setHovered] = useState(false);
  const leaveTimer = React.useRef(null);
  const subPanelRef = React.useRef(null);
  const thirdPanelRef = React.useRef(null);
  const expanded = navPinned || hovered;

  React.useEffect(() => {
    const root = document.documentElement;
    const ro = new ResizeObserver(() => {
      if (subPanelRef.current) root.style.setProperty('--nav-sub-width', subPanelRef.current.offsetWidth + 'px');
      if (thirdPanelRef.current) root.style.setProperty('--nav-third-width', thirdPanelRef.current.offsetWidth + 'px');
    });
    if (subPanelRef.current) ro.observe(subPanelRef.current);
    if (thirdPanelRef.current) ro.observe(thirdPanelRef.current);
    return () => ro.disconnect();
  }, []);
  const activeId = viewToActiveId(view);
  const viewSection = viewToSection(view);
  const viewSub = viewToSubgroup(view);

  const togglePin = () => {
    const next = !navPinned;
    setNavPinned(next);
    if (!next) setHovered(false);
    localStorage.setItem('veracity-nav-pinned', next ? '1' : '');
  };

  const handleSectionClick = (key) => {
    if (activeSection === key) {
      setActiveSection(null);
      setActiveSubgroup(null);
    } else {
      setActiveSection(key);
      setActiveSubgroup(null);
    }
  };

  const handleMouseEnter = () => {
    if (leaveTimer.current) { clearTimeout(leaveTimer.current); leaveTimer.current = null; }
    setHovered(true);
  };

  const handleMouseLeave = () => {
    if (navPinned) return;
    if (leaveTimer.current) clearTimeout(leaveTimer.current);
    leaveTimer.current = setTimeout(() => {
      setHovered(false);
      setActiveSection(null);
      setActiveSubgroup(null);
      leaveTimer.current = null;
    }, 120);
  };

  // Resolve what items to show in the third panel (only for sections with subgroups)
  const thirdPanelItems = (() => {
    if (!activeSection || !activeSubgroup) return null;
    const sec = NAV_SECTIONS[activeSection];
    if (!sec.subgroups) return null;
    const sg = sec.subgroups.find(s => s.id === activeSubgroup);
    return sg ? { label: sg.label, items: sg.items } : null;
  })();

  return (
    <React.Fragment>
      <nav className={`nav-rail ${expanded ? 'expanded' : ''}`} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave}>
        <div style={{display:'flex',alignItems:'center',width:'100%',justifyContent: expanded ? 'space-between' : 'center',paddingLeft: expanded ? '14px' : '0'}}>
          <div className="nav-rail-logo" onClick={() => { onNavigate('home'); setActiveSection(null); setActiveSubgroup(null); }} title="Veracity" style={expanded ? {width:'auto'} : {}}>
            <VeracityIcon size={40} variant="light" />
            {expanded && <span style={{fontFamily:"'Playfair Display', Georgia, serif", fontWeight:700, fontSize:17, letterSpacing:'-0.01em', color:'#fff', marginLeft:8, whiteSpace:'nowrap'}}>Veracity</span>}
          </div>
          <button className={`nav-rail-pin ${navPinned ? 'pinned' : ''}`} onClick={togglePin} title={navPinned ? 'Unpin sidebar' : 'Pin sidebar open'}>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
        </div>
        <div className="nav-rail-items">
          <button
            className={`nav-rail-item ${activeId === 'home' ? 'active' : ''}`}
            onClick={() => { onNavigate('home'); setActiveSection(null); setActiveSubgroup(null); }}
            data-tooltip="Home"
            data-icon="home"
          >
            {Icons.home}
            <span className="nav-rail-label">Home</span>
          </button>
          <div className="nav-section-divider" />
          {Object.entries(NAV_SECTIONS).map(([key, sec]) => (
            <button
              key={key}
              className={`nav-rail-item ${activeSection === key || viewSection === key ? 'active' : ''}`}
              onClick={() => handleSectionClick(key)}
              data-tooltip={sec.label}
              data-icon={key === 'finance' ? 'tvm' : key === 'accounting' ? 'asc' : 'dashboard'}
            >
              {sec.icon}
              <span className="nav-rail-label">{sec.label}</span>
              {expanded && <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" style={{marginLeft:'auto', marginRight:8, opacity:0.5, transition:'transform 150ms', transform: activeSection === key ? 'rotate(90deg)' : 'rotate(0deg)'}}><polyline points="9 18 15 12 9 6"/></svg>}
            </button>
          ))}
        </div>
        <div className="nav-rail-bottom">
          <button
            className={`nav-rail-item`}
            onClick={onOpenSettings}
            data-tooltip="Settings"
            data-icon="settings"
          >
            {Icons.settings}
            <span className="nav-rail-label">Settings</span>
          </button>
          {user && (
            <button className="nav-rail-item" onClick={onSignOut} data-tooltip="Sign Out" data-icon="signout" style={{color: '#B87333'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B87333" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span className="nav-rail-label">Sign Out</span>
            </button>
          )}
        </div>
      </nav>
      {/* Panel 2: Sub-panel — shows subgroup labels OR section items for non-subgroup sections */}
      <div ref={subPanelRef} className={`nav-sub-panel ${activeSection ? 'open' : ''}`} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave}>
        {activeSection && (() => {
          const sec = NAV_SECTIONS[activeSection];
          if (sec.subgroups) {
            return (
              <React.Fragment>
                <div className="nav-sub-panel-header">{sec.label}</div>
                {sec.subgroups.map(sg => (
                  <button
                    key={sg.id}
                    className={`nav-rail-item ${activeSubgroup === sg.id || viewSub === sg.id ? 'active' : ''}`}
                    onClick={() => setActiveSubgroup(activeSubgroup === sg.id ? null : sg.id)}
                  >
                    <span className="nav-rail-label">{sg.label}</span>
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" style={{marginLeft:'auto', marginRight:8, opacity:0.5, transition:'transform 150ms', transform: activeSubgroup === sg.id ? 'rotate(90deg)' : 'rotate(0deg)'}}><polyline points="9 18 15 12 9 6"/></svg>
                  </button>
                ))}
              </React.Fragment>
            );
          } else {
            return (
              <React.Fragment>
                <div className="nav-sub-panel-header">{sec.label}</div>
                {sec.items.map(item => (
                  <button
                    key={item.id}
                    className={`nav-rail-item ${activeId === item.id ? 'active' : ''}`}
                    onClick={() => { onNavigate(item.nav); setActiveSection(null); setActiveSubgroup(null); }}
                    data-icon={item.id}
                  >
                    {item.icon}
                    <span className="nav-rail-label">{item.label}</span>
                  </button>
                ))}
              </React.Fragment>
            );
          }
        })()}
      </div>
      {/* Panel 3: Third panel — shows items for active subgroup */}
      <div ref={thirdPanelRef} className={`nav-third-panel ${thirdPanelItems ? 'open' : ''}`} onMouseEnter={handleMouseEnter} onMouseLeave={handleMouseLeave}>
        {thirdPanelItems && (
          <React.Fragment>
            <div className="nav-sub-panel-header">{thirdPanelItems.label}</div>
            {thirdPanelItems.items.map(item => (
              <button
                key={item.id}
                className={`nav-rail-item ${activeId === item.id ? 'active' : ''}`}
                onClick={() => { onNavigate(item.nav); setActiveSection(null); setActiveSubgroup(null); }}
                data-icon={item.id}
              >
                {item.icon}
                <span className="nav-rail-label">{item.label}</span>
              </button>
            ))}
          </React.Fragment>
        )}
      </div>
    </React.Fragment>
  );
}

function NotificationPanel({ notifications, setNotifications, onClose }) {
  const [tab, setTab] = useState('all');
  const wrapRef = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [onClose]);

  const filtered = tab === 'all' ? notifications : notifications.filter(n => n.type === tab);
  const markAllRead = () => setNotifications(prev => prev.map(n => ({...n, read: true})));
  const markRead = (id) => setNotifications(prev => prev.map(n => n.id === id ? {...n, read: true} : n));

  const tabs = [
    { key: 'all', label: 'All' },
    { key: 'onboarding', label: 'Welcome' },
    { key: 'feature', label: 'Features' },
    { key: 'activity', label: 'Activity' },
    { key: 'system', label: 'System' },
  ];

  const iconBg = { onboarding: '#dbeafe', feature: '#fdf0e6', activity: '#fef3c7', system: '#f3e8ff' };

  return (
    <div className="notif-dropdown" ref={wrapRef}>
      <div className="notif-header">
        <h3>Notifications</h3>
        <button className="notif-mark-read" onClick={markAllRead}>Mark all read</button>
      </div>
      <div className="notif-tabs">
        {tabs.map(t => (
          <button key={t.key} className={`notif-tab ${tab === t.key ? 'active' : ''}`} onClick={() => setTab(t.key)}>{t.label}</button>
        ))}
      </div>
      <div className="notif-list">
        {filtered.length === 0 ? (
          <div className="notif-empty">No notifications</div>
        ) : filtered.map(n => (
          <div key={n.id} className={`notif-item ${!n.read ? 'unread' : ''}`} onClick={() => markRead(n.id)}>
            <div className="notif-icon" style={{background: iconBg[n.type] || '#f1f3f5'}}>{n.icon}</div>
            <div className="notif-content">
              <div className="notif-title">{n.title}</div>
              <div className="notif-desc">{n.desc}</div>
              <div className="notif-time">{n.time}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

            </div>

              <select className="settings-select" value={settings.glFiscalYearStart} onChange={e => updateSetting('glFiscalYearStart', parseInt(e.target.value))}>

                  <option key={i+1} value={i+1}>{m}</option>
                ))}
              </select>
            </div>
          </div>
          <div className="settings-section">
            <div className="settings-section-title">Data</div>
            <button className="settings-btn-reset" onClick={() => { resetSettings(); onClose(); }}>Reset All Settings</button>
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}

function AuthModal({ mode, onClose, onSwitch, onAuth }) {
  const [name, setName] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [confirm, setConfirm] = React.useState('');
  const [error, setError] = React.useState('');
  const isSignup = mode === 'signup';

  const handleSubmit = (e) => {
    e.preventDefault();
    setError('');
    if (!email || !password || (isSignup && (!name || !confirm))) { setError('Please fill in all fields.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('Please enter a valid email address.'); return; }
    if (password.length < 6) { setError('Password must be at least 6 characters.'); return; }

    const users = JSON.parse(localStorage.getItem('veracity-users') || '[]');

    if (isSignup) {
      if (confirm !== password) { setError('Passwords do not match.'); return; }
      if (users.find(u => u.email === email)) { setError('An account with this email already exists.'); return; }
      const newUser = { name, email, password: btoa(password) };
      users.push(newUser);
      localStorage.setItem('veracity-users', JSON.stringify(users));
      onAuth({ name, email });
    } else {
      const found = users.find(u => u.email === email);
      if (!found) { setError('No account found with this email.'); return; }
      if (atob(found.password) !== password) { setError('Incorrect password.'); return; }
      onAuth({ name: found.name, email: found.email });
    }
  };

  return (
    <div className="auth-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="auth-modal">
        <button className="auth-close" onClick={onClose}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <h2>{isSignup ? 'Create Account' : 'Welcome Back'}</h2>
        <p className="auth-subtitle">{isSignup ? 'Join Veracity to save your progress and preferences.' : 'Sign in to your Veracity account.'}</p>
        <form onSubmit={handleSubmit}>
          {isSignup && (
            <div className="auth-input-group">
              <label>Full Name</label>
              <input className="auth-input" type="text" placeholder="John Smith" value={name} onChange={e => setName(e.target.value)} />
            </div>
          )}
          <div className="auth-input-group">
            <label>Email Address</label>
            <input className="auth-input" type="email" placeholder="you@company.com" value={email} onChange={e => setEmail(e.target.value)} />
          </div>
          <div className="auth-input-group">
            <label>Password</label>
            <input className="auth-input" type="password" placeholder={isSignup ? 'Min. 6 characters' : 'Enter your password'} value={password} onChange={e => setPassword(e.target.value)} />
          </div>
          {isSignup && (
            <div className="auth-input-group">
              <label>Confirm Password</label>
              <input className="auth-input" type="password" placeholder="Re-enter your password" value={confirm} onChange={e => setConfirm(e.target.value)} />
            </div>
          )}
          {error && <p className="auth-error">{error}</p>}
          <button type="submit" className={`auth-btn ${isSignup ? 'auth-btn-secondary' : 'auth-btn-primary'}`}>
            {isSignup ? 'Create Account' : 'Sign In'}
          </button>
        </form>
        <div className="auth-switch">
          {isSignup ? 'Already have an account? ' : "Don't have an account? "}
          <button onClick={onSwitch}>{isSignup ? 'Sign In' : 'Create one'}</button>
        </div>
      </div>
    </div>
  );
}

const DEFAULT_COLUMNS = new Set(['customerName', 'address', 'currentStage', 'progressPct', 'contractValue', 'margin']);

// --- Full-model CSV column definitions (built dynamically from MILESTONES_TEMPLATE) ---
const COST_KEYS = ['equipment','labor','permits','design','overhead','other'];
const MAX_PAYMENT_SLOTS = 5;

function buildFullCSVColumns() {
  const cols = [];
  // Project info (10)
  cols.push('Customer Name','Street Address','City','State','ZIP','Phone','Email','System Size (kW)','Panel Count','Contract Value');
  // Costs (6)
  COST_KEYS.forEach(k => cols.push('Cost: ' + k.charAt(0).toUpperCase() + k.slice(1)));
  // Milestones (31 steps x 3 = 93)
  MILESTONES_TEMPLATE.forEach(m => {
    m.steps.forEach(s => {
      const prefix = m.name + ': ' + s;
      cols.push(prefix + ' (Done)', prefix + ' (Date)', prefix + ' (Notes)');
    });
  });
  // Payments (5 slots x 5 = 25)
  for (let i = 1; i <= MAX_PAYMENT_SLOTS; i++) {
    cols.push('Payment ' + i + ' Name','Payment ' + i + ' Trigger','Payment ' + i + ' Amount','Payment ' + i + ' Status','Payment ' + i + ' Date');
  }
  return cols;
}

const FULL_CSV_COLUMNS = buildFullCSVColumns();

function downloadTemplate() {
  const headers = FULL_CSV_COLUMNS;
  const escape = v => { const s = String(v ?? ''); return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s; };
  // Example row: filled project info, zero costs, blank milestones, one example payment
  const row = ['John Smith','123 Main St','Austin','TX','78701','(555) 234-5678','john@example.com','8.5','24','35000'];
  COST_KEYS.forEach(() => row.push('0'));
  MILESTONES_TEMPLATE.forEach(m => m.steps.forEach(() => { row.push('','',''); }));
  // Payment 1 example
  row.push('Deposit','exploration','5000','pending','');
  // Payments 2-5 blank
  for (let i = 2; i <= MAX_PAYMENT_SLOTS; i++) { row.push('','','','',''); }
  const csv = [headers.map(escape).join(','), row.map(escape).join(',')].join('\n');
  downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8;' }), 'Veracity_Import_Template.csv');
}

function importFullCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { error: 'CSV must have a header row and at least one data row.' };
  const parseRow = (line) => {
    const result = []; let current = ''; let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { result.push(current.trim()); current = ''; }
        else { current += ch; }
      }
    }
    result.push(current.trim());
    return result;
  };

  const headers = parseRow(lines[0]);
  // Build a lookup: normalized header -> column index
  const headerMap = {};
  headers.forEach((h, i) => { headerMap[h.trim().toLowerCase()] = i; });

  // Check we have at least Customer Name
  const nameIdx = headerMap['customer name'];
  if (nameIdx === undefined) return { error: 'Missing required "Customer Name" column.' };

  // Pre-build milestone lookup: { normalizedPrefix -> { mi, si } }
  const milestoneLookup = {};
  MILESTONES_TEMPLATE.forEach((m, mi) => {
    m.steps.forEach((s, si) => {
      const prefix = (m.name + ': ' + s).toLowerCase();
      milestoneLookup[prefix] = { mi, si };
    });
  });

  const projects = []; const errors = [];
  for (let r = 1; r < lines.length; r++) {
    const vals = parseRow(lines[r]);
    const get = (label) => { const idx = headerMap[label.toLowerCase()]; return idx !== undefined ? (vals[idx] || '') : ''; };

    const customerName = get('Customer Name');
    if (!customerName) { errors.push('Row ' + (r+1) + ': missing Customer Name, skipped.'); continue; }

    // Build project via createProject for defaults, then overlay
    const proj = createProject({
      customerName,
      street: get('Street Address'),
      city: get('City'),
      state: get('State'),
      zip: get('ZIP'),
      phone: get('Phone'),
      email: get('Email'),
      systemSize: get('System Size (kW)'),
      panelCount: get('Panel Count'),
      contractValue: get('Contract Value'),
    });

    // Costs
    COST_KEYS.forEach(k => {
      const v = get('Cost: ' + k.charAt(0).toUpperCase() + k.slice(1));
      if (v) proj.costs[k] = parseFloat(v) || 0;
    });

    // Milestones
    MILESTONES_TEMPLATE.forEach((m, mi) => {
      m.steps.forEach((s, si) => {
        const prefix = m.name + ': ' + s;
        const done = get(prefix + ' (Done)');
        const date = get(prefix + ' (Date)');
        const notes = get(prefix + ' (Notes)');
        if (done && done.toLowerCase() === 'yes') {
          proj.milestones[mi].steps[si].completed = true;
          proj.milestones[mi].steps[si].completedDate = date || new Date().toISOString();
        }
        if (notes) proj.milestones[mi].steps[si].notes = notes;
      });
    });

    // Payments
    for (let i = 1; i <= MAX_PAYMENT_SLOTS; i++) {
      const name = get('Payment ' + i + ' Name');
      const trigger = get('Payment ' + i + ' Trigger');
      const amount = get('Payment ' + i + ' Amount');
      const status = get('Payment ' + i + ' Status');
      const date = get('Payment ' + i + ' Date');
      if (name || amount) {
        proj.payments.push({
          id: Date.now() + i,
          milestoneName: name,
          triggerStage: trigger,
          amount: parseFloat(amount) || 0,
          status: (status && status.toLowerCase() === 'remitted') ? 'remitted' : 'pending',
          remittedDate: (status && status.toLowerCase() === 'remitted') ? (date || new Date().toISOString()) : null,
          notes: ''
        });
      }
    }

    projects.push(proj);
  }
  return { projects, errors };
}

function exportFullCSV(projects) {
  const headers = FULL_CSV_COLUMNS;
  const escape = v => { const s = String(v ?? ''); return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const rows = projects.map(p => {
    const row = [
      p.customerName, p.street, p.city, p.state, p.zip, p.phone, p.email,
      p.systemSize, p.panelCount, p.contractValue
    ];
    COST_KEYS.forEach(k => row.push(p.costs[k] || 0));
    (p.milestones || []).forEach(m => {
      m.steps.forEach(s => {
        row.push(s.completed ? 'yes' : '', s.completedDate || '', s.notes || '');
      });
    });
    for (let i = 0; i < MAX_PAYMENT_SLOTS; i++) {
      const pay = (p.payments || [])[i];
      if (pay) {
        row.push(pay.milestoneName || '', pay.triggerStage || '', pay.amount || '', pay.status || 'pending', pay.remittedDate || '');
      } else {
        row.push('','','','','');
      }
    }
    return row.map(escape).join(',');
  });
  const csv = [headers.map(escape).join(','), ...rows].join('\n');
  downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8;' }), `Veracity_Full_Export_${getDateStamp()}.csv`);
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function getDateStamp() {
  return new Date().toISOString().slice(0, 10);
}

function ReportsView({ projects, onImport }) {

  const [importResult, setImportResult] = useState(null);
  const fileRef = useRef(null);

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      const result = importFullCSV(evt.target.result);
      if (result.error) { setImportResult({ error: result.error }); return; }
      onImport(result.projects);
      setImportResult({ count: result.projects.length, errors: result.errors });
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const toggleColumn = (key) => {
    setSelectedColumns(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  };
  const selectAll = () => setSelectedColumns(new Set(EXPORT_COLUMNS.map(c => c.key)));
  const deselectAll = () => setSelectedColumns(new Set());

  const activeCols = EXPORT_COLUMNS.filter(c => selectedColumns.has(c.key));
  const groups = [...new Set(EXPORT_COLUMNS.map(c => c.group))];

    const row = {};
    activeCols.forEach(c => { row[c.label] = c.get(p); });
    return row;
  });

  const exportCSV = () => {
    const data = buildData();
    if (!data.length) return;
    const headers = activeCols.map(c => c.label);
    const escape = v => { const s = String(v ?? ''); return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s; };
    const csv = [headers.map(escape).join(','), ...data.map(row => headers.map(h => escape(row[h])).join(','))].join('\n');
    downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8;' }), `Veracity_Projects_${getDateStamp()}.csv`);
  };

    const data = buildData();

    XLSX.utils.book_append_sheet(wb, ws, 'Projects');
    XLSX.writeFile(wb, `Veracity_Projects_${getDateStamp()}.xlsx`);
  };

  const exportJSON = () => {
    const data = buildData();
    if (!data.length) return;
    downloadBlob(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), `Veracity_Projects_${getDateStamp()}.json`);
  };

  return (
    <div>
      <div className="section-header"><h2>Reports & Export</h2><p>Select columns, preview data, and export</p></div>

        <button className="btn btn-secondary btn-sm" onClick={selectAll}>Select All</button>
        <button className="btn btn-secondary btn-sm" onClick={deselectAll}>Deselect All</button>
      </div>

      <div className="reports-controls">
        {groups.map(group => (
          <div className="reports-group" key={group}>
            <h4>{group}</h4>
            {EXPORT_COLUMNS.filter(c => c.group === group).map(c => (
              <label className="reports-toggle" key={c.key}>
                <input type="checkbox" checked={selectedColumns.has(c.key)} onChange={() => toggleColumn(c.key)} />
                {c.label}
              </label>
            ))}
          </div>
        ))}
      </div>

      {!projects.length ? (
        <div className="empty-state"><h3>No projects yet</h3><p>Create a project to see data here.</p></div>
      ) : activeCols.length === 0 ? (
        <div className="empty-state"><h3>No columns selected</h3><p>Check at least one column above to preview data.</p></div>
      ) : (
        <div style={{ overflowX: 'auto' }}>
          <table className="dashboard-table">
            <thead><tr>{activeCols.map(c => <th key={c.key} style={{ textAlign: 'left' }}>{c.label}</th>)}</tr></thead>

          <button className="btn-export" onClick={() => exportFullCSV(projects)} style={{borderColor:'var(--brand-green)',color:'var(--accent-text)',fontWeight:700}}>Export Full CSV</button>
        </div>

  );
}

function HeroSearch({ onSelectASC, onSelectModule }) {
  const [query, setQuery] = React.useState('');
  const [focused, setFocused] = React.useState(false);
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    function handleClick(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setFocused(false); }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const results = React.useMemo(() => {
    if (query.length < 2) return [];
    const q = query.toLowerCase();
    return SEARCH_INDEX.filter(e => e.label.toLowerCase().includes(q) || e.tags.toLowerCase().includes(q)).slice(0, 6);
  }, [query]);

  function handleSelect(item) {
    if (item.type === 'codification') onSelectASC(item.id);
    else onSelectModule(item.id);
    setQuery(''); setFocused(false);
  }

  return (
    <div className="hero-search-wrap" ref={wrapRef}>
      <div className="hero-search-tagline">Have a financial or accounting question? Let's find your answer.</div>
      <div style={{position:'relative'}}>

        <input className="hero-search-input" placeholder="What can we help you look up today?" value={query}
          onChange={e => setQuery(e.target.value)} onFocus={() => setFocused(true)}
          onKeyDown={e => { if (e.key === 'Escape') { setFocused(false); setQuery(''); } }} />
      </div>
      {focused && results.length > 0 && (
        <div className="hero-search-dropdown">
          {results.map((r, i) => (
            <div key={i} className="hero-search-item" onClick={() => handleSelect(r)}>

      )}

  );
}

// --- Tool 1: TVM Calculator ---
function TVMCalculator() {
  const theme = TOOL_THEMES.tvm;
  const TVM_KEY = 'veracity-tvm-inputs';
  const _tvm = (() => { try { return JSON.parse(localStorage.getItem(TVM_KEY)) || {}; } catch { return {}; } })();
  const [pv, setPv] = React.useState(_tvm.pv ?? '');
  const [fv, setFv] = React.useState(_tvm.fv ?? '');
  const [pmt, setPmt] = React.useState(_tvm.pmt ?? '');
  const [rate, setRate] = React.useState(_tvm.rate ?? '');
  const [n, setN] = React.useState(_tvm.n ?? '');
  const [result, setResult] = React.useState(null);
  React.useEffect(() => { localStorage.setItem(TVM_KEY, JSON.stringify({pv,fv,pmt,rate,n})); }, [pv,fv,pmt,rate,n]);

  const calculate = () => {
    const vals = { pv: pv ? parseFloat(pv) : null, fv: fv ? parseFloat(fv) : null, pmt: pmt ? parseFloat(pmt) : null, rate: rate ? parseFloat(rate)/100 : null, n: n ? parseFloat(n) : null };
    const blank = Object.keys(vals).filter(k => vals[k] === null);
    if (blank.length !== 1) { setResult({ error: 'Leave exactly one field blank to solve for it.' }); return; }
    const solve = blank[0];
    const r = vals.rate, np = vals.n, p = vals.pv, f = vals.fv, pm = vals.pmt;
    try {
      let ans;
      if (solve === 'fv') ans = { label: 'Future Value', value: -p * Math.pow(1+r, np) - pm * ((Math.pow(1+r, np)-1)/r) };
      else if (solve === 'pv') ans = { label: 'Present Value', value: (-f - pm * ((Math.pow(1+r, np)-1)/r)) / Math.pow(1+r, np) };
      else if (solve === 'pmt') ans = { label: 'Payment', value: (-p * Math.pow(1+r, np) - f) / ((Math.pow(1+r, np)-1)/r) };
      else if (solve === 'n') ans = { label: 'Periods', value: Math.log((-f*r + pm) / (p*r + pm)) / Math.log(1+r) };
      else if (solve === 'rate') {
        // Newton's method for rate
        let guess = 0.05;
        for (let i = 0; i < 100; i++) {
          const pwr = Math.pow(1+guess, np);
          const fvCalc = p * pwr + pm * ((pwr-1)/guess) + f;
          const dfv = p * np * Math.pow(1+guess, np-1) + pm * ((np * Math.pow(1+guess, np-1) * guess - (pwr-1)) / (guess*guess));
          const next = guess - fvCalc / dfv;
          if (Math.abs(next - guess) < 1e-10) { guess = next; break; }
          guess = next;
        }
        ans = { label: 'Rate per Period', value: guess, isRate: true };
      }
      setResult(ans);
    } catch(e) { setResult({ error: 'Cannot solve with given inputs.' }); }
  };


  return (
    <div className="tool-container" style={{background: theme.bg}}>
      <PageHeader accent={theme.accent}>
        <div className="tool-header">
          <div className="tool-icon" style={{background: theme.light, color: theme.accent}}>{Icons.tvm}</div>
          <h2>Time Value of Money Calculator</h2>
        </div>
        <ToolHint theme={theme} visible={!result} />
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <div className="tool-row">
          <div className="tool-input-group"><label>Present Value (PV)</label><input className="tool-input" type="number" value={pv} onChange={e => setPv(e.target.value)} placeholder="e.g. -1000" /></div>
          <div className="tool-input-group"><label>Future Value (FV)</label><input className="tool-input" type="number" value={fv} onChange={e => setFv(e.target.value)} placeholder="e.g. 1628.89" /></div>
        </div>
        <div className="tool-row-3">
          <div className="tool-input-group"><label>Payment (PMT)</label><input className="tool-input" type="number" value={pmt} onChange={e => setPmt(e.target.value)} placeholder="e.g. 0" /></div>
          <div className="tool-input-group"><label>Rate per Period (%)</label><input className="tool-input" type="number" value={rate} onChange={e => setRate(e.target.value)} placeholder="e.g. 5" /></div>
          <div className="tool-input-group"><label>Number of Periods</label><input className="tool-input" type="number" value={n} onChange={e => setN(e.target.value)} placeholder="e.g. 10" /></div>
        </div>
        <div style={{display:'flex', gap:8, marginTop:8}}>
          <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={calculate}>Calculate</button>
          <button className="tool-btn tool-btn-secondary" onClick={() => { setPv(''); setFv(''); setPmt(''); setRate(''); setN(''); setResult(null); }}>Clear</button>
        </div>
        {result && (result.error
          ? <div className="tool-feedback-wrong" style={{marginTop:16}}>{result.error}</div>
          : <div className="tool-result" style={{background: theme.light, border: '1px solid ' + theme.border, borderLeft: '3px solid ' + theme.accent}}><h3>{result.label}</h3><div className="big-number" style={{color: theme.accent}}>{result.isRate ? (result.value * 100).toFixed(4) + '%' : fmt(result.value)}</div></div>
        )}
      </div>
    </div>
  );
}

// --- Tool 2: Loan Amortization ---
function AmortizationView() {
  const theme = TOOL_THEMES.amort;
  const AMORT_KEY = 'veracity-amort-inputs';
  const _amort = (() => { try { return JSON.parse(localStorage.getItem(AMORT_KEY)) || {}; } catch { return {}; } })();
  const [principal, setPrincipal] = React.useState(_amort.principal ?? '200000');
  const [annualRate, setAnnualRate] = React.useState(_amort.annualRate ?? '6');
  const [termYears, setTermYears] = React.useState(_amort.termYears ?? '30');
  const [schedule, setSchedule] = React.useState(null);
  React.useEffect(() => { localStorage.setItem(AMORT_KEY, JSON.stringify({principal,annualRate,termYears})); }, [principal,annualRate,termYears]);

  const calculate = () => {
    const P = parseFloat(principal), r = parseFloat(annualRate) / 100 / 12, n = parseFloat(termYears) * 12;
    if (!P || !r || !n) return;
    const payment = P * (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
    let balance = P, totalInterest = 0, rows = [];
    for (let i = 1; i <= n; i++) {
      const interest = balance * r;
      const prinPaid = payment - interest;
      balance -= prinPaid;
      totalInterest += interest;
      rows.push({ num: i, payment, principal: prinPaid, interest, balance: Math.max(0, balance) });
    }
    setSchedule({ payment, totalInterest, totalPaid: payment * n, rows });
  };

  return (
    <div className="tool-container" style={{background: theme.bg}}>
      <PageHeader accent={theme.accent}>
        <div className="tool-header">
          <div className="tool-icon" style={{background: theme.light, color: theme.accent}}>{Icons.amort}</div>
          <h2>Loan Amortization Schedule</h2>
        </div>
        <ToolHint theme={theme} visible={!schedule} />
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <div className="tool-row-3">
          <div className="tool-input-group"><label>Loan Amount ($)</label><input className="tool-input" type="number" value={principal} onChange={e => setPrincipal(e.target.value)} /></div>
          <div className="tool-input-group"><label>Annual Rate (%)</label><input className="tool-input" type="number" value={annualRate} onChange={e => setAnnualRate(e.target.value)} /></div>
          <div className="tool-input-group"><label>Term (Years)</label><input className="tool-input" type="number" value={termYears} onChange={e => setTermYears(e.target.value)} /></div>
        </div>
        <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={calculate}>Generate Schedule</button>
      </div>
      {schedule && (
        <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
          <div className="tool-row-3" style={{marginBottom:16}}>
            <div className="tool-result" style={{marginTop:0, background: theme.light, border: '1px solid ' + theme.border, borderLeft: '3px solid ' + theme.accent}}><h3>Monthly Payment</h3><div className="big-number" style={{color: theme.accent}}>{fmt(schedule.payment)}</div></div>
            <div className="tool-result" style={{marginTop:0, background: theme.light, border: '1px solid ' + theme.border, borderLeft: '3px solid ' + theme.accent}}><h3>Total Interest</h3><div className="big-number" style={{color: theme.accent}}>{fmt(schedule.totalInterest)}</div></div>
            <div className="tool-result" style={{marginTop:0, background: theme.light, border: '1px solid ' + theme.border, borderLeft: '3px solid ' + theme.accent}}><h3>Total Paid</h3><div className="big-number" style={{color: theme.accent}}>{fmt(schedule.totalPaid)}</div></div>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
            <TableIO data={schedule.rows.map(r => ({Period:r.num, Payment:r.payment, Principal:r.principal, Interest:r.interest, Balance:r.balance}))} filename="amortization_schedule" />
          </div>
          <div className="tool-table-wrap">
            <table className="tool-table">
              <thead><tr><th style={{background: theme.accent}}>#</th><th style={{background: theme.accent}}>Payment</th><th style={{background: theme.accent}}>Principal</th><th style={{background: theme.accent}}>Interest</th><th style={{background: theme.accent}}>Balance</th></tr></thead>
              <tbody>{schedule.rows.map(r => {
                const f = v => '$' + v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
                return <tr key={r.num}><td>{r.num}</td><td>{f(r.payment)}</td><td>{f(r.principal)}</td><td>{f(r.interest)}</td><td>{f(r.balance)}</td></tr>;
              })}</tbody>

  );
}

// --- Tool 3: Depreciation Schedule ---
function DepreciationView() {
  const theme = TOOL_THEMES.deprec;
  const DEPREC_KEY = 'veracity-deprec-inputs';
  const _dep = (() => { try { return JSON.parse(localStorage.getItem(DEPREC_KEY)) || {}; } catch { return {}; } })();
  const [cost, setCost] = React.useState(_dep.cost ?? '100000');
  const [salvage, setSalvage] = React.useState(_dep.salvage ?? '10000');
  const [life, setLife] = React.useState(_dep.life ?? '5');
  const [method, setMethod] = React.useState(_dep.method ?? 'sl');
  const [schedule, setSchedule] = React.useState(null);
  React.useEffect(() => { localStorage.setItem(DEPREC_KEY, JSON.stringify({cost,salvage,life,method})); }, [cost,salvage,life,method]);

  const MACRS = { '5': [0.2,0.32,0.192,0.1152,0.1152,0.0576], '7': [0.1429,0.2449,0.1749,0.1249,0.0893,0.0892,0.0893,0.0446], '15': [0.05,0.095,0.0855,0.077,0.0693,0.0623,0.059,0.059,0.0591,0.059,0.0591,0.059,0.0591,0.059,0.0591,0.0295] };

  const calculate = () => {
    const c = parseFloat(cost), s = parseFloat(salvage), n = parseInt(life);
    if (!c || n <= 0) return;
    let rows = [], accum = 0;
    if (method === 'sl') {
      const annual = (c - s) / n;
      for (let y = 1; y <= n; y++) { accum += annual; rows.push({ year: y, dep: annual, accum, book: c - accum }); }
    } else if (method === 'ddb') {
      let book = c; const rate = 2 / n;
      for (let y = 1; y <= n; y++) {
        let dep = book * rate;
        if (book - dep < s) dep = book - s;
        if (dep < 0) dep = 0;
        accum += dep; book -= dep;
        rows.push({ year: y, dep, accum, book });
      }
    } else {
      const rates = MACRS[method.replace('macrs','')];
      if (!rates) return;
      for (let y = 0; y < rates.length; y++) {
        const dep = c * rates[y]; accum += dep;
        rows.push({ year: y + 1, dep, accum, book: c - accum });
      }
    }
    setSchedule(rows);
  };


  return (
    <div className="tool-container" style={{background: theme.bg}}>
      <PageHeader accent={theme.accent}>
        <div className="tool-header">
          <div className="tool-icon" style={{background: theme.light, color: theme.accent}}>{Icons.deprec}</div>
          <h2>Depreciation Schedule</h2>
        </div>
        <ToolHint theme={theme} visible={!schedule} />
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <div className="tool-row">
          <div className="tool-input-group"><label>Asset Cost ($)</label><input className="tool-input" type="number" value={cost} onChange={e => setCost(e.target.value)} /></div>
          <div className="tool-input-group"><label>Salvage Value ($)</label><input className="tool-input" type="number" value={salvage} onChange={e => setSalvage(e.target.value)} /></div>
        </div>
        <div className="tool-row">
          <div className="tool-input-group"><label>Useful Life (Years)</label><input className="tool-input" type="number" value={life} onChange={e => setLife(e.target.value)} /></div>
          <div className="tool-input-group"><label>Method</label>
            <select className="tool-input tool-select" value={method} onChange={e => setMethod(e.target.value)}>
              <option value="sl">Straight-Line</option>
              <option value="ddb">Double Declining Balance</option>
              <option value="macrs5">MACRS 5-Year</option>
              <option value="macrs7">MACRS 7-Year</option>
              <option value="macrs15">MACRS 15-Year</option>
            </select>
          </div>
        </div>
        <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={calculate}>Calculate</button>
      </div>
      {schedule && (
        <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
            <TableIO data={schedule.map(r => ({Year:r.year, Depreciation:r.dep, Accumulated:r.accum, 'Book Value':r.book}))} filename="depreciation_schedule" />
          </div>
          <div className="tool-table-wrap">
            <table className="tool-table">
              <thead><tr><th style={{background: theme.accent}}>Year</th><th style={{background: theme.accent}}>Depreciation</th><th style={{background: theme.accent}}>Accumulated</th><th style={{background: theme.accent}}>Book Value</th></tr></thead>
              <tbody>{schedule.map(r => (
                <tr key={r.year}><td>{r.year}</td><td>{fmt(r.dep)}</td><td>{fmt(r.accum)}</td><td>{fmt(r.book)}</td></tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function BreakEvenView() {

  const _be = (() => { try { return JSON.parse(localStorage.getItem(BE_KEY)) || {}; } catch { return {}; } })();
  const [fixed, setFixed] = React.useState(_be.fixed ?? '50000');

  const [price, setPrice] = React.useState(_be.price ?? '25');

// --- Tool 6: Financial Ratios Dashboard ---
function RatiosDashboard() {
  const theme = TOOL_THEMES.ratios;
  const RATIOS_KEY = 'veracity-ratios-inputs';
  const _defaultInputs = { totalAssets:'', currentAssets:'', inventory:'', totalLiabilities:'', currentLiabilities:'', equity:'', revenue:'', cogs:'', netIncome:'', cashFromOps:'', receivables:'', payables:'' };
  const [inputs, setInputs] = React.useState(() => { try { return {..._defaultInputs, ...JSON.parse(localStorage.getItem(RATIOS_KEY))}; } catch { return _defaultInputs; } });
  const [ratios, setRatios] = React.useState(null);
  React.useEffect(() => { localStorage.setItem(RATIOS_KEY, JSON.stringify(inputs)); }, [inputs]);

  const set = (k, v) => setInputs(p => ({...p, [k]: v}));

  const calculate = () => {
    const v = {}; Object.keys(inputs).forEach(k => v[k] = parseFloat(inputs[k]) || 0);
    const r = {
      liquidity: [
        { name: 'Current Ratio', value: v.currentLiabilities ? v.currentAssets / v.currentLiabilities : 0, good: [1.5, 3], fmt: 'x' },
        { name: 'Quick Ratio', value: v.currentLiabilities ? (v.currentAssets - v.inventory) / v.currentLiabilities : 0, good: [1, 2.5], fmt: 'x' },
        { name: 'Cash Ratio', value: v.currentLiabilities ? v.cashFromOps / v.currentLiabilities : 0, good: [0.5, 2], fmt: 'x' },
      ],
      leverage: [
        { name: 'Debt-to-Equity', value: v.equity ? v.totalLiabilities / v.equity : 0, good: [0, 2], fmt: 'x' },
        { name: 'Debt-to-Assets', value: v.totalAssets ? v.totalLiabilities / v.totalAssets : 0, good: [0, 0.6], fmt: '%' },
        { name: 'Equity Multiplier', value: v.equity ? v.totalAssets / v.equity : 0, good: [1, 3], fmt: 'x' },
      ],
      profitability: [
        { name: 'Gross Margin', value: v.revenue ? (v.revenue - v.cogs) / v.revenue : 0, good: [0.3, 1], fmt: '%' },
        { name: 'Net Profit Margin', value: v.revenue ? v.netIncome / v.revenue : 0, good: [0.05, 1], fmt: '%' },
        { name: 'Return on Assets', value: v.totalAssets ? v.netIncome / v.totalAssets : 0, good: [0.05, 1], fmt: '%' },
        { name: 'Return on Equity', value: v.equity ? v.netIncome / v.equity : 0, good: [0.1, 1], fmt: '%' },
      ],
      efficiency: [
        { name: 'Asset Turnover', value: v.totalAssets ? v.revenue / v.totalAssets : 0, good: [0.5, 5], fmt: 'x' },
        { name: 'Inventory Turnover', value: v.inventory ? v.cogs / v.inventory : 0, good: [4, 20], fmt: 'x' },
        { name: 'Receivables Turnover', value: v.receivables ? v.revenue / v.receivables : 0, good: [6, 30], fmt: 'x' },
      ],
    };
    setRatios(r);
  };

  const colorClass = (val, [lo, hi]) => val >= lo && val <= hi ? 'ratio-good' : val < lo ? 'ratio-bad' : 'ratio-warn';
  const fmtVal = (val, fmt) => fmt === '%' ? (val * 100).toFixed(1) + '%' : val.toFixed(2) + 'x';
  const labels = { totalAssets:'Total Assets', currentAssets:'Current Assets', inventory:'Inventory', totalLiabilities:'Total Liabilities', currentLiabilities:'Current Liabilities', equity:"Shareholders' Equity", revenue:'Revenue', cogs:'COGS', netIncome:'Net Income', cashFromOps:'Cash from Operations', receivables:'Accounts Receivable', payables:'Accounts Payable' };

  return (
    <div className="tool-container" style={{background: theme.bg}}>
      <PageHeader accent={theme.accent}>
        <div className="tool-header">
          <div className="tool-icon" style={{background: theme.light, color: theme.accent}}>{Icons.ratios}</div>
          <h2>Financial Ratios Dashboard</h2>
        </div>
        <ToolHint theme={theme} visible={!ratios} />
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <div className="tool-row-3">{Object.keys(inputs).map(k => (
          <div className="tool-input-group" key={k}><label>{labels[k]}</label><input className="tool-input" type="number" value={inputs[k]} onChange={e => set(k, e.target.value)} placeholder="0" /></div>
        ))}</div>
        <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={calculate}>Calculate Ratios</button>
      </div>
      {ratios && (
        <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
            <TableIO data={Object.entries(ratios).flatMap(([group, items]) => items.map(r => ({Category:group, Ratio:r.name, Value:fmtVal(r.value, r.fmt)})))} filename="financial_ratios" />
          </div>
          {Object.entries(ratios).map(([group, items]) => (
            <div className="ratio-group" key={group}>
              <h4 style={{textTransform:'capitalize'}}>{group}</h4>
              {items.map(r => (
                <div className="ratio-row" key={r.name}>
                  <span>{r.name}</span>
                  <span className={`ratio-value ${colorClass(r.fmt === '%' ? r.value : r.value, r.good)}`}>{fmtVal(r.value, r.fmt)}</span>
                </div>
              ))}
            </div>
          ))}
          <div style={{fontSize:11, color:'var(--text-muted)', marginTop:12}}>
            <span className="ratio-good" style={{fontWeight:600}}>Green</span> = healthy range, <span className="ratio-warn" style={{fontWeight:600}}>Amber</span> = above range, <span className="ratio-bad" style={{fontWeight:600}}>Red</span> = below range
          </div>
        </div>
      )}
    </div>
  );
}

function LeaseClassifierView() {
  const dark = useDarkMode();
  const questions = [
    { key: 'transfer', text: 'Does the lease transfer ownership of the underlying asset to the lessee by the end of the lease term?' },
    { key: 'bargain', text: 'Does the lease grant the lessee an option to purchase the underlying asset that the lessee is reasonably certain to exercise?' },
    { key: 'majorLife', text: 'Is the lease term for the major part (typically >= 75%) of the remaining economic life of the underlying asset?' },
    { key: 'fairValue', text: 'Is the present value of lease payments plus any residual value guarantee >= substantially all (typically >= 90%) of the fair value of the underlying asset?' },
    { key: 'specialized', text: 'Is the underlying asset of such a specialized nature that it is expected to have no alternative use to the lessor at the end of the lease term?' },
  ];
  const theme = TOOL_THEMES.lease;
  const LEASE_KEY = 'veracity-lease-answers';
  const [answers, setAnswers] = React.useState(() => { try { return JSON.parse(localStorage.getItem(LEASE_KEY)) || {}; } catch { return {}; } });
  const [result, setResult] = React.useState(null);
  React.useEffect(() => { localStorage.setItem(LEASE_KEY, JSON.stringify(answers)); }, [answers]);

  const classify = () => {
    const allAnswered = questions.every(q => answers[q.key] !== undefined);
    if (!allAnswered) { setResult({ error: 'Please answer all 5 questions.' }); return; }
    const isFinance = questions.some(q => answers[q.key] === true);
    const triggers = questions.filter(q => answers[q.key] === true).map(q => q.text);
    setResult({ type: isFinance ? 'Finance' : 'Operating', triggers });
  };

  return (
    <div className="tool-container" style={{background: theme.bg}}>
      <PageHeader accent={theme.accent}>
        <div className="tool-header">
          <div className="tool-icon" style={{background: theme.light, color: theme.accent}}>{Icons.lease}</div>
          <h2>ASC 842 Lease Classifier</h2>
        </div>
        <ToolHint theme={theme} visible={!result} />
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <p style={{fontSize:13, color:'var(--text-muted)', marginBottom:20}}>Answer each question to determine whether a lease should be classified as a Finance lease or an Operating lease under ASC 842. If <strong>any</strong> criterion is met, the lease is classified as Finance.</p>
        {questions.map((q, i) => (
          <div key={q.key} style={{marginBottom:16, padding:12, background: answers[q.key] === true ? (dark ? 'rgba(205,170,125,0.12)' : '#fdf0e6') : answers[q.key] === false ? 'var(--surface2)' : 'var(--surface)', borderRadius:'var(--radius-md)', border:'1px solid var(--border)'}}>
            <p style={{fontSize:13, fontWeight:500, marginBottom:8}}>{i+1}. {q.text}</p>
            <div style={{display:'flex', gap:8}}>
              <button className={`tool-btn ${answers[q.key] === true ? 'tool-btn-primary' : 'tool-btn-secondary'}`} style={{padding:'4px 16px', fontSize:13}} onClick={() => setAnswers(p => ({...p, [q.key]: true}))}>Yes</button>
              <button className={`tool-btn ${answers[q.key] === false ? 'tool-btn-primary' : 'tool-btn-secondary'}`} style={{padding:'4px 16px', fontSize:13}} onClick={() => setAnswers(p => ({...p, [q.key]: false}))}>No</button>
            </div>
          </div>
        ))}
        <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={classify}>Classify Lease</button>
        {result && (result.error
          ? <div className="tool-feedback-wrong" style={{marginTop:16}}>{result.error}</div>
          : <div className={result.type === 'Finance' ? 'tool-result' : ''} style={{marginTop:16, padding:16, borderRadius:'var(--radius-md)', background: result.type === 'Finance' ? (dark ? 'rgba(251,191,36,0.1)' : '#fef3c7') : (dark ? 'rgba(205,170,125,0.1)' : '#fdf0e6'), border: `1px solid ${result.type === 'Finance' ? (dark ? 'rgba(251,191,36,0.25)' : '#fde68a') : (dark ? 'rgba(205,170,125,0.25)' : '#e8d5c0')}`}}>
              <h3 style={{fontSize:18, fontWeight:700, color: result.type === 'Finance' ? (dark ? '#fbbf24' : '#92400e') : 'var(--brand-tan)', marginBottom:8}}>Classification: {result.type} Lease</h3>
              {result.type === 'Finance'
                ? <div><p style={{fontSize:13, marginBottom:8}}>This lease meets {result.triggers.length} finance lease criterion(a):</p><ul style={{paddingLeft:20, fontSize:13}}>{result.triggers.map((t, i) => <li key={i} style={{marginBottom:4}}>{t}</li>)}</ul></div>
                : <p style={{fontSize:13}}>None of the five ASC 842 finance lease criteria are met. This lease is classified as an <strong>Operating Lease</strong>.</p>
              }
            </div>
        )}
      </div>
    </div>
  );
}

function AccountSearchInput({ value, onChange, onFocus }) {
  const [query, setQuery] = useState(value);

  const ref = useRef(null);
  useEffect(() => { setQuery(value); }, [value]);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setFocused(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const filtered = query ? COMMON_ACCOUNTS.filter(a => a.name.toLowerCase().includes(query.toLowerCase())).slice(0, 6) : COMMON_ACCOUNTS.slice(0, 6);

function JECalculator({ onUse }) {
  const [display, setDisplay] = useState('0');
  const [expr, setExpr] = useState('');
  const [show, setShow] = useState(false);
  const press = (val) => {
    if (val === 'C') { setDisplay('0'); setExpr(''); return; }
    if (val === 'BS') { const n = expr.slice(0, -1); setExpr(n); setDisplay(n || '0'); return; }
    if (val === '=') {
      try {
        const sanitized = expr.replace(/[^0-9+\-*/.() ]/g, '');
        if (!sanitized) return;
        const result = Function('"use strict"; return (' + sanitized + ')')();
        const rounded = Math.round(result * 100) / 100;
        setDisplay(String(rounded));
        setExpr(String(rounded));
      } catch { setDisplay('Error'); }
      return;
    }
    const next = expr + val;
    setExpr(next);
    setDisplay(next);
  };
  const btns = ['7','8','9','/', '4','5','6','*', '1','2','3','-', '0','.','BS','+'];
  if (!show) return <button className="tool-btn tool-btn-secondary" onClick={() => setShow(true)} style={{marginTop:8}}>Calculator</button>;
  return (
    <div style={{marginTop:12}}>
      <button className="tool-btn tool-btn-secondary" onClick={() => setShow(false)} style={{marginBottom:8}}>Hide Calculator</button>
      <div className="je-calculator">
        <div className="je-calc-display">{display}</div>
        {btns.map(b => <button key={b} className={`je-calc-btn${['/','*','-','+'].includes(b) ? ' op' : ''}`} onClick={() => press(b)}>{b === 'BS' ? '\u232B' : b}</button>)}
        <button className="je-calc-btn" onClick={() => press('C')} style={{gridColumn:'span 2'}}>C</button>
        <button className="je-calc-btn op" onClick={() => press('=')} style={{gridColumn:'span 2'}}>=</button>
        {onUse && <button className="tool-btn tool-btn-primary" onClick={() => onUse(display)} style={{gridColumn:'1 / -1', marginTop:4}}>Use Value</button>}
      </div>
    </div>
  );
}

function randAmount(min, max, step) {
  const steps = Math.floor((max - min) / step);
  return min + Math.floor(Math.random() * (steps + 1)) * step;
}

function JEPracticeView() {
  const categories = Object.keys(JE_QUESTION_BANK);
  const levels = ['Beginner', 'Intermediate', 'Advanced', 'Master'];
  const JEP_KEY = 'veracity-je-practice';
  const _jep = (() => { try { return JSON.parse(localStorage.getItem(JEP_KEY)) || {}; } catch { return {}; } })();
  const [category, setCategory] = useState(_jep.category && categories.includes(_jep.category) ? _jep.category : categories[0]);
  const [level, setLevel] = useState(_jep.level && levels.includes(_jep.level) ? _jep.level : 'Beginner');
  React.useEffect(() => { localStorage.setItem(JEP_KEY, JSON.stringify({category,level})); }, [category,level]);
  const [currentQ, setCurrentQ] = useState(null);
  const [rows, setRows] = React.useState([{ account: '', debit: '', credit: '' }, { account: '', debit: '', credit: '' }]);
  const [feedback, setFeedback] = React.useState(null);
  const lastFocusRef = React.useRef(null);

  const generateQuestion = (cat, lvl) => {
    const c = cat || category;
    const l = lvl || level;
    const templates = JE_QUESTION_BANK[c][l];
    const tmpl = templates[Math.floor(Math.random() * templates.length)];
    setCurrentQ(tmpl());
    setRows([{ account: '', debit: '', credit: '' }, { account: '', debit: '', credit: '' }]);
    setFeedback(null);
  };

  useEffect(() => { generateQuestion(category, level); }, [category, level]);

  const updateRow = (i, field, val) => setRows(prev => prev.map((r, idx) => idx === i ? { ...r, [field]: val } : r));
  const addRow = () => setRows(prev => [...prev, { account: '', debit: '', credit: '' }]);
  const removeRow = (i) => rows.length > 2 && setRows(prev => prev.filter((_, idx) => idx !== i));

  const check = () => {
    if (!currentQ) return;
    const totalDebit = rows.reduce((s, r) => s + (parseFloat(r.debit) || 0), 0);
    const totalCredit = rows.reduce((s, r) => s + (parseFloat(r.credit) || 0), 0);
    if (totalDebit === 0 && totalCredit === 0) { setFeedback({ correct: false, msg: 'Enter debit and credit amounts.' }); return; }
    if (Math.abs(totalDebit - totalCredit) > 0.01) { setFeedback({ correct: false, msg: `Debits (${fmt(totalDebit)}) do not equal Credits (${fmt(totalCredit)}).` }); return; }
    const userDebits = rows.filter(r => parseFloat(r.debit) > 0).map(r => ({ account: r.account.trim().toLowerCase(), amount: parseFloat(r.debit) }));
    const userCredits = rows.filter(r => parseFloat(r.credit) > 0).map(r => ({ account: r.account.trim().toLowerCase(), amount: parseFloat(r.credit) }));
    const ansDebits = currentQ.answer.filter(r => r.debit > 0).map(r => ({ account: r.account.toLowerCase(), amount: r.debit }));
    const ansCredits = currentQ.answer.filter(r => r.credit > 0).map(r => ({ account: r.account.toLowerCase(), amount: r.credit }));
    const matchBoth = (user, ans) => ans.every(a => user.some(u => u.account === a.account && Math.abs(u.amount - a.amount) < 0.01));
    const matchAccOnly = (user, ans) => ans.every(a => user.some(u => u.account === a.account));
    const debitsMatch = matchBoth(userDebits, ansDebits);
    const creditsMatch = matchBoth(userCredits, ansCredits);
    if (debitsMatch && creditsMatch) {
      setFeedback({ correct: true, msg: 'Correct! Accounts and amounts all match.' });
    } else if (matchAccOnly(userDebits, ansDebits) && matchAccOnly(userCredits, ansCredits)) {
      setFeedback({ correct: false, msg: 'Correct accounts, but one or more amounts are wrong. Check your numbers.' });
    } else {
      setFeedback({ correct: false, msg: `One or more accounts don't match. Expected accounts: ${currentQ.answer.map(r => r.account).join(', ')}` });
    }
  };

  if (!currentQ) return null;

  const theme = TOOL_THEMES.jePractice;
  return (
    <div className="tool-container" style={{background: theme.bg}}>
      <PageHeader accent={theme.accent}>
        <div className="tool-header">
          <div className="tool-icon" style={{background: theme.light, color: theme.accent}}>{Icons.jePractice}</div>
          <h2>Journal Entry Practice</h2>
        </div>
        <ToolHint theme={theme} visible={true} />
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <div className="je-selectors">
          <div className="tool-input-group">
            <label>Category</label>
            <select className="tool-input tool-select" value={category} onChange={e => setCategory(e.target.value)}>
              {categories.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="tool-input-group">
            <label>Difficulty <span className={`je-level-badge lvl-${level}`}>{level}</span></label>
            <select className="tool-input tool-select" value={level} onChange={e => setLevel(e.target.value)}>
              {levels.map(l => <option key={l} value={l}>{l}</option>)}
            </select>
          </div>
          <button className="tool-btn tool-btn-secondary" onClick={() => generateQuestion()} style={{height:38, whiteSpace:'nowrap'}}>New Question</button>
        </div>
        <div style={{padding:12, background:'var(--surface2)', borderRadius:'var(--radius-md)', marginBottom:16}}>
          <p style={{fontSize:15, fontWeight:600}}>{currentQ.title}</p>
        </div>
        <table className="tool-table" style={{marginBottom:12}}>
          <thead><tr><th style={{background: theme.accent}}>Account</th><th style={{width:120, background: theme.accent}}>Debit</th><th style={{width:120, background: theme.accent}}>Credit</th><th style={{width:40, background: theme.accent}}></th></tr></thead>
          <tbody>{rows.map((r, i) => (
            <tr key={i}>
              <td><AccountSearchInput value={r.account} onChange={val => updateRow(i, 'account', val)} /></td>
              <td><input className="tool-input" type="number" value={r.debit} onChange={e => updateRow(i, 'debit', e.target.value)} onFocus={() => { lastFocusRef.current = { row: i, field: 'debit' }; }} placeholder="0" style={{border:'none', background:'transparent', padding:4, textAlign:'right'}} /></td>
              <td><input className="tool-input" type="number" value={r.credit} onChange={e => updateRow(i, 'credit', e.target.value)} onFocus={() => { lastFocusRef.current = { row: i, field: 'credit' }; }} placeholder="0" style={{border:'none', background:'transparent', padding:4, textAlign:'right'}} /></td>
              <td><button onClick={() => removeRow(i)} style={{background:'none', border:'none', color:'var(--red)', cursor:'pointer', fontSize:16}}>x</button></td>
            </tr>
          ))}</tbody>
        </table>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          <button className="tool-btn tool-btn-secondary" onClick={addRow}>+ Add Row</button>
          <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={check}>Check Answer</button>
          <button className="tool-btn tool-btn-secondary" onClick={() => { setFeedback(null); setRows(currentQ.answer.map(r => ({ account: r.account, debit: r.debit || '', credit: r.credit || '' }))); }}>Show Answer</button>
        </div>
        {feedback && <div className={feedback.correct ? 'tool-feedback-correct' : 'tool-feedback-wrong'} style={{marginTop:16}}>{feedback.msg}</div>}
        <JECalculator onUse={(val) => {
          const ref = lastFocusRef.current;
          if (ref) updateRow(ref.row, ref.field, val);
        }} />
      </div>
    </div>
  );
}

// --- Shared GL Helpers ---
const GL_STORAGE_KEY = 'veracity-gl-entries';
const AP_CATEGORY_TO_ACCOUNT = {
  'Rent/Lease': '6160 Rent Expense', 'Utilities': '6220 Utilities Expense', 'Supplies': '6130 Office Supplies Expense',
  'Insurance': '6070 Insurance Expense', 'Professional Services': '6090 Legal & Professional Fees',
  'Software/SaaS': '6180 Software Expense', 'Equipment': '1640 Equipment',
  'Marketing': '6000 Advertising & Marketing Expense', 'Inventory': '1200 Inventory', 'Other': '6120 Miscellaneous Expense',
};
function getJournalPrefix(source) {
  if (!source || source === 'manual') return 'GJ';
  if (source.startsWith('ap-')) return 'AP';
  if (source.startsWith('ar-')) return 'AR';
  if (source.startsWith('reversal-')) return 'RJ';
  if (source.startsWith('closing-')) return 'CJ';
  if (source.startsWith('import-')) return 'OB';
  return 'GJ';
}
function nextJournalNum(allEntries, source) {
  const prefix = getJournalPrefix(source);
  const existing = allEntries.filter(e => getJournalPrefix(e.source) === prefix);
  const maxSeq = existing.reduce((m, e) => Math.max(m, e.journalSeq || 0), 0);
  return { prefix, journalSeq: maxSeq + 1, journalNum: prefix + '-' + String(maxSeq + 1) };
}
function postToGL(entry) {
  const all = JSON.parse(localStorage.getItem(GL_STORAGE_KEY) || '[]');
  const jn = nextJournalNum(all, entry.source);
  all.push({ ...entry, id: entry.id || Date.now().toString() + Math.random().toString(36).slice(2, 6), ...jn });
  localStorage.setItem(GL_STORAGE_KEY, JSON.stringify(all));
}
function removeGLBySource(sourcePrefix) {
  const all = JSON.parse(localStorage.getItem(GL_STORAGE_KEY) || '[]');
  localStorage.setItem(GL_STORAGE_KEY, JSON.stringify(all.filter(e => !e.source || !e.source.startsWith(sourcePrefix))));
}

// --- Tool 10: Accounts Payable ---
function APManagementView() {
  const theme = TOOL_THEMES.ap;
  const STORAGE_KEY = 'veracity-ap-bills';
  const AP_VENDORS_KEY = 'veracity-ap-vendors';
  const CATEGORIES = ['Rent/Lease', 'Utilities', 'Supplies', 'Insurance', 'Professional Services', 'Software/SaaS', 'Equipment', 'Marketing', 'Inventory', 'Other'];
  const STATUS_OPTIONS = ['Unpaid', 'Scheduled', 'Partial', 'Paid', 'Overdue'];
  const TERMS_OPTIONS = ['Due on Receipt', 'Net 15', 'Net 30', 'Net 45', 'Net 60', 'Net 90', 'Custom'];
