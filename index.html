                  <button onClick={() => setDeleteConfirmId(null)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'8px 24px', fontSize:13, cursor:'pointer', fontWeight:600}}>Cancel</button>
                  <button onClick={() => { handleDelete(deleteConfirmId); setDeleteConfirmId(null); setViewId(null); }} style={{background:'#ef4444', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 24px', fontSize:13, cursor:'pointer', fontWeight:600}}>Delete Permanently</button>
                </div>
              </div>
            </div>
          );
        })()}

        {/* Invoice Detail View */}
        {viewId && (() => {
          const inv = invoices.find(i => i.id === viewId);
          if (!inv) { setViewId(null); return null; }
          const remaining = inv.amount - (inv.amountPaid || 0);
          const daysUntil = Math.ceil((new Date(inv.dueDate) - new Date()) / 86400000);
          const urgency = inv.status === 'Paid' || inv.status === 'Written Off' ? '' : daysUntil < 0 ? `${Math.abs(daysUntil)}d overdue` : daysUntil === 0 ? 'Due today' : daysUntil <= 7 ? `Due in ${daysUntil}d` : '';
          const fieldBox = {background: dark ? 'var(--surface)' : '#f9fafb', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'10px 14px'};
          return (
            <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:24}}>
              <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:20}}>
                <button onClick={() => { setViewId(null); setPayingId(null); setEditing(false); setEditId(null); }} style={{background:'none', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 12px', cursor:'pointer', color:'var(--text-muted)', fontSize:13, fontWeight:600}}>&#8592; Back</button>
                <h3 style={{margin:0, fontSize:18, fontWeight:700, color:'var(--text)'}}>Invoice Detail</h3>
                <span style={{ display:'inline-block', padding:'4px 14px', borderRadius:12, fontSize:12, fontWeight:600, background: statusColor(inv.status) + '18', color: statusColor(inv.status), marginLeft:'auto' }}>{inv.status}</span>
                {urgency && <span style={{fontSize:12, color: daysUntil < 0 ? '#ef4444' : daysUntil <= 3 ? '#f59e0b' : 'var(--text-muted)', fontWeight:600}}>{urgency}</span>}
              </div>

              {/* Info Grid */}
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:24}}>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Customer</div>{editing ? <input value={form.customer} onChange={e => setForm(f => ({...f, customer: e.target.value}))} style={inputStyle} /> : <div style={{fontSize:15, fontWeight:600, color:'var(--rust)'}}>{inv.customer}</div>}</div>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Amount</div>{editing ? <input type="number" step="0.01" value={form.amount} onChange={e => setForm(f => ({...f, amount: e.target.value}))} style={inputStyle} /> : <div style={{fontSize:20, fontWeight:700, color:'var(--brand-tan)', fontVariantNumeric:'tabular-nums'}}>{fmt(inv.amount)}</div>}</div>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Remaining</div><div style={{fontSize:20, fontWeight:700, color: remaining > 0 ? '#8b5cf6' : 'var(--forest-green)', fontVariantNumeric:'tabular-nums'}}>{fmt(remaining)}</div></div>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Invoice #</div>{editing ? <input value={form.invoiceNum} onChange={e => setForm(f => ({...f, invoiceNum: e.target.value}))} style={inputStyle} /> : <div style={{fontSize:14, fontWeight:500}}>{inv.invoiceNum || '—'}</div>}</div>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Invoice Date</div>{editing ? <input type="date" value={form.invoiceDate} onChange={e => handleInvDateChange(e.target.value)} style={inputStyle} /> : <div style={{fontSize:14}}>{inv.invoiceDate || '—'}</div>}</div>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Due Date</div>{editing ? <input type="date" value={form.dueDate} onChange={e => setForm(f => ({...f, dueDate: e.target.value}))} style={inputStyle} readOnly={form.terms !== 'Custom'} /> : <div style={{fontSize:14}}>{inv.dueDate}</div>}</div>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Terms</div>{editing ? <select value={form.terms} onChange={e => handleTermsChange(e.target.value)} style={inputStyle}>{TERMS_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}</select> : <div style={{fontSize:14}}>{inv.terms || '—'}</div>}</div>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Category</div>{editing ? <select value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))} style={inputStyle}>{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select> : <div style={{fontSize:14}}>{inv.category}</div>}</div>
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Description</div>{editing ? <input value={form.description} onChange={e => setForm(f => ({...f, description: e.target.value}))} style={inputStyle} /> : <div style={{fontSize:14}}>{inv.description || '—'}</div>}</div>
                {editing && <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Status</div><select value={form.status} onChange={e => setForm(f => ({...f, status: e.target.value}))} style={inputStyle}>{STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}</select></div>}
                <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Recurring</div>{editing ? <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:14}}><input type="checkbox" checked={form.recurring} onChange={e => setForm(f => ({...f, recurring: e.target.checked}))} /> Yes</label> : <div style={{fontSize:14, color: inv.recurring ? '#8b5cf6' : 'var(--text-muted)'}}>{inv.recurring ? inv.frequency : 'No'}</div>}</div>
                {editing && form.recurring && <div style={fieldBox}><div style={{fontSize:11, color:'var(--text-muted)', marginBottom:4}}>Frequency</div><select value={form.frequency} onChange={e => setForm(f => ({...f, frequency: e.target.value}))} style={inputStyle}>{FREQ_OPTIONS.map(f => <option key={f} value={f}>{f}</option>)}</select></div>}
              </div>

              {/* Actions */}
              <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:20, paddingTop:16, borderTop:'1px solid var(--border)'}}>
                {editing ? (<>
                  <button onClick={() => { handleSubmit(); setEditing(false); }} className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)', padding:'8px 18px', fontSize:13}}>Save Changes</button>
                  <button onClick={() => setEditing(false)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer'}}>Cancel</button>
                </>) : (<>
                  {inv.status !== 'Paid' && inv.status !== 'Written Off' && <button onClick={() => { setPayingId(payingId === inv.id ? null : inv.id); setPayAmt(remaining.toFixed(2)); }} style={{background:'var(--forest-green)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600}}>Receive Payment</button>}
                  <button onClick={() => { setForm({ customer: inv.customer, amount: inv.amount.toString(), invoiceDate: inv.invoiceDate || '', dueDate: inv.dueDate, terms: inv.terms || 'Custom', category: inv.category, description: inv.description || '', invoiceNum: inv.invoiceNum || '', status: inv.status, recurring: inv.recurring || false, frequency: inv.frequency || 'Monthly' }); setEditId(inv.id); setEditing(true); }} style={{background:'none', border:'1px solid var(--brand-tan)', color:'var(--brand-tan)', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600}}>Edit Invoice</button>
                  {inv.status !== 'Paid' && inv.status !== 'Written Off' && remaining > 0 && <button onClick={() => { if (confirm(`Write off $${remaining.toFixed(2)} for ${inv.customer}?`)) handleWriteOff(inv.id); }} style={{background:'none', border:'1px solid #6B7280', color:'#6B7280', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600}}>Write Off</button>}
                  {inv.recurring && <button onClick={() => handleGenerateNext(inv)} style={{background:'none', border:'1px solid #8b5cf6', color:'#8b5cf6', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600}}>Generate Next Period</button>}
                  <button onClick={() => setDeleteConfirmId(inv.id)} style={{background:'none', border:'1px solid #ef4444', color:'#ef4444', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600, marginLeft:'auto'}}>Delete</button>
                </>)}
              </div>

              {/* Payment mini-form */}
              {payingId === inv.id && (
                <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:16, padding:12, background: dark ? 'var(--surface)' : '#f9fafb', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)'}}>
                  <span style={{fontSize:13, color:'var(--text-muted)'}}>Payment received:</span>
                  <input type="number" step="0.01" value={payAmt} onChange={e => setPayAmt(e.target.value)} style={{...inputStyle, width:140}} />
                  <button onClick={() => handlePayment(inv.id)} className="tool-btn tool-btn-primary" style={{background:'var(--forest-green)', color:'#fff', padding:'8px 18px', fontSize:13}}>Record</button>
                  <button onClick={() => setPayingId(null)} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:13}}>Cancel</button>
                </div>
              )}

              {/* Payment History */}
              {inv.payments && inv.payments.length > 0 && (
                <div>
                  <div style={{fontSize:13, fontWeight:600, color:'var(--text)', marginBottom:8}}>Payment History</div>
                  <div style={{border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', overflow:'hidden'}}>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', padding:'8px 12px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'1px solid var(--border)'}}>
                      <span>Date</span><span style={{textAlign:'right'}}>Amount</span><span style={{textAlign:'right'}}>Type</span>
                    </div>
                    {inv.payments.map((p, i) => (
                      <div key={i} style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', padding:'8px 12px', fontSize:13, borderBottom: i < inv.payments.length - 1 ? '1px solid var(--border)' : 'none'}}>
                        <span>{p.date}</span><span style={{textAlign:'right', fontVariantNumeric:'tabular-nums'}}>{fmt(p.amount)}</span><span style={{textAlign:'right', color: p.type === 'write-off' ? '#6B7280' : 'var(--forest-green)'}}>{p.type === 'write-off' ? 'Write-off' : 'Payment'}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {/* Invoices List */}
        {!viewId && (filtered.length === 0 ? (
          <div style={{textAlign:'center', padding:40, color:'var(--text-muted)', fontSize:14}}>
            {invoices.length === 0 ? 'No invoices yet. Click "+ Create Invoice" to get started.' : 'No invoices match this filter.'}
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {filtered.map(inv => (
              <div key={inv.id} onClick={() => setViewId(inv.id)} style={{ background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderLeft:`4px solid ${statusColor(inv.status)}`, borderRadius:'var(--radius-md)', padding:'12px 16px', cursor:'pointer', transition:'box-shadow 0.15s' }} onMouseEnter={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)'} onMouseLeave={e => e.currentTarget.style.boxShadow = 'none'}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 120px 100px', alignItems:'center', gap:10}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:600, fontSize:14, color:'var(--rust)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                      {inv.customer}
                      {inv.invoiceNum && <span style={{fontSize:11, color:'var(--charcoal-slate)', marginLeft:8}}>#{inv.invoiceNum}</span>}
                      {inv.recurring && <span style={{fontSize:10, color:'#8b5cf6', marginLeft:6}} title={`Recurring ${inv.frequency}`}>&#x21bb;</span>}
                    </div>
                    <div style={{fontSize:12, color:'var(--text-muted)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                      {inv.category}{inv.terms ? ` \u00b7 ${inv.terms}` : ''}{inv.description ? ` \u2014 ${inv.description}` : ''}
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700, fontSize:16, color:'var(--brand-tan)', fontVariantNumeric:'tabular-nums'}}>{fmt(inv.amount)}</div>
                    <div style={{fontSize:11, color:'var(--text-muted)'}}>Due {inv.dueDate}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <span style={{ display:'inline-block', padding:'3px 10px', borderRadius:12, fontSize:11, fontWeight:600, background: statusColor(inv.status) + '18', color: statusColor(inv.status) }}>{inv.status}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        ))}
      </>}

      {arTab === 'aging' && (
        <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
          <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'10px 14px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'2px solid var(--border)'}}>
            <span>Customer</span><span style={{textAlign:'right', color:'var(--forest-green)'}}>Current</span><span style={{textAlign:'right', color:'#f59e0b'}}>1-30</span><span style={{textAlign:'right', color:'#f97316'}}>31-60</span><span style={{textAlign:'right', color:'#ef4444'}}>61-90</span><span style={{textAlign:'right', color:'#dc2626'}}>90+</span><span style={{textAlign:'right'}}>Total</span>
          </div>
          {agingData.length === 0 ? (
            <div style={{padding:30, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>No outstanding invoices.</div>
          ) : (<>
            {agingData.map(r => (
              <div key={r.customer} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'8px 14px', borderBottom:'1px solid var(--border)', fontSize:12}}>
                <span style={{color:'var(--text)', fontWeight:500, cursor:'pointer', textDecoration:'underline'}} onClick={() => { setCustomerFilter(r.customer); setArTab('invoices'); }}>{r.customer}</span>
                <span style={{textAlign:'right', color: r.current ? 'var(--forest-green)' : 'var(--text-muted)'}}>{r.current ? fmt(r.current) : '-'}</span>
                <span style={{textAlign:'right', color: r.d30 ? '#f59e0b' : 'var(--text-muted)'}}>{r.d30 ? fmt(r.d30) : '-'}</span>
                <span style={{textAlign:'right', color: r.d60 ? '#f97316' : 'var(--text-muted)'}}>{r.d60 ? fmt(r.d60) : '-'}</span>
                <span style={{textAlign:'right', color: r.d90 ? '#ef4444' : 'var(--text-muted)'}}>{r.d90 ? fmt(r.d90) : '-'}</span>
                <span style={{textAlign:'right', color: r.d90p ? '#dc2626' : 'var(--text-muted)'}}>{r.d90p ? fmt(r.d90p) : '-'}</span>
                <span style={{textAlign:'right', fontWeight:600, color:'var(--text)'}}>{fmt(r.total)}</span>
              </div>
            ))}
            <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'10px 14px', borderTop:'2px solid var(--border)', fontSize:12, fontWeight:700, background: dark ? 'var(--surface)' : '#f9fafb'}}>
              <span style={{color:'var(--text)'}}>TOTALS</span>
              <span style={{textAlign:'right', color:'var(--forest-green)'}}>{fmt(agingTotals.current)}</span>
              <span style={{textAlign:'right', color:'#f59e0b'}}>{fmt(agingTotals.d30)}</span>
              <span style={{textAlign:'right', color:'#f97316'}}>{fmt(agingTotals.d60)}</span>
              <span style={{textAlign:'right', color:'#ef4444'}}>{fmt(agingTotals.d90)}</span>
              <span style={{textAlign:'right', color:'#dc2626'}}>{fmt(agingTotals.d90p)}</span>
              <span style={{textAlign:'right', color:'var(--text)'}}>{fmt(agingTotals.total)}</span>
            </div>
          </>)}
        </div>
      )}

      {arTab === 'customers' && (
        <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
          <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'10px 14px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'2px solid var(--border)'}}>
            <span>Customer</span><span style={{textAlign:'right'}}>Total Billed</span><span style={{textAlign:'right'}}>Collected</span><span style={{textAlign:'right'}}>Outstanding</span><span style={{textAlign:'right'}}>Written Off</span><span style={{textAlign:'center'}}>Invoices</span><span style={{textAlign:'right'}}>Avg Days</span>
          </div>
          {customerData.length === 0 ? (
            <div style={{padding:30, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>No customers yet.</div>
          ) : customerData.map(c => (
            <div key={c.customer} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'8px 14px', borderBottom:'1px solid var(--border)', fontSize:12}}>
              <span style={{color:'var(--text)', fontWeight:500, cursor:'pointer', textDecoration:'underline'}} onClick={() => { setCustomerFilter(c.customer); setArTab('invoices'); }}>{c.customer}</span>
              <span style={{textAlign:'right', color:'var(--text)'}}>{fmt(c.billed)}</span>
              <span style={{textAlign:'right', color:'var(--forest-green)'}}>{fmt(c.collected)}</span>
              <span style={{textAlign:'right', color: c.outstanding > 0 ? '#f59e0b' : 'var(--text-muted)', fontWeight: c.outstanding > 0 ? 600 : 400}}>{fmt(c.outstanding)}</span>
              <span style={{textAlign:'right', color: c.writtenOff > 0 ? '#6B7280' : 'var(--text-muted)'}}>{c.writtenOff > 0 ? fmt(c.writtenOff) : '-'}</span>
              <span style={{textAlign:'center', color:'var(--text)'}}>{c.count}</span>
              <span style={{textAlign:'right', color:'var(--text-muted)'}}>{c.avgDays !== null ? `${c.avgDays}d` : '-'}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// --- Mutable COA Infrastructure ---
const COA_STORAGE_KEY = 'veracity-coa-custom';
function getActiveCOA() {
  try { const stored = localStorage.getItem(COA_STORAGE_KEY); if (stored) return JSON.parse(stored); } catch {}
  return DEFAULT_CHART_OF_ACCOUNTS;
}
function saveActiveCOA(coa) { localStorage.setItem(COA_STORAGE_KEY, JSON.stringify(coa)); window.dispatchEvent(new Event('coa-updated')); }
function getAllAccounts(coa) { return Object.entries(coa || getActiveCOA()).flatMap(([cat, accts]) => accts.map(a => ({ account: a, category: cat }))); }
