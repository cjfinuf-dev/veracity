                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

function CustomTrackerView() {
  const theme = TOOL_THEMES.customTracker;
  const dark = useDarkMode();
  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Custom Tracker</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />
      <ToolHint theme={theme} />

      {(() => {
        const TEMPLATE_KEY = 'veracity-custom-templates';
        const PROJECT_KEY = 'veracity-custom-projects';

        const STARTER_TEMPLATES = [
          { id: 'solar-1', name: 'Solar Installation', icon: '☀️', stages: [{id:'s1',name:'Site Survey',order:1,color:'#3b82f6'},{id:'s2',name:'Permitting',order:2,color:'#8b5cf6'},{id:'s3',name:'Installation',order:3,color:'#fbbf24'},{id:'s4',name:'Inspection',order:4,color:'#fb923c'},{id:'s5',name:'Activation',order:5,color:'#22c55e'}], customFields: [{id:'f1',name:'System Size (kW)',type:'number',required:true},{id:'f2',name:'Panel Brand',type:'text',required:false},{id:'f3',name:'Inverter Type',type:'select',options:['String','Micro','Hybrid'],required:true}], milestoneTemplate: [{name:'Site Survey Complete',stageId:'s1',daysFromStart:7},{name:'Permits Approved',stageId:'s2',daysFromStart:21},{name:'Installation Complete',stageId:'s3',daysFromStart:35}], budgetEnabled: true, notesEnabled: true },
          { id: 'software-1', name: 'Software Project', icon: '💻', stages: [{id:'s1',name:'Planning',order:1,color:'#3b82f6'},{id:'s2',name:'Development',order:2,color:'#8b5cf6'},{id:'s3',name:'Testing',order:3,color:'#fbbf24'},{id:'s4',name:'Deployment',order:4,color:'#22c55e'}], customFields: [{id:'f1',name:'Tech Stack',type:'text',required:true},{id:'f2',name:'Team Size',type:'number',required:false},{id:'f3',name:'Deployment Type',type:'select',options:['Cloud','On-Premise','Hybrid'],required:true}], milestoneTemplate: [{name:'Requirements Complete',stageId:'s1',daysFromStart:14},{name:'Alpha Release',stageId:'s2',daysFromStart:45},{name:'Beta Testing',stageId:'s3',daysFromStart:60}], budgetEnabled: true, notesEnabled: true },
          { id: 'event-1', name: 'Event Planning', icon: '🎉', stages: [{id:'s1',name:'Concept',order:1,color:'#3b82f6'},{id:'s2',name:'Venue',order:2,color:'#8b5cf6'},{id:'s3',name:'Marketing',order:3,color:'#fbbf24'},{id:'s4',name:'Logistics',order:4,color:'#fb923c'},{id:'s5',name:'Execution',order:5,color:'#22c55e'}], customFields: [{id:'f1',name:'Event Type',type:'select',options:['Conference','Wedding','Concert','Corporate'],required:true},{id:'f2',name:'Expected Attendees',type:'number',required:true},{id:'f3',name:'Venue Name',type:'text',required:false}], milestoneTemplate: [{name:'Venue Booked',stageId:'s2',daysFromStart:30},{name:'Marketing Launch',stageId:'s3',daysFromStart:45},{name:'Final Walkthrough',stageId:'s4',daysFromStart:7}], budgetEnabled: true, notesEnabled: true }
        ];

        const [templates, setTemplates] = React.useState(() => {
          try {
            const saved = JSON.parse(localStorage.getItem(TEMPLATE_KEY));
            return saved && saved.length > 0 ? saved : STARTER_TEMPLATES;
          } catch { return STARTER_TEMPLATES; }
        });
        const [projects, setProjects] = React.useState(() => {
          try { return JSON.parse(localStorage.getItem(PROJECT_KEY)) || []; } catch { return []; }
        });
        const [ctTab, setCtTab] = React.useState('projects');
        const [selectedTemplateId, setSelectedTemplateId] = React.useState(null);
        const [selectedProjectId, setSelectedProjectId] = React.useState(null);
        const [showProjectForm, setShowProjectForm] = React.useState(false);
        const [projectForm, setProjectForm] = React.useState({ templateId: '', projectName: '', client: '', startDate: new Date().toISOString().slice(0,10), targetEndDate: '', budgeted: '', customFieldValues: {} });

        React.useEffect(() => { localStorage.setItem(TEMPLATE_KEY, JSON.stringify(templates)); }, [templates]);
        React.useEffect(() => { localStorage.setItem(PROJECT_KEY, JSON.stringify(projects)); }, [projects]);

        const selectedTemplate = templates.find(t => t.id === selectedTemplateId);
        const selectedProject = projects.find(p => p.id === selectedProjectId);

        const createProjectFromTemplate = (templateId, formData) => {
          const template = templates.find(t => t.id === templateId);
          if (!template) return null;
          const startDate = new Date(formData.startDate);
          const milestones = template.milestoneTemplate.map((mt, i) => {
            const targetDate = new Date(startDate); targetDate.setDate(targetDate.getDate() + mt.daysFromStart);
            return { id: `ms-${i}`, name: mt.name, stageId: mt.stageId, targetDate: targetDate.toISOString().slice(0,10), actualDate: null, status: 'pending' };
          });
          return {
            id: Date.now().toString(),
            templateId: template.id,
            templateName: template.name,
            projectName: formData.projectName,
            client: formData.client,
            currentStage: template.stages[0].id,
            startDate: formData.startDate,
            targetEndDate: formData.targetEndDate,
            actualEndDate: null,
            customFieldValues: formData.customFieldValues,
            budget: template.budgetEnabled ? { budgeted: parseFloat(formData.budgeted) || 0, actual: 0, remaining: parseFloat(formData.budgeted) || 0 } : null,
            milestones,
            notes: []
          };
        };

        const createProject = () => {
          if (!projectForm.templateId || !projectForm.projectName) return;
          const newProject = createProjectFromTemplate(projectForm.templateId, projectForm);
          if (newProject) {
            setProjects([...projects, newProject]);
            setSelectedProjectId(newProject.id);
            setProjectForm({ templateId: '', projectName: '', client: '', startDate: new Date().toISOString().slice(0,10), targetEndDate: '', budgeted: '', customFieldValues: {} });
            setShowProjectForm(false);
          }
        };

        const deleteProject = (id) => {
          if (!confirm('Delete this project?')) return;
          setProjects(projects.filter(p => p.id !== id));
          if (selectedProjectId === id) setSelectedProjectId(null);
        };

        const advanceStage = () => {
          if (!selectedProject) return;
          const template = templates.find(t => t.id === selectedProject.templateId);
          if (!template) return;
          const currentIndex = template.stages.findIndex(s => s.id === selectedProject.currentStage);
          if (currentIndex < template.stages.length - 1) {
            if (confirm(`Advance to ${template.stages[currentIndex + 1].name}?`)) {
              setProjects(projects.map(p => p.id === selectedProjectId ? {...p, currentStage: template.stages[currentIndex + 1].id} : p));
            }
          }
        };

        const updateMilestone = (updatedMs) => {
          setProjects(projects.map(p => p.id === selectedProjectId ? {...p, milestones: p.milestones.map(m => m.id === updatedMs.id ? updatedMs : m)} : p));
        };

        const updateBudget = (newActual) => {
          if (!selectedProject || !selectedProject.budget) return;
          setProjects(projects.map(p => p.id === selectedProjectId ? {...p, budget: {...p.budget, actual: parseFloat(newActual), remaining: p.budget.budgeted - parseFloat(newActual)}} : p));
        };

        const calculateStageProgress = (project) => {
          const template = templates.find(t => t.id === project.templateId);
          if (!template) return 0;
          const currentStageIndex = template.stages.findIndex(s => s.id === project.currentStage);
          const stageMilestones = project.milestones.filter(m => m.stageId === project.currentStage);
          if (stageMilestones.length === 0) return (currentStageIndex / template.stages.length) * 100;
          const completedInStage = stageMilestones.filter(m => m.status === 'complete').length;
          const stageCompletion = completedInStage / stageMilestones.length;
          const overallProgress = (currentStageIndex + stageCompletion) / template.stages.length * 100;
          return overallProgress;
        };

        const filteredProjects = selectedTemplateId ? projects.filter(p => p.templateId === selectedTemplateId) : projects;

        return (
          <div>
            <ModuleTabs
              tabs={[{id:'projects',label:'Projects'},{id:'templates',label:'Templates'}]}
              activeTab={ctTab}
              onTabChange={setCtTab}
              accentColor={theme.accent}
            />

            {ctTab === 'projects' && (
              <div>
                <div style={{display:'flex', gap:8, marginBottom:16, alignItems:'center'}}>
                  <select value={selectedTemplateId || ''} onChange={e => setSelectedTemplateId(e.target.value || null)} style={sharedSelStyle(dark)}>
                    <option value="">All Templates</option>
                    {templates.map(t => <option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}
                  </select>
                  <button onClick={() => {setShowProjectForm(true); setProjectForm({...projectForm, templateId: selectedTemplateId || templates[0]?.id || ''});}} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--brand-green)', color:'var(--brand-tan)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>New Project</button>
                </div>

                {showProjectForm && (() => {
                  const formTemplate = templates.find(t => t.id === projectForm.templateId);
                  return (
                    <div style={{background: dark ? 'var(--surface)' : '#f9fafb', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:16, marginBottom:16}}>
                      <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:8, marginBottom:8}}>
                        <div><label style={sharedLblStyle}>Template</label><select value={projectForm.templateId} onChange={e => setProjectForm({...projectForm, templateId:e.target.value, customFieldValues:{}})} style={sharedSelStyle(dark)}>{templates.map(t => <option key={t.id} value={t.id}>{t.icon} {t.name}</option>)}</select></div>
                        <div><label style={sharedLblStyle}>Project Name</label><input value={projectForm.projectName} onChange={e => setProjectForm({...projectForm, projectName:e.target.value})} style={sharedInputStyle(dark)} /></div>
                        <div><label style={sharedLblStyle}>Client</label><input value={projectForm.client} onChange={e => setProjectForm({...projectForm, client:e.target.value})} style={sharedInputStyle(dark)} /></div>
                        <div><label style={sharedLblStyle}>Start Date</label><input type="date" value={projectForm.startDate} onChange={e => setProjectForm({...projectForm, startDate:e.target.value})} style={sharedInputStyle(dark)} /></div>
                        <div><label style={sharedLblStyle}>Target End Date</label><input type="date" value={projectForm.targetEndDate} onChange={e => setProjectForm({...projectForm, targetEndDate:e.target.value})} style={sharedInputStyle(dark)} /></div>
                        {formTemplate?.budgetEnabled && <div><label style={sharedLblStyle}>Budget</label><input type="number" value={projectForm.budgeted} onChange={e => setProjectForm({...projectForm, budgeted:e.target.value})} style={sharedInputStyle(dark)} /></div>}
                      </div>
                      {formTemplate && formTemplate.customFields.map(field => (
                        <div key={field.id} style={{marginBottom:8}}>
                          <label style={sharedLblStyle}>{field.name}{field.required && ' *'}</label>
                          {field.type === 'text' && <input value={projectForm.customFieldValues[field.id] || ''} onChange={e => setProjectForm({...projectForm, customFieldValues:{...projectForm.customFieldValues, [field.id]:e.target.value}})} style={sharedInputStyle(dark)} />}
                          {field.type === 'number' && <input type="number" value={projectForm.customFieldValues[field.id] || ''} onChange={e => setProjectForm({...projectForm, customFieldValues:{...projectForm.customFieldValues, [field.id]:e.target.value}})} style={sharedInputStyle(dark)} />}
                          {field.type === 'select' && <select value={projectForm.customFieldValues[field.id] || ''} onChange={e => setProjectForm({...projectForm, customFieldValues:{...projectForm.customFieldValues, [field.id]:e.target.value}})} style={sharedSelStyle(dark)}><option value="">Select...</option>{field.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select>}
                          {field.type === 'date' && <input type="date" value={projectForm.customFieldValues[field.id] || ''} onChange={e => setProjectForm({...projectForm, customFieldValues:{...projectForm.customFieldValues, [field.id]:e.target.value}})} style={sharedInputStyle(dark)} />}
                        </div>
                      ))}
                      <div style={{display:'flex', gap:4}}><button onClick={createProject} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:theme.accent, color:'#fff', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Create</button><button onClick={() => setShowProjectForm(false)} style={{padding:'6px 16px', borderRadius:'var(--radius-sm)', background:'var(--border)', color:'var(--text)', border:'none', fontSize:13, fontWeight:600, cursor:'pointer'}}>Cancel</button></div>
                    </div>

                    <p style={{fontSize:13, color:'var(--text-muted)'}}>Create a new project from a template to get started.</p>
                  </div>
                ) : selectedProjectId ? (() => {
                  const template = templates.find(t => t.id === selectedProject.templateId);
                  if (!template) return null;
                  const currentStage = template.stages.find(s => s.id === selectedProject.currentStage);
                  const progress = calculateStageProgress(selectedProject);
                  return (
                    <div>
                      <div style={{display:'flex', gap:8, marginBottom:16, alignItems:'center'}}>

function APARAgingReportView() {
  const theme = TOOL_THEMES.rptAging;
  const dark = useDarkMode();
  const fmt = (n) => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const bills = React.useMemo(() => { try { return JSON.parse(localStorage.getItem('veracity-ap-bills')) || []; } catch { return []; } }, []);
  const invoices = React.useMemo(() => { try { return JSON.parse(localStorage.getItem('veracity-ar-invoices')) || []; } catch { return []; } }, []);

  const computeAging = (items, nameKey) => {
    const entities = {};
    items.filter(i => i.status !== 'Paid' && i.status !== 'Written Off').forEach(i => {
      const name = i[nameKey];
      if (!entities[name]) entities[name] = { current: 0, d30: 0, d60: 0, d90: 0, d90p: 0, total: 0 };
      const rem = i.amount - (i.amountPaid || 0);
      const days = Math.max(0, Math.ceil((new Date() - new Date(i.dueDate)) / 86400000));
      const e = entities[name];
      if (days <= 0 || new Date(i.dueDate) >= new Date()) e.current += rem;
      else if (days <= 30) e.d30 += rem;
      else if (days <= 60) e.d60 += rem;
      else if (days <= 90) e.d90 += rem;
      else e.d90p += rem;
      e.total += rem;
    });
    return Object.entries(entities).map(([name, d]) => ({ name, ...d })).sort((a, b) => b.total - a.total);
  };

  const apAging = computeAging(bills, 'vendor');
  const arAging = computeAging(invoices, 'customer');
  const sumAging = (data) => data.reduce((t, r) => ({ current: t.current+r.current, d30: t.d30+r.d30, d60: t.d60+r.d60, d90: t.d90+r.d90, d90p: t.d90p+r.d90p, total: t.total+r.total }), { current:0, d30:0, d60:0, d90:0, d90p:0, total:0 });
  const apTotals = sumAging(apAging);
  const arTotals = sumAging(arAging);

  const renderTable = (title, data, totals, nameLabel) => (
    <div style={{marginBottom:24}}>
      <h3 style={{fontSize:15, fontWeight:700, color:'var(--rust)', marginBottom:8}}>{title}</h3>
      <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
        <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'10px 14px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'2px solid var(--border)'}}>
          <span>{nameLabel}</span><span style={{textAlign:'right', color:'var(--forest-green)'}}>Current</span><span style={{textAlign:'right', color:'#f59e0b'}}>1-30</span><span style={{textAlign:'right', color:'#f97316'}}>31-60</span><span style={{textAlign:'right', color:'#ef4444'}}>61-90</span><span style={{textAlign:'right', color:'#dc2626'}}>90+</span><span style={{textAlign:'right'}}>Total</span>
        </div>
        {data.length === 0 ? (
          <div style={{padding:30, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>No outstanding items.</div>
        ) : (<>
          {data.map(r => (
            <div key={r.name} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'8px 14px', borderBottom:'1px solid var(--border)', fontSize:12}}>
              <span style={{color:'var(--brand-tan)', fontWeight:500}}>{r.name}</span>
              <span style={{textAlign:'right', color: r.current ? 'var(--forest-green)' : 'var(--text-muted)'}}>{r.current ? fmt(r.current) : '-'}</span>
              <span style={{textAlign:'right', color: r.d30 ? '#f59e0b' : 'var(--text-muted)'}}>{r.d30 ? fmt(r.d30) : '-'}</span>
              <span style={{textAlign:'right', color: r.d60 ? '#f97316' : 'var(--text-muted)'}}>{r.d60 ? fmt(r.d60) : '-'}</span>
              <span style={{textAlign:'right', color: r.d90 ? '#ef4444' : 'var(--text-muted)'}}>{r.d90 ? fmt(r.d90) : '-'}</span>
              <span style={{textAlign:'right', color: r.d90p ? '#dc2626' : 'var(--text-muted)'}}>{r.d90p ? fmt(r.d90p) : '-'}</span>
              <span style={{textAlign:'right', fontWeight:600, color:'var(--text)'}}>{fmt(r.total)}</span>
            </div>
          ))}
          <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'10px 14px', borderTop:'2px solid var(--border)', fontSize:12, fontWeight:700, background: dark ? 'var(--surface)' : '#f9fafb'}}>
            <span style={{color:'var(--rust)'}}>TOTALS</span>
            <span style={{textAlign:'right', color:'var(--forest-green)'}}>{fmt(totals.current)}</span>
            <span style={{textAlign:'right', color:'#f59e0b'}}>{fmt(totals.d30)}</span>
            <span style={{textAlign:'right', color:'#f97316'}}>{fmt(totals.d60)}</span>
            <span style={{textAlign:'right', color:'#ef4444'}}>{fmt(totals.d90)}</span>
            <span style={{textAlign:'right', color:'#dc2626'}}>{fmt(totals.d90p)}</span>
            <span style={{textAlign:'right', color:'var(--text)'}}>{fmt(totals.total)}</span>
          </div>
        </>)}
      </div>
    </div>
  );

  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>AP/AR Aging Report</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20}}>
        <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderLeft:'4px solid var(--rust)', borderRadius:'var(--radius-md)', padding:'12px 14px'}}>
          <div style={{fontSize:11, color:'var(--charcoal-slate)', marginBottom:2}}>Total AP Outstanding</div>
          <div style={{fontSize:20, fontWeight:700, color:'var(--rust)'}}>{fmt(apTotals.total)}</div>
        </div>
        <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderLeft:'4px solid var(--forest-green)', borderRadius:'var(--radius-md)', padding:'12px 14px'}}>
          <div style={{fontSize:11, color:'var(--charcoal-slate)', marginBottom:2}}>Total AR Outstanding</div>
          <div style={{fontSize:20, fontWeight:700, color:'var(--forest-green)'}}>{fmt(arTotals.total)}</div>
        </div>
      </div>
      {renderTable('Accounts Payable Aging', apAging, apTotals, 'Vendor')}
      {renderTable('Accounts Receivable Aging', arAging, arTotals, 'Customer')}
    </div>
  );
}

// --- Tool 9: Accounting Calendar ---
function AccountingCalendarView() {
  const [fyeMonth, setFyeMonth] = React.useState(() => localStorage.getItem('veracity-fye-month') || '12');
  React.useEffect(() => { localStorage.setItem('veracity-fye-month', fyeMonth); }, [fyeMonth]);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const fyeIdx = parseInt(fyeMonth) - 1;
  const calendarMonths = [];
  for (let i = 0; i < 12; i++) {
    const idx = (fyeIdx + 1 + i) % 12;
    const qtr = Math.floor(i / 3) + 1;
    const isQtrEnd = i % 3 === 2;
    const isFYE = i === 11;
    calendarMonths.push({ name: months[idx], monthNum: idx + 1, quarter: qtr, isQtrEnd, isFYE });
  }

  const filings = [
    { name: '10-K Annual Report', deadline: '60 days after FYE (large accelerated filer)' },
    { name: '10-Q Quarterly Report', deadline: '40 days after quarter-end (large accelerated filer)' },
    { name: 'Monthly Close', deadline: 'Typically 5-10 business days after month-end' },
    { name: 'Quarterly Close', deadline: 'Typically 10-15 business days after quarter-end' },
    { name: 'Annual Audit', deadline: 'Begins 1-2 months before 10-K filing' },
    { name: 'Tax Returns (Corporate)', deadline: 'April 15 (calendar year) or 15th day of 4th month after FYE' },
  ];

  const theme = TOOL_THEMES.calendar;
  return (
    <div className="tool-container" style={{background: theme.bg}}>
      <PageHeader accent={theme.accent}>
        <div className="tool-header">
          <div className="tool-icon" style={{background: theme.light, color: theme.accent}}>{Icons.calendar}</div>
          <h2>Accounting Calendar</h2>
        </div>
      </PageHeader>
      <ToolExplainer theme={theme} />
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <div className="tool-input-group" style={{maxWidth:300}}>
          <label>Fiscal Year-End Month</label>
          <select className="tool-input tool-select" value={fyeMonth} onChange={e => setFyeMonth(e.target.value)}>
            {months.map((m, i) => <option key={i} value={i + 1}>{m}</option>)}
          </select>
        </div>
      </div>
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <h3 style={{fontSize:14, fontWeight:700, margin:0}}>Fiscal Year Calendar ({months[fyeIdx]} Year-End)</h3>
          <TableIO data={calendarMonths.map(m => ({Month:m.name, Quarter:'Q'+m.quarter, 'Close Type': m.isFYE ? 'Annual' : m.isQtrEnd ? 'Quarterly' : 'Monthly'}))} filename="fiscal_calendar" />
        </div>
        <table className="tool-table">
          <thead><tr><th style={{background: theme.accent}}>Month</th><th style={{background: theme.accent}}>Quarter</th><th style={{background: theme.accent}}>Close Type</th><th style={{background: theme.accent}}>Key Deadlines</th></tr></thead>
          <tbody>{calendarMonths.map((m, i) => (
            <tr key={i} style={{background: m.isFYE ? '#fef3c7' : m.isQtrEnd ? '#fdf0e6' : undefined}}>
              <td style={{fontWeight: m.isFYE || m.isQtrEnd ? 700 : 400}}>{m.name}</td>
              <td>Q{m.quarter}</td>
              <td>
                {m.isFYE && <span className="tool-tag" style={{background:'#fde68a', color:'#92400e'}}>Annual Close</span>}
                {m.isQtrEnd && !m.isFYE && <span className="tool-tag" style={{background:'#e8d5c0', color:'#B87333'}}>Quarterly Close</span>}
                {!m.isQtrEnd && !m.isFYE && <span className="tool-tag" style={{background:'var(--surface2)', color:'var(--text-muted)'}}>Monthly Close</span>}
              </td>
              <td style={{fontSize:12, color:'var(--text-muted)'}}>
                {m.isFYE && '10-K due ~60 days; Tax return due ~105 days'}
                {m.isQtrEnd && !m.isFYE && '10-Q due ~40 days after quarter-end'}
                {!m.isQtrEnd && !m.isFYE && 'Close books within 5-10 business days'}
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <h3 style={{fontSize:14, fontWeight:700, margin:0}}>Common Filing Deadlines</h3>
          <TableIO data={filings.map(f => ({Filing:f.name, Deadline:f.deadline}))} filename="filing_deadlines" />
        </div>
        <table className="tool-table">
          <thead><tr><th style={{background: theme.accent}}>Filing</th><th style={{background: theme.accent}}>Deadline</th></tr></thead>
          <tbody>{filings.map((f, i) => <tr key={i}><td style={{fontWeight:600}}>{f.name}</td><td>{f.deadline}</td></tr>)}</tbody>
        </table>
      </div>
    </div>
  );
}

  { patterns: ['record bill','enter bill','new bill','pay vendor'], response: 'You can record and manage vendor bills in the Accounts Payable module. Enter bill details, track due dates, and record payments — all with automatic GL posting.', action: { nav: 'ap', label: 'Go to Accounts Payable' } },
  { patterns: ['create invoice','send invoice','bill customer','new invoice'], response: 'Create and manage customer invoices in the Accounts Receivable module. Track who owes you, send invoices, and record payments as they come in.', action: { nav: 'ar', label: 'Go to Accounts Receivable' } },
  { patterns: ['show ledger','open ledger','view gl','view ledger'], response: 'I\'ll take you to the General Ledger where you can see all posted transactions, filter by account or date, and review journal entries.', action: { nav: 'gl', label: 'Open General Ledger' } },
  { patterns: ['show balance sheet','view balance sheet','run balance sheet'], response: 'Let me open the Balance Sheet report for you. You can set an as-of date and optionally compare to a prior period.', action: { nav: 'rpt-bs', label: 'Open Balance Sheet' } },
  { patterns: ['show trial balance','view trial balance','run trial balance'], response: 'I\'ll open the Trial Balance report. You can filter by date range and export to CSV.', action: { nav: 'rpt-trial', label: 'Open Trial Balance' } },
  { patterns: ['show income statement','view income statement','run income statement','show p&l'], response: 'Let me pull up the Income Statement. It shows your revenue, expenses, and net income for the period.', action: { nav: 'rpt-is', label: 'Open Income Statement' } },
  // App-specific
  { patterns: ['what tools','available tools','what can i do','features','capabilities'], response: 'Veracity has three main sections: **Accounting** (AP, AR, GL, COA, reports, calendar, JE practice, lease classifier, and the Academy), **Finance** (TVM, amortization, depreciation, break-even, markup, ratios, budgeting, forecasting), and **Project Trackers** (solar, construction, custom).' },
  { patterns: ['academy','learn accounting','lessons','courses','study'], response: 'The Academy offers structured accounting lessons from beginner to master level. Topics range from the accounting equation to advanced consolidation and cost accounting.', action: { nav: 'modules', label: 'Open Academy' } },
  { patterns: ['reports','what reports','available reports','financial reports'], response: 'You can run five reports: Trial Balance, Balance Sheet, Income Statement, Cash Flow Statement, and AP/AR Aging. Find them under Accounting > Reports in the sidebar.' },
  { patterns: ['calendar','accounting calendar','fiscal calendar','deadlines'], response: 'The Accounting Calendar shows key dates, filing deadlines, and period-end reminders to keep you on track.', action: { nav: 'calendar', label: 'Open Accounting Calendar' } },
  { patterns: ['budget','budgeting','budget vs actual'], response: 'The Budgeting module is coming soon! It will let you set line-item budgets and compare them against actuals for variance analysis.', action: { nav: 'budgeting', label: 'View Budgeting' } },
  { patterns: ['forecast','forecasting','projection','predict'], response: 'The Forecasting module is coming soon! It will use historical trends and assumptions to project future revenue, expenses, and cash position.', action: { nav: 'forecasting', label: 'View Forecasting' } },
  { patterns: ['hello','hi','hey','good morning','good afternoon'], response: 'Hello! I\'m Vera, your financial assistant. How can I help you today? You can ask me about accounting concepts, financial tools, or how to navigate Veracity.' },
  { patterns: ['thank','thanks','thank you','appreciate'], response: 'You\'re welcome! I\'m always here if you need help with anything else. Just ask!' },
  { patterns: ['who are you','your name','about you','what are you'], response: 'I\'m Vera, the built-in AI assistant for Veracity Business Suite. I can answer accounting and finance questions, explain concepts, and help you find the right tool for the job.' },
  { patterns: ['help','need help','how does this work','get started'], response: 'I can help! Try asking me things like "What is a balance sheet?", "How do I record a bill?", or "Show me the general ledger." I\'ll answer your question and can navigate you to the right tool.' },
  { patterns: ['asc','codification','accounting standards codification','fasb'], response: 'The ASC (Accounting Standards Codification) is the authoritative source of US GAAP, organized by topic. Veracity includes a browsable reference of key ASC topics.', action: { nav: 'asc-browse', label: 'Browse ASC Topics' } },
  // --- Accounting fundamentals ---
  { patterns: ['adjusting entries','adjusting entry','end of period adjustment','period end'], response: 'Adjusting entries are journal entries made at the end of an accounting period to update account balances before preparing financial statements. Common types include accruals (recording earned revenue or incurred expenses not yet recorded), deferrals (allocating prepaid items), and estimates (like depreciation or bad debt).' },
  { patterns: ['closing entries','close the books','closing process','temporary accounts'], response: 'Closing entries zero out temporary accounts (revenue, expenses, dividends) at period end, transferring their balances to retained earnings. This resets the income statement for the next period. The sequence is: close revenue to income summary, close expenses to income summary, close income summary to retained earnings, close dividends to retained earnings.' },
  { patterns: ['bank reconciliation','bank rec','reconcile bank','bank statement'], response: 'A bank reconciliation compares your book balance to the bank statement balance, identifying differences like outstanding checks, deposits in transit, bank fees, and errors. The goal is to arrive at an adjusted balance that matches on both sides.' },
  { patterns: ['working capital','current assets minus current liabilities','liquidity measure'], response: 'Working capital is current assets minus current liabilities. It measures short-term liquidity — whether a business can cover its near-term obligations. Positive working capital means the company has enough liquid assets to pay upcoming bills.' },
  { patterns: ['current ratio','liquidity ratio','current assets divided'], response: 'The current ratio is current assets divided by current liabilities. A ratio above 1.0 means the company can cover short-term debts. A ratio of 2.0 is often considered healthy, but the ideal varies by industry.', action: { nav: 'ratios', label: 'Open Financial Ratios' } },
  { patterns: ['fifo','lifo','inventory method','inventory valuation','weighted average cost'], response: 'FIFO (First In, First Out) assumes the oldest inventory is sold first — better in rising prices for lower COGS. LIFO (Last In, First Out) assumes newest inventory is sold first — higher COGS, lower taxes. Weighted average cost uses the average cost of all units. LIFO is not allowed under IFRS.' },
  { patterns: ['bad debt','doubtful accounts','allowance method','write off','uncollectible'], response: 'Bad debt expense accounts for receivables that won\'t be collected. The allowance method estimates uncollectible amounts in advance (contra-asset account), while the direct write-off method records bad debt only when specific accounts are deemed uncollectible. GAAP requires the allowance method.' },
  { patterns: ['unearned revenue','deferred revenue','prepaid revenue','advance payment'], response: 'Unearned revenue is a liability — money received from customers before delivering goods or services. As you fulfill the obligation, you recognize revenue and reduce the liability. Common examples: prepaid subscriptions, retainers, gift cards.' },
  { patterns: ['prepaid expenses','prepaid','prepaid insurance','prepaid rent'], response: 'Prepaid expenses are assets — payments made in advance for future benefits. As the benefit is consumed (e.g., a month of insurance passes), you record an adjusting entry to move the amount from the asset to an expense account.' },
  { patterns: ['accrued expenses','accrued liabilities','accrued wages','accrued interest'], response: 'Accrued expenses are liabilities for costs incurred but not yet paid or recorded. Common examples: wages earned by employees but not yet paid, interest that has accumulated on a loan, utilities consumed but not yet billed.' },
  { patterns: ['payroll','payroll taxes','wages','salary','employee compensation','fica','withholding'], response: 'Payroll involves calculating gross pay, withholding taxes (federal, state, FICA), and employer-side taxes (Social Security, Medicare, FUTA, SUTA). The journal entry debits wage expense and payroll tax expense, credits cash and various tax payable accounts.' },
  { patterns: ['sales tax','tax collected','tax payable','remit tax'], response: 'Sales tax collected from customers is a liability (Sales Tax Payable), not revenue — you\'re collecting on behalf of the government. When you remit the tax, you debit the payable and credit cash.' },
  { patterns: ['fixed assets','capital assets','property plant equipment','ppe','long term assets'], response: 'Fixed assets (PP&E) are long-term tangible assets used in operations: buildings, equipment, vehicles, furniture. They\'re recorded at cost and depreciated over their useful life. Repairs are expensed; improvements are capitalized.' },
  { patterns: ['contra account','contra asset','accumulated depreciation','allowance'], response: 'A contra account offsets its parent account. Accumulated Depreciation (contra-asset) reduces the book value of fixed assets. Allowance for Doubtful Accounts (contra-asset) reduces accounts receivable. Sales Returns (contra-revenue) reduces gross revenue.' },
  { patterns: ['subsidiary ledger','subledger','sub ledger','detail ledger'], response: 'A subsidiary ledger provides detail behind a general ledger control account. The AP subledger shows individual vendor balances that sum to total Accounts Payable. The AR subledger shows individual customer balances that sum to total Accounts Receivable.' },
  { patterns: ['month end close','month-end','monthly close','period close'], response: 'Month-end close is the process of finalizing all transactions for the period: post all entries, reconcile bank accounts, record adjusting entries (accruals, deferrals, depreciation), review the trial balance, and prepare financial statements. A checklist helps ensure nothing is missed.' },
  { patterns: ['year end close','year-end','annual close','fiscal year end'], response: 'Year-end close includes everything in a monthly close plus: close all temporary accounts to retained earnings, prepare annual financial statements, review for audit readiness, file tax returns, and set up the new fiscal year. It\'s the most comprehensive close cycle.' },
  { patterns: ['audit','financial audit','external audit','auditor','audit trail'], response: 'A financial audit is an independent examination of financial statements to verify they\'re fairly presented according to GAAP. Auditors test internal controls, sample transactions, confirm balances, and issue an opinion. A clean audit opinion means the statements are materially correct.' },
  { patterns: ['internal controls','segregation of duties','control environment','fraud prevention'], response: 'Internal controls are policies and procedures that safeguard assets, ensure accurate records, and prevent fraud. Key principles include segregation of duties (no one person controls an entire transaction), authorization requirements, physical safeguards, and regular reconciliations.' },
  { patterns: ['materiality','material','immaterial','significance threshold'], response: 'Materiality is the threshold at which information could influence a financial decision. An error is material if it would change a user\'s judgment. It applies to both individual items and aggregates. Auditors set materiality thresholds to focus on what matters most.' },
  { patterns: ['revenue recognition','asc 606','recognize revenue','earned revenue','five step'], response: 'Under ASC 606, revenue is recognized in five steps:\n\n1. Identify the contract\n2. Identify performance obligations\n3. Determine the transaction price\n4. Allocate the price to obligations\n5. Recognize revenue as obligations are satisfied\n\nRevenue is recognized when control transfers to the customer.' },
  { patterns: ['matching principle','match expenses','expense recognition'], response: 'The matching principle requires expenses to be recorded in the same period as the revenues they help generate. If you sell a product in March, the cost of goods sold is recorded in March too — not when you bought the inventory or when the customer pays.' },
  { patterns: ['going concern','business continuity','continue operating'], response: 'Going concern assumes a business will continue operating for the foreseeable future. If there\'s substantial doubt about this (e.g., severe losses, inability to pay debts), it must be disclosed. Auditors evaluate going concern status during every audit.' },
  { patterns: ['conservatism','prudence','conservative accounting'], response: 'The conservatism principle (prudence) says: when in doubt, choose the option that understates assets/income and overstates liabilities/expenses. Recognize losses as soon as they\'re probable, but only recognize gains when they\'re realized. It prevents overly optimistic reporting.' },
  { patterns: ['fiscal year','fiscal period','calendar year','fy'], response: 'A fiscal year is any 12-month period used for financial reporting. It can match the calendar year (Jan-Dec) or end on any date that makes sense for the business (e.g., Jun 30 for schools, Sep 30 for government). The IRS requires consistency once chosen.' },
  { patterns: ['petty cash','petty cash fund','small expenses','cash box'], response: 'A petty cash fund is a small amount of cash kept on hand for minor expenses (office supplies, postage, small reimbursements). It\'s established by debiting Petty Cash and crediting Cash. When replenished, you debit the expense accounts and credit Cash.' },
  { patterns: ['bank fees','service charge','nsf','insufficient funds','overdraft'], response: 'Bank fees (service charges, NSF fees, wire fees) are discovered during bank reconciliation. They reduce the book balance and are recorded as: debit Bank Fees Expense (or Miscellaneous Expense), credit Cash.' },
  { patterns: ['deposit in transit','outstanding check','reconciling items'], response: 'Deposits in transit are amounts recorded in your books but not yet on the bank statement — they increase the bank balance. Outstanding checks are checks you\'ve written but the bank hasn\'t processed yet — they decrease the bank balance. Both are normal reconciling items.' },
  { patterns: ['journal','journalize','book of original entry','record keeping'], response: 'The journal (or book of original entry) is where transactions are first recorded in chronological order before being posted to the general ledger. Each journal entry includes a date, accounts, debit/credit amounts, and a description.' },
  { patterns: ['posting','post to ledger','transfer to ledger'], response: 'Posting is the process of transferring journal entry information to the general ledger accounts. Each debit and credit from the journal is recorded in the corresponding ledger account, updating the running balance.' },
  { patterns: ['accounting equation','assets equals','a equals l plus e','fundamental equation'], response: 'The accounting equation is: Assets = Liabilities + Equity. Every transaction must keep this equation in balance. It\'s the foundation of double-entry bookkeeping and the structure behind the balance sheet.' },
  { patterns: ['normal balance','debit balance','credit balance','which side increases'], response: 'Normal balance is the side (debit or credit) that increases an account. Assets and expenses have debit normal balances. Liabilities, equity, and revenue have credit normal balances. Knowing normal balances helps you quickly spot errors.' },
  { patterns: ['t account','t-account','visual ledger','debit left credit right'], response: 'A T-account is a visual representation of a ledger account shaped like the letter T. Debits go on the left side, credits on the right. It\'s a quick way to analyze how transactions affect individual accounts.' },
  { patterns: ['cost of goods sold','cogs','cost of sales','product cost'], response: 'Cost of Goods Sold (COGS) represents the direct costs of producing goods that were sold: raw materials, direct labor, and manufacturing overhead. It appears on the income statement and is subtracted from revenue to calculate gross profit.' },
  { patterns: ['gross profit','gross margin','revenue minus cogs'], response: 'Gross profit is revenue minus cost of goods sold. It shows how much money is left after covering direct production costs, before operating expenses. Gross margin (gross profit / revenue) is a key profitability metric.' },
  { patterns: ['operating expenses','opex','overhead','sg&a','selling general administrative'], response: 'Operating expenses are the costs of running the business beyond direct production: rent, salaries, marketing, insurance, utilities, office supplies. They\'re subtracted from gross profit to arrive at operating income.' },
  { patterns: ['net income','bottom line','profit after tax','earnings'], response: 'Net income is the bottom line — total revenue minus all expenses (COGS, operating expenses, interest, taxes). It flows to the balance sheet as an increase to retained earnings and represents the company\'s profitability for the period.' },
  { patterns: ['retained earnings','accumulated profits','reinvested earnings'], response: 'Retained earnings is the cumulative total of net income minus dividends paid over the life of the business. It represents profits that have been reinvested rather than distributed to owners. It\'s an equity account on the balance sheet.' },
  { patterns: ['dividends','distribution','owner draw','shareholder distribution'], response: 'Dividends are distributions of profits to shareholders (corporations) or owner draws (sole proprietors/partnerships). They reduce retained earnings and cash but are NOT expenses — they\'re a return of equity to owners.' },
  { patterns: ['accounts','account types','five account types','types of accounts'], response: 'There are five main account types:\n\n1. Assets — what the business owns\n2. Liabilities — what the business owes\n3. Equity — owner\'s residual interest\n4. Revenue — income earned\n5. Expenses — costs incurred\n\nThe first three are balance sheet accounts; the last two are income statement accounts.' },
  // --- Finance concepts ---
  { patterns: ['roi','return on investment','investment return'], response: 'Return on Investment (ROI) measures profitability: (Net Profit / Cost of Investment) x 100. An ROI of 20% means you earned $0.20 for every $1 invested. It\'s one of the most widely used metrics for evaluating investments.' },
  { patterns: ['roe','return on equity','shareholder return'], response: 'Return on Equity (ROE) is net income divided by shareholders\' equity. It measures how effectively a company uses equity to generate profits. Higher ROE means better returns for investors.', action: { nav: 'ratios', label: 'Open Financial Ratios' } },
  { patterns: ['npv','net present value','discounted cash flow','dcf'], response: 'Net Present Value (NPV) is the sum of all future cash flows discounted back to today, minus the initial investment. A positive NPV means the investment creates value; negative means it destroys value. It\'s the gold standard for capital budgeting decisions.', action: { nav: 'tvm', label: 'Open TVM Calculator' } },
  { patterns: ['irr','internal rate of return'], response: 'The Internal Rate of Return (IRR) is the discount rate that makes a project\'s NPV equal to zero. If the IRR exceeds your required rate of return (hurdle rate), the investment is worthwhile. It\'s useful for comparing projects of different sizes.' },
  { patterns: ['wacc','weighted average cost of capital','cost of capital'], response: 'WACC is the blended cost of a company\'s financing — the weighted average of the cost of debt and cost of equity. It\'s used as the discount rate in NPV calculations. A lower WACC means cheaper financing and higher project values.' },
  { patterns: ['capital budgeting','capital expenditure','capex','investment decision'], response: 'Capital budgeting is the process of evaluating long-term investments: new equipment, expansion, acquisitions. Key techniques include NPV, IRR, payback period, and profitability index. The goal is to invest in projects that create value above the cost of capital.' },
  { patterns: ['cash conversion cycle','ccc','days sales outstanding','days payable'], response: 'The cash conversion cycle measures how long it takes to convert inventory investment into cash: Days Inventory Outstanding + Days Sales Outstanding - Days Payable Outstanding. A shorter cycle means faster cash generation.' },
  { patterns: ['debt to equity','leverage','leverage ratio','d/e ratio'], response: 'The debt-to-equity ratio is total liabilities divided by total equity. It measures financial leverage — how much the company relies on debt versus equity financing. Higher ratios mean more risk but potentially higher returns.', action: { nav: 'ratios', label: 'Open Financial Ratios' } },
  { patterns: ['compound interest','compounding','interest on interest'], response: 'Compound interest earns interest on both the principal and previously accumulated interest. The formula is: FV = PV x (1 + r)^n. Over time, compounding dramatically accelerates growth — Einstein allegedly called it the eighth wonder of the world.', action: { nav: 'tvm', label: 'Open TVM Calculator' } },
  { patterns: ['simple interest','flat interest','non compounding'], response: 'Simple interest is calculated only on the original principal: Interest = Principal x Rate x Time. Unlike compound interest, it doesn\'t earn interest on interest. It\'s used for some short-term loans and bonds.' },
  { patterns: ['annuity','periodic payment','regular payment','stream of payments'], response: 'An annuity is a series of equal payments at regular intervals — like a car payment or mortgage. Present value of an annuity calculates what those future payments are worth today; future value calculates what they\'ll grow to.', action: { nav: 'tvm', label: 'Open TVM Calculator' } },
  { patterns: ['bond','bonds','coupon','face value','par value','yield'], response: 'A bond is a debt instrument where the issuer promises to pay periodic interest (coupon) and return the face value at maturity. Bonds trade at a premium (above par) when market rates are below the coupon rate, and at a discount when above.' },
  { patterns: ['interest rate','interest rates','prime rate','fed rate','basis points'], response: 'Interest rates represent the cost of borrowing money. The Federal Reserve sets the federal funds rate, which influences all other rates. A basis point is 1/100th of a percent. Rising rates increase borrowing costs and can reduce asset values.' },
  // --- Practical how-tos ---
  { patterns: ['how reconcile','how to reconcile','reconciliation steps','reconcile accounts'], response: 'To reconcile an account:\n\n1. Get the ending balance from both sources (bank and books)\n2. Add deposits in transit to the bank balance\n3. Subtract outstanding checks from the bank balance\n4. Record bank adjustments (fees, interest) in your books\n5. Verify both adjusted balances match' },
  { patterns: ['how close books','close month','close period','closing checklist'], response: 'Month-end close checklist:\n\n1. Post all transactions\n2. Reconcile bank accounts\n3. Record adjusting entries (accruals, depreciation)\n4. Review AP/AR aging\n5. Run trial balance and verify it balances\n6. Prepare financial statements\n7. Archive supporting docs' },
  { patterns: ['how set up coa','create chart of accounts','design coa','new coa'], response: 'To set up a Chart of Accounts:\n\n1. Choose a numbering system (e.g., 1000s = assets, 2000s = liabilities)\n2. Add accounts for each category your business needs\n3. Keep it simple — start with essentials and add as needed\n4. Match it to your industry\n\nVeracity includes industry templates!', action: { nav: 'coa', label: 'Open Chart of Accounts' } },
  { patterns: ['how read financial statements','understand financials','interpret statements','analyze'], response: 'Start with the income statement (are we profitable?), then the balance sheet (what do we own and owe?), then cash flow (where is cash going?). Compare periods to spot trends. Calculate key ratios. Look for red flags: declining margins, rising debt, negative cash flow from operations.' },
  { patterns: ['how handle returns','sales return','refund','credit memo','return merchandise'], response: 'For a sales return: debit Sales Returns & Allowances (contra-revenue) and credit Accounts Receivable (or Cash if already paid). If inventory is returned to stock, also debit Inventory and credit COGS. This properly reduces revenue without hiding the gross sales figure.' },
  { patterns: ['how record loan','new loan','borrow money','loan journal entry','note payable'], response: 'When receiving a loan: debit Cash, credit Notes Payable (or Long-Term Debt). For each payment: debit Interest Expense (for the interest portion) and debit Notes Payable (for the principal portion), credit Cash for the total payment.' },
  { patterns: ['how record purchase','buy equipment','purchase asset','capital purchase'], response: 'To record an asset purchase: debit the asset account (Equipment, Vehicle, etc.) for the full cost including delivery, installation, and setup, then credit Cash or Accounts Payable. The asset then gets depreciated over its useful life.' },
  { patterns: ['how handle tips','tip income','gratuity','tip reporting'], response: 'Tips received by employees are taxable income. The business records tip income as part of payroll, withholds appropriate taxes, and reports on W-2s. Cash tips must be reported by employees if they exceed $20/month.' },
  { patterns: ['how handle inventory','track inventory','inventory system','perpetual periodic'], response: 'Two main systems: Perpetual (updates inventory continuously with each sale/purchase — most common with modern software) and Periodic (counts inventory at period end to calculate COGS). The journal entry to record a sale under perpetual: debit COGS and credit Inventory, plus debit AR/Cash and credit Revenue.' },
  // --- Tax & compliance ---
  { patterns: ['1099','independent contractor','contractor payment','form 1099'], response: 'A 1099-NEC is issued to independent contractors paid $600+ in a year. Unlike W-2 employees, contractors handle their own taxes. The business deducts the payment as an expense but doesn\'t withhold taxes. 1099s are due to recipients by January 31.' },
  { patterns: ['w2','w-2','employee tax form','wage statement'], response: 'A W-2 is issued to employees by January 31, showing total wages, tips, and tax withholdings for the year. Employers file copies with the Social Security Administration. It\'s the basis for the employee\'s personal tax return.' },
  { patterns: ['estimated taxes','quarterly taxes','estimated payment','1040-es'], response: 'Estimated taxes are quarterly payments made by self-employed individuals and businesses to cover income tax not withheld by an employer. Due dates: April 15, June 15, September 15, and January 15. Underpayment can result in penalties.' },
  { patterns: ['tax deduction','deductible expense','tax write off','reduce taxes'], response: 'Tax deductions reduce taxable income. Common business deductions: office rent, salaries, insurance, depreciation, supplies, travel, professional fees, and home office expenses. Deductions must be ordinary (common in your industry) and necessary (helpful for business).' },
  { patterns: ['llc','corporation','s corp','c corp','entity type','business structure'], response: 'Common entity types: Sole proprietorship (simplest, no separation from owner), LLC (liability protection, flexible taxation), S-Corp (pass-through taxation, salary requirement), C-Corp (separate entity, double taxation but unlimited growth potential). Each has different tax and legal implications.' },
  // --- App navigation & features ---
  { patterns: ['dark mode','light mode','theme','switch theme','change theme'], response: 'You can toggle between dark and light mode using the sun/moon icon in the top-right corner of the navigation bar. Your preference is saved automatically.' },
  { patterns: ['settings','preferences','configure','customize'], response: 'Click the gear icon in the top-right corner to access Settings. You can customize your display preferences and other options there.' },
  { patterns: ['notifications','alerts','bell icon','notify'], response: 'Click the bell icon in the top-right corner to view notifications. You\'ll see alerts for upcoming due dates, overdue items, and other important events.' },
  { patterns: ['export','download','csv','export data','import','upload'], response: 'Every data table has universal import/export icons — a download arrow (↓) for export and an upload arrow (↑) for import. Click the export icon to choose CSV, Excel, or JSON format. Click the import icon to upload data or download a template first.' },
  { patterns: ['search','find tool','find feature','navigate to'], response: 'Use the search bar in the top navigation to quickly find any tool or feature. Just start typing and results will appear with color-coded section indicators.' },
  { patterns: ['print','print report','printer','print friendly'], response: 'Most reports include a Print button that generates a printer-friendly version. Click it to open your browser\'s print dialog.' },
  { patterns: ['solar tracker','solar project','solar panel','solar installation'], response: 'The Solar Tracker manages solar installation projects from lead to completion. Track project stages, finances, and milestones all in one place.', action: { nav: 'dashboard', label: 'Open Solar Tracker' } },
  { patterns: ['construction tracker','construction project','build project','building'], response: 'The Construction Tracker is coming soon! It will manage construction projects from bid through closeout, with milestone and budget tracking.', action: { nav: 'construction', label: 'View Construction Tracker' } },
  // --- Common questions ---
  { patterns: ['difference between','what is the difference','compare','versus','vs'], response: 'Could you be more specific about what you\'d like me to compare? For example: "difference between debit and credit", "accrual vs cash basis", "markup vs margin", or "FIFO vs LIFO". I\'m happy to break down any comparison!' },
  { patterns: ['example','give me an example','show example','for instance'], response: 'I\'d be happy to give an example! Could you tell me the topic? For instance: "example of a journal entry", "example of depreciation", or "example of a bank reconciliation". The more specific, the better I can help!' },
  { patterns: ['why important','why does it matter','why should i care','significance'], response: 'Great question about significance! Could you specify the topic? For example: "why is reconciliation important", "why does GAAP matter", or "why track accounts receivable". I can explain the business impact of most accounting and finance concepts.' },
  { patterns: ['best practice','best practices','recommendation','advice','tip','tips'], response: 'General accounting best practices:\n\n1. Reconcile accounts monthly\n2. Record transactions promptly\n3. Separate business and personal finances\n4. Back up your data\n5. Review financial statements regularly\n6. Keep supporting documentation\n7. Use a consistent chart of accounts' },
  { patterns: ['mistake','error','wrong entry','fix entry','correction','reverse'], response: 'To correct an accounting error, never just delete the entry. Instead, record a reversing entry (debit what was credited, credit what was debited) to undo it cleanly, then record the correct entry. This maintains a complete audit trail.' },
  { patterns: ['how often','frequency','how frequently','when should i'], response: 'Recommended frequencies:\n\n• Bank reconciliation — monthly\n• Financial statements — monthly\n• AP/AR review — weekly\n• Trial balance — monthly\n• Full close — monthly (more thorough quarterly and annually)\n• Tax filings — quarterly estimated, annual returns' },
  { patterns: ['small business','startup','new business','starting out','beginner business'], response: 'For a new small business:\n\n1. Choose your entity type (LLC is popular)\n2. Open a separate business bank account\n3. Set up a Chart of Accounts\n4. Choose accrual or cash basis\n5. Track every transaction from day one\n6. Set aside money for taxes\n\nVeracity can help with all of this!' },
  { patterns: ['accountant','cpa','bookkeeper','hire accountant','need accountant'], response: 'A bookkeeper handles day-to-day transaction recording. An accountant prepares financial statements and provides strategic advice. A CPA (Certified Public Accountant) can perform audits and sign tax returns. Small businesses often start with a bookkeeper and add a CPA for tax season.' },
  { patterns: ['quickbooks','xero','freshbooks','accounting software','qbo'], response: 'Veracity is designed to complement tools like QuickBooks, Xero, and FreshBooks by providing educational resources, practice tools, and analytical calculators. You can use Veracity to understand concepts, practice journal entries, and analyze financial ratios alongside your primary accounting software.' },
  { patterns: ['profit','profitable','profitability','making money','losing money'], response: 'Profitability is measured at multiple levels: Gross profit (revenue - COGS), operating income (gross profit - operating expenses), and net income (after all expenses including tax). Check your Income Statement to see where you stand.', action: { nav: 'rpt-is', label: 'Open Income Statement' } },
  { patterns: ['cash flow problem','cash shortage','cash crunch','running out of cash'], response: 'Cash flow problems often come from:\n\n• Slow collections (AR aging too high)\n• Overstocking inventory\n• Excessive fixed costs\n• Rapid growth outpacing cash\n\nSolutions:\n• Tighten payment terms\n• Follow up on overdue invoices\n• Negotiate longer vendor terms\n• Build a cash reserve\n\nCheck your AP/AR aging report for red flags.', action: { nav: 'rpt-aging', label: 'Open AP/AR Aging' } },

window.ASU_BY_TOPIC = {};
(async function buildAsuTopicIndex() {
  // Wait briefly for ASU knowledge to load
  await new Promise(r => setTimeout(r, 1500));
  for (const entry of VERA_KNOWLEDGE) {
    if (entry._source !== 'fasb_asu') continue;
    for (const p of entry.patterns) {
      const m = p.match(/^topic (\d+)$/);
      if (m) {
        (window.ASU_BY_TOPIC[m[1]] = window.ASU_BY_TOPIC[m[1]] || []).push(entry);
      }

  }
  const topicCount = Object.keys(window.ASU_BY_TOPIC).length;
  if (topicCount > 0) console.log(`Vera: indexed ASU entries across ${topicCount} ASC topics for Learning Modules`);
})();

const VERA_CRISIS = /\b(kill myself|kill\s*my\s*self|end my life|want to die|wanna die|don'?t want to (be here|live|exist)|no reason to live|better off dead|can'?t go on|end it all|not worth living|give up on life|hurt myself|self[- ]?harm|suicid|take my (own )?life|rather be dead|nothing to live for|goodbye cruel world)\b|\bkms\b/i;
const VERA_HOSTILE = /\bkys\b/i;
const VERA_PROFANITY = /\b(damn|hell|shit|fuck|ass|bitch|crap|dick|piss|bastard|wtf|stfu|lmao)\b/i;

function veraMatch(input) {
  if (VERA_CRISIS.test(input)) {
    return { text: "I hear you, and I want you to know that you matter. Please reach out to someone who can help:\n\n\u260E\uFE0F  988 Suicide & Crisis Lifeline\nCall or text 988 — available 24/7\n\n\uD83D\uDCAC  Crisis Text Line\nText HOME to 741741\n\nYou don't have to go through this alone. These are free, confidential services with people ready to listen right now.", action: null };
  }
  if (VERA_HOSTILE.test(input)) {
    return { text: "That's not something I'll engage with. Let's keep things respectful.", action: null };
  }
  if (VERA_PROFANITY.test(input)) {
    return { text: "I appreciate you reaching out, but I'm not able to respond to vulgar or inappropriate language. Let's keep things professional — I'm here to help with accounting, finance, and Veracity tools whenever you're ready.", action: null };
  }
  const q = input.toLowerCase().replace(/[^\w\s]/g, '');
  const words = q.split(/\s+/).filter(w => w.length > 1);
  let best = null, bestScore = 0;
  for (const entry of VERA_KNOWLEDGE) {
    let score = 0;
    for (const pattern of entry.patterns) {
      const pWords = pattern.toLowerCase().split(/\s+/);
      const matched = pWords.filter(pw => words.some(w => w === pw || (w.length > 3 && pw.length > 3 && (w.includes(pw) || pw.includes(w))))).length;
      const pScore = matched / pWords.length;
      if (pScore > score) score = pScore;
    }
    if (score > bestScore) { bestScore = score; best = entry; }
  }
  if (bestScore >= 0.4 && best) return { text: best.response, action: best.action || null };
  return { text: "That's a great question, but it's outside my current knowledge base. I can help with accounting concepts, financial reports, calculator tools, and navigating Veracity. Try rephrasing or ask me something else!", action: null };
}

const VERA_STORAGE_KEY = 'veracity-vera-chat';

function VeraChat({ onNavigate }) {
  const dark = useDarkMode();
  const [messages, setMessages] = React.useState(() => {
    try { const s = localStorage.getItem(VERA_STORAGE_KEY); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [input, setInput] = React.useState('');
  const [typing, setTyping] = React.useState(false);
  const chatRef = React.useRef(null);

  React.useEffect(() => { localStorage.setItem(VERA_STORAGE_KEY, JSON.stringify(messages)); }, [messages]);
  React.useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages, typing]);

  const send = (text) => {
    if (!text.trim()) return;
    const userMsg = { role: 'user', text: text.trim() };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setTyping(true);
    const result = veraMatch(text);
    const wordCount = text.trim().split(/\s+/).length;
    const responseLen = result.text.length;
    const baseDelay = 3000;
    const complexityDelay = Math.min(wordCount * 300, 2000) + Math.min(responseLen * 8, 3000);
    const delay = baseDelay + complexityDelay + Math.random() * 1500;
    setTimeout(() => {
      setMessages(prev => [...prev, { role: 'vera', text: result.text, action: result.action }]);
      setTyping(false);
    }, delay);
  };

  const clearChat = () => { setMessages([]); localStorage.removeItem(VERA_STORAGE_KEY); };

  const suggestions = [
    'What is a balance sheet?',
    'How do I record a bill?',
    'Show me the general ledger',
    'What reports can I run?',
    'What is double-entry bookkeeping?',
  ];

  const avatar = (
    <div style={{width:32, height:32, borderRadius:'50%', background:'var(--brand-tan)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, fontWeight:700, fontSize:14, color:'#fff', fontFamily:"'Playfair Display', Georgia, serif"}}>V</div>
  );

  return (
    <div style={{marginBottom:24, background: dark ? 'var(--surface2)' : '#fff', border:'1.5px solid var(--border-strong)', borderTop:'4px solid var(--brand-tan)', borderRadius:'var(--radius-lg)', overflow:'hidden'}}>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 20px', borderBottom:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fdf8f3'}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          {avatar}
          <div>
            <div style={{fontSize:15, fontWeight:700, color:'var(--accent-text)'}}>Ask Vera</div>
            <div style={{fontSize:11, color:'var(--text-muted)'}}>Your financial assistant</div>
          </div>
        </div>
        {messages.length > 0 && (
          <button onClick={clearChat} style={{background:'none', border:'none', fontSize:11, color:'var(--text-muted)', cursor:'pointer', fontWeight:600}}>Clear chat</button>
        )}
      </div>
      <div ref={chatRef} style={{maxHeight:320, overflowY:'auto', padding:'16px 20px', display:'flex', flexDirection:'column', gap:12}}>
        {messages.length === 0 && !typing && (
          <div style={{display:'flex', gap:10, alignItems:'flex-start'}}>
            {avatar}
            <div style={{background: dark ? 'var(--surface)' : '#f9fafb', borderRadius:'12px 12px 12px 2px', padding:'10px 14px', fontSize:13, lineHeight:1.6, color:'var(--text)', maxWidth:'80%'}}>
              Hi, I'm <strong style={{color:'var(--brand-tan)'}}>Vera</strong> — your financial assistant. Ask me anything about accounting, finance, or how to use Veracity.
            </div>
          </div>
        )}
        {messages.map((msg, i) => msg.role === 'user' ? (
          <div key={i} style={{display:'flex', justifyContent:'flex-end'}}>
            <div style={{background: dark ? 'rgba(205,170,125,0.15)' : '#fdf6ef', borderRadius:'12px 12px 2px 12px', padding:'10px 14px', fontSize:13, lineHeight:1.6, color:'var(--text)', maxWidth:'80%'}}>{msg.text}</div>
          </div>
        ) : (
          <div key={i} style={{display:'flex', gap:10, alignItems:'flex-start'}}>
            {avatar}
            <div style={{maxWidth:'80%'}}>
              <div style={{background: dark ? 'var(--surface)' : '#f9fafb', borderRadius:'12px 12px 12px 2px', padding:'10px 14px', fontSize:13, lineHeight:1.6, color:'var(--text)', whiteSpace:'pre-line'}}>{msg.text}</div>
              {msg.action && (
                <button onClick={() => onNavigate(msg.action.nav)} style={{marginTop:6, background:'var(--brand-tan)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'6px 14px', fontSize:12, fontWeight:600, cursor:'pointer'}}>
                  {msg.action.label} &rarr;
                </button>
              )}
            </div>
          </div>
        ))}
        {typing && (
          <div style={{display:'flex', gap:10, alignItems:'flex-start'}}>
            {avatar}
            <div style={{background: dark ? 'var(--surface)' : '#f9fafb', borderRadius:'12px 12px 12px 2px', padding:'10px 14px', fontSize:13, color:'var(--text-muted)'}}>
              <span className="vera-typing-dots">Vera is thinking</span>
            </div>
          </div>
        )}
      </div>
      {messages.length === 0 && (
        <div style={{padding:'0 20px 12px', display:'flex', gap:8, flexWrap:'wrap'}}>
          {suggestions.map((s, i) => (
            <button key={i} onClick={() => send(s)} style={{background: dark ? 'var(--surface)' : '#f3f4f6', border:'1px solid var(--border)', borderRadius:20, padding:'5px 12px', fontSize:11, color:'var(--text-muted)', cursor:'pointer', fontWeight:500, transition:'background 0.15s'}}

              onMouseLeave={e => e.currentTarget.style.background = dark ? 'var(--surface)' : '#f3f4f6'}
            >{s}</button>
          ))}
        </div>
      )}
      <div style={{display:'flex', gap:8, padding:'12px 20px', borderTop:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fdf8f3'}}>
        <input
          type="text"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') send(input); }}
          placeholder="Ask Vera anything..."
          style={{flex:1, padding:'8px 14px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background: dark ? 'var(--surface2)' : '#fff', color:'var(--text)', fontSize:13, outline:'none'}}
        />
        <button onClick={() => send(input)} disabled={!input.trim() || typing} style={{background:'var(--brand-tan)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, fontWeight:600, cursor: input.trim() && !typing ? 'pointer' : 'not-allowed', opacity: input.trim() && !typing ? 1 : 0.5}}>
          Send
        </button>
      </div>
    </div>
  );
}
