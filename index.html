function coaParseAccount(acctStr) {
  const num = acctStr.match(/^(\d+)/)?.[1] || '';
  const name = acctStr.replace(/^\d+\s*/, '');
  return { num, name };
}

function coaGetDetailType(name, category) {
  if (name.startsWith('Accumulated Depreciation')) return 'Accumulated Depreciation';
  if (name.startsWith('Accumulated Amortization')) return 'Accumulated Amortization';
  return COA_DETAIL_MAP[name] || category;
}

function coaSampleBalance(num, category) {
  const seed = parseInt(num) || 0;
  const r = ((seed * 9301 + 49297) % 233280) / 233280;
  if (['Current Assets', 'Fixed Assets', 'Other Assets'].includes(category)) {
    if (num.endsWith('5') || num.includes('Accumulated') || num.includes('Allowance')) return -(r * 50000).toFixed(2);
    return (r * 120000 + 500).toFixed(2);
  }
  if (category.includes('Liabilities')) return (r * 80000 + 200).toFixed(2);
  if (category === 'Equity') return (r * 200000 + 1000).toFixed(2);
  if (category === 'Revenue') return (r * 300000 + 5000).toFixed(2);
  if (category === 'Cost of Goods Sold') return (r * 100000 + 1000).toFixed(2);
  if (category === 'Operating Expenses') return (r * 30000 + 100).toFixed(2);
  return (r * 10000).toFixed(2);
}

function ChartOfAccountsView({ onViewAccountDetail }) {
  const theme = TOOL_THEMES.coa;
  const dark = useDarkMode();
  const [coa, setCoa] = React.useState(getActiveCOA);
  const [search, setSearch] = React.useState('');
  const [filterType, setFilterType] = React.useState('all');
  const [collapsed, setCollapsed] = React.useState({});
  const [editingKey, setEditingKey] = React.useState(null); // 'cat|index'
  const [editForm, setEditForm] = React.useState({ num: '', name: '' });
  const [addingTo, setAddingTo] = React.useState(null); // category name
  const [addForm, setAddForm] = React.useState({ num: '', name: '' });
  const [showTemplates, setShowTemplates] = React.useState(false);
  const [confirmDelete, setConfirmDelete] = React.useState(null); // 'cat|index'
  const [addError, setAddError] = React.useState('');
  const [editError, setEditError] = React.useState('');

  // Sync with localStorage changes from other tabs
  React.useEffect(() => {
    const handler = () => setCoa(getActiveCOA());
    window.addEventListener('coa-updated', handler);
    window.addEventListener('storage', handler);
    return () => { window.removeEventListener('coa-updated', handler); window.removeEventListener('storage', handler); };
  }, []);

  const persistCoa = (newCoa) => { setCoa(newCoa); saveActiveCOA(newCoa); };
  const categories = Object.keys(coa);
  const toggleCollapse = (cat) => setCollapsed(prev => ({ ...prev, [cat]: !prev[cat] }));

  // Validation
  const allNums = React.useMemo(() => {
    const nums = new Set();
    Object.values(coa).forEach(accts => accts.forEach(a => { const m = a.match(/^(\d+)/); if (m) nums.add(m[1]); }));
    return nums;
  }, [coa]);

  const validateAccount = (num, name, excludeOldNum) => {
    if (!num || !/^\d{4}$/.test(num)) return 'Account number must be exactly 4 digits.';
    if (excludeOldNum !== num && allNums.has(num)) return 'Account number already exists.';
    if (!name.trim()) return 'Account name is required.';
    return '';
  };

  // GL entries check for delete warning
  const getGlEntries = () => { try { return JSON.parse(localStorage.getItem('veracity-gl-entries')) || []; } catch { return []; } };
  const accountHasEntries = (fullAccount) => getGlEntries().some(e => (e.entries || []).some(l => l.account === fullAccount));

  // CRUD operations
  const startEdit = (cat, idx) => {
    const acct = coa[cat][idx];
    const { num, name } = coaParseAccount(acct);
    setEditingKey(`${cat}|${idx}`);
    setEditForm({ num, name });
    setEditError('');
  };

  const saveEdit = (cat, idx) => {
    const oldAcct = coa[cat][idx];
    const oldNum = coaParseAccount(oldAcct).num;
    const err = validateAccount(editForm.num, editForm.name, oldNum);
    if (err) { setEditError(err); return; }
    const newAcct = `${editForm.num} ${editForm.name.trim()}`;
    const newCoa = { ...coa, [cat]: coa[cat].map((a, i) => i === idx ? newAcct : a) };
    persistCoa(newCoa);
    setEditingKey(null);
    setEditError('');
  };

  const cancelEdit = () => { setEditingKey(null); setEditError(''); };

  const startAdd = (cat) => {
    // Suggest next number in sequence
    const nums = coa[cat].map(a => parseInt(coaParseAccount(a).num) || 0);
    const maxNum = nums.length > 0 ? Math.max(...nums) : 0;
    const nextNum = String(maxNum + 10).padStart(4, '0');
    setAddingTo(cat);
    setAddForm({ num: nextNum, name: '' });
    setAddError('');
  };

  const saveAdd = () => {
    const err = validateAccount(addForm.num, addForm.name);
    if (err) { setAddError(err); return; }
    const newAcct = `${addForm.num} ${addForm.name.trim()}`;
    const newCoa = { ...coa, [addingTo]: [...coa[addingTo], newAcct] };
    persistCoa(newCoa);
    setAddingTo(null);
    setAddError('');
  };

  const deleteAccount = (cat, idx) => {
    const newCoa = { ...coa, [cat]: coa[cat].filter((_, i) => i !== idx) };
    persistCoa(newCoa);
    setConfirmDelete(null);
  };

  const moveAccount = (cat, idx, direction) => {
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= coa[cat].length) return;
    const arr = [...coa[cat]];
    [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
    persistCoa({ ...coa, [cat]: arr });
  };

  // Templates
  const applyTemplate = (key, mode) => {
    const template = COA_INDUSTRY_TEMPLATES[key].coa;
    if (mode === 'replace') {
      persistCoa(JSON.parse(JSON.stringify(template)));
    } else {
      // Merge: add accounts from template that don't already exist
      const merged = { ...coa };
      Object.entries(template).forEach(([cat, accts]) => {
        if (!merged[cat]) { merged[cat] = [...accts]; return; }
        const existingNums = new Set(merged[cat].map(a => coaParseAccount(a).num));
        accts.forEach(a => { if (!existingNums.has(coaParseAccount(a).num)) merged[cat].push(a); });
      });
      persistCoa(merged);
    }
    setShowTemplates(false);
  };

  const resetToDefault = () => { localStorage.removeItem(COA_STORAGE_KEY); setCoa(DEFAULT_CHART_OF_ACCOUNTS); window.dispatchEvent(new Event('coa-updated')); };

  // Build display rows
  const allRows = React.useMemo(() => {
    return Object.entries(coa).flatMap(([cat, accts]) =>
      accts.map((a, idx) => {
        const { num, name } = coaParseAccount(a);
        return { num, name, fullAccount: a, statement: COA_STATEMENT_MAP[cat] || 'Other', type: COA_TYPE_MAP[cat] || cat, detailType: coaGetDetailType(name, cat), category: cat, idx, balance: coaSampleBalance(num, cat) };
      })
    );
  }, [coa]);

  const filtered = allRows.filter(r => {
    if (filterType !== 'all' && r.category !== filterType) return false;
    if (search) {
      const q = search.toLowerCase();
      return r.name.toLowerCase().includes(q) || r.num.includes(q) || r.statement.toLowerCase().includes(q) || r.type.toLowerCase().includes(q) || r.detailType.toLowerCase().includes(q);
    }
    return true;
  });

  const grouped = categories.reduce((acc, cat) => {
    const rows = filtered.filter(r => r.category === cat);
    if (rows.length > 0) acc.push({ category: cat, rows });
    return acc;
  }, []);

  const fmt = (v) => {
    const n = parseFloat(v);
    const abs = Math.abs(n);
    const s = abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return n < 0 ? `($${s})` : `$${s}`;
  };

  const totalAccounts = Object.values(coa).reduce((s, a) => s + a.length, 0);
  const isCustom = localStorage.getItem(COA_STORAGE_KEY) !== null;
  const inputStyle = { padding: '5px 8px', fontSize: 12, border: '1.5px solid var(--border)', borderRadius: 'var(--radius-sm)', background: 'var(--bg-white)', color: 'var(--text)' };
  const btnSmall = { padding: '3px 6px', fontSize: 11, border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 2 };

  return (
    <div>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Chart of Accounts</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />

      {/* Toolbar */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
        <input type="text" placeholder="Search accounts..." value={search} onChange={e => setSearch(e.target.value)}
          className="finance-input" style={{ width: 220, padding: '8px 12px', fontSize: 13, border: '1.5px solid var(--border)', borderRadius: 'var(--radius-sm)', background: 'var(--bg-white)' }} />
        <select value={filterType} onChange={e => setFilterType(e.target.value)} className="form-select"
          style={{ padding: '8px 12px', fontSize: 13, border: '1.5px solid var(--border)', borderRadius: 'var(--radius-sm)', background: 'var(--bg-white)', minWidth: 180, maxWidth: 200 }}>
          <option value="all">All Account Types</option>
          {categories.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <button onClick={() => setShowTemplates(true)} style={{ padding: '8px 14px', fontSize: 13, fontWeight: 600, border:'1.5px solid var(--brand-tan)', borderRadius: 'var(--radius-sm)', background:'var(--brand-green-light)', color:'var(--brand-tan)', cursor: 'pointer' }}>
          Industry Templates
        </button>
        {isCustom && (
          <button onClick={resetToDefault} style={{ padding: '8px 14px', fontSize: 13, fontWeight: 600, border: '1.5px solid var(--red)', borderRadius: 'var(--radius-sm)', background: 'var(--red-light)', color: 'var(--red)', cursor: 'pointer' }}>
            Reset to Default
          </button>
        )}
        <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>
          {filtered.length} of {totalAccounts} account{totalAccounts !== 1 ? 's' : ''}
          {isCustom && <span style={{ marginLeft: 6, color: theme.accent, fontWeight: 600 }}>(customized)</span>}
        </span>
        <TableIO data={filtered.map(r => ({'Account #': r.num, Name: r.name, Statement: r.statement, Type: r.type, 'Detail Type': r.detailType, Balance: r.balance}))} filename="chart_of_accounts" templateColumns={['Account #','Name','Category','Statement','Type','Detail Type','Balance']} onImport={(rows, mode) => {
          const newCoa = mode === 'replace' ? {} : JSON.parse(JSON.stringify(coa));
          if (mode === 'replace') { categories.forEach(c => newCoa[c] = []); }
          rows.forEach(r => {
            const cat = r.Category || r.Type || 'Assets';
            if (!newCoa[cat]) newCoa[cat] = [];
            newCoa[cat].push({ account: (r['Account #'] || '') + ' ' + (r.Name || ''), balance: parseFloat(r.Balance) || 0 });
          });
          localStorage.setItem(COA_STORAGE_KEY, JSON.stringify(newCoa));
          window.location.reload();
        }} />
      </div>

      {/* Industry Templates Modal */}
      {showTemplates && (
        <div className="auth-overlay" onClick={() => setShowTemplates(false)}>
          <div className="auth-modal" style={{ maxWidth: 560, width: '95vw' }} onClick={e => e.stopPropagation()}>
            <button className="auth-close" onClick={() => setShowTemplates(false)}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            <h2 style={{ color: theme.accent, marginBottom: 4 }}>Industry Templates</h2>
            <p style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 20 }}>Choose a template to populate your chart of accounts with industry-standard accounts.</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {Object.entries(COA_INDUSTRY_TEMPLATES).map(([key, t]) => {
                const count = Object.values(t.coa).reduce((s, a) => s + a.length, 0);
                return (
                  <div key={key} style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-md)', padding: 14 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--text)' }}>{t.label}</div>
                        <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{t.desc}</div>
                        <div style={{ fontSize: 11, color: theme.accent, marginTop: 4, fontWeight: 600 }}>{count} accounts</div>
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                      <button onClick={() => applyTemplate(key, 'replace')} style={{ padding: '6px 14px', fontSize: 12, fontWeight: 600, border: 'none', borderRadius: 'var(--radius-sm)', background:'var(--brand-green-light)', color: '#fff', cursor: 'pointer' }}>Replace Current</button>
                      <button onClick={() => applyTemplate(key, 'merge')} style={{ padding: '6px 14px', fontSize: 12, fontWeight: 600, border:'1.5px solid var(--brand-tan)', borderRadius: 'var(--radius-sm)', background: 'transparent', color:'var(--brand-tan)', cursor: 'pointer' }}>Merge Into Current</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Delete confirmation modal */}
      {confirmDelete && (() => {
        const [cat, idxStr] = confirmDelete.split('|');
        const idx = parseInt(idxStr);
        const acct = coa[cat]?.[idx];
        if (!acct) return null;
        const hasEntries = accountHasEntries(acct);
        return (
          <div className="auth-overlay" onClick={() => setConfirmDelete(null)}>
            <div className="auth-modal" style={{ maxWidth: 400 }} onClick={e => e.stopPropagation()}>
              <h2 style={{ fontSize: 18, marginBottom: 8 }}>Delete Account</h2>
              <p style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 8 }}>Are you sure you want to delete <strong>{acct}</strong>?</p>
              {hasEntries && <p style={{ fontSize: 12, color: 'var(--red)', fontWeight: 600, marginBottom: 8 }}>Warning: This account has existing GL journal entries. Deleting it will leave those entries referencing an unknown account.</p>}
              <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
                <button onClick={() => deleteAccount(cat, idx)} style={{ flex: 1, padding: 10, fontSize: 13, fontWeight: 600, border: 'none', borderRadius: 'var(--radius-sm)', background: 'var(--red)', color: '#fff', cursor: 'pointer' }}>
                  {hasEntries ? 'Delete Anyway' : 'Delete'}
                </button>
                <button onClick={() => setConfirmDelete(null)} style={{ flex: 1, padding: 10, fontSize: 13, fontWeight: 600, border: '1.5px solid var(--border)', borderRadius: 'var(--radius-sm)', background: 'var(--bg-white)', color: 'var(--text)', cursor: 'pointer' }}>Cancel</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Table */}
      <div className="tool-table-wrap" style={{ maxHeight: 600 }}>
        <table className="tool-table">
          <thead>
            <tr>
              <th style={{ width: 70 }}>#</th>
              <th>NAME</th>
              <th style={{ width: 120 }}>STATEMENT</th>
              <th style={{ width: 170 }}>TYPE</th>
              <th style={{ width: 210 }}>DETAIL TYPE</th>
              <th style={{ width: 100, textAlign: 'right' }}>BALANCE</th>
              <th style={{ width: 110, textAlign: 'center' }}>ACTIONS</th>
            </tr>
          </thead>
          <tbody>
            {grouped.map(g => (
              <React.Fragment key={g.category}>
                <tr onClick={() => toggleCollapse(g.category)} style={{ cursor: 'pointer', background: dark ? 'var(--surface)' : 'var(--tan-10)' }}>
                  <td colSpan={7} style={{ fontWeight: 700, fontSize: 13, color: 'var(--rust)', padding: '10px 12px', borderBottom: '2px solid var(--border)' }}>
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, width: '100%' }}>
                      <span style={{ display: 'inline-block', width: 16, textAlign: 'center', fontSize: 11 }}>{collapsed[g.category] ? '\u25B6' : '\u25BC'}</span>
                      {g.category}
                      <span style={{ fontWeight: 400, fontSize: 12, color: 'var(--text-muted)' }}>({g.rows.length})</span>
                      <span style={{ fontSize: 10, fontWeight: 600, padding: '1px 6px', borderRadius: 'var(--radius-full)', background: COA_STATEMENT_MAP[g.category] === 'Balance Sheet' ? '#dbeafe' : '#fef3c7', color: COA_STATEMENT_MAP[g.category] === 'Balance Sheet' ? '#1e40af' : '#92400e' }}>{COA_STATEMENT_MAP[g.category] === 'Balance Sheet' ? 'BS' : 'IS'}</span>
                      <button onClick={(e) => { e.stopPropagation(); startAdd(g.category); }} style={{ ...btnSmall, background:'var(--brand-green-light)', color:'var(--brand-tan)', fontWeight: 700, marginLeft: 'auto', fontSize: 13, padding: '2px 10px' }} title="Add account to this category">+</button>
                    </span>
                  </td>
                </tr>
                {!collapsed[g.category] && g.rows.map((r) => {
                  const key = `${r.category}|${r.idx}`;
                  const isEditing = editingKey === key;
                  if (isEditing) {
                    return (
                      <tr key={key} style={{ background: dark ? 'var(--surface)' : 'var(--tan-10)' }}>
                        <td><input type="text" value={editForm.num} onChange={e => setEditForm(f => ({ ...f, num: e.target.value }))} maxLength={4} style={{ ...inputStyle, width: 52, fontFamily: 'monospace' }} /></td>
                        <td><input type="text" value={editForm.name} onChange={e => setEditForm(f => ({ ...f, name: e.target.value }))} style={{ ...inputStyle, width: '100%' }} /></td>
                        <td style={{ fontSize: 11, color: 'var(--text-muted)' }}>{r.statement}</td>
                        <td style={{ fontSize: 11, color: 'var(--text-muted)' }}>{r.type}</td>
                        <td style={{ fontSize: 11, color: 'var(--text-muted)' }}>{r.detailType}</td>
                        <td></td>
                        <td style={{ textAlign: 'center' }}>
                          <div style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
                            <button onClick={() => saveEdit(r.category, r.idx)} style={{ ...btnSmall, background: '#16a34a', color: '#fff' }} title="Save">Save</button>
                            <button onClick={cancelEdit} style={{ ...btnSmall, background: 'var(--surface2)', color: 'var(--text-muted)' }} title="Cancel">Cancel</button>
                          </div>
                          {editError && <div style={{ fontSize: 10, color: 'var(--red)', marginTop: 2 }}>{editError}</div>}
                        </td>
                      </tr>
                    );
                  }
                  return (
                    <tr key={key}>
                      <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{onViewAccountDetail ? <button onClick={() => onViewAccountDetail(r.fullAccount)} style={{ background: 'none', border: 'none', padding: 0, fontFamily: 'monospace', fontSize: 12, color: 'var(--brand-tan)', cursor: 'pointer', textDecoration: 'underline', fontWeight: 600 }} title="View account detail in GL">{r.num}</button> : <span style={{ color: 'var(--text-muted)' }}>{r.num}</span>}</td>
                      <td style={{ fontWeight: 500 }}>{r.name}</td>
                      <td style={{ fontSize: 11, color: 'var(--charcoal-slate)' }}>{r.statement}</td>
                      <td style={{ fontSize: 11, color: 'var(--charcoal-slate)' }}>{r.type}</td>
                      <td style={{ fontSize: 11, color: 'var(--charcoal-slate)' }}>{r.detailType}</td>
                      <td style={{ textAlign: 'right', fontFamily: 'monospace', fontWeight: 500, fontSize: 12, color: parseFloat(r.balance) < 0 ? 'var(--red)' : 'var(--brand-tan)' }}>{fmt(r.balance)}</td>
                      <td style={{ textAlign: 'center' }}>
                        <div style={{ display: 'flex', gap: 3, justifyContent: 'center' }}>
                          <button onClick={() => moveAccount(r.category, r.idx, -1)} style={{ ...btnSmall, background: 'var(--surface2)', color: 'var(--text-muted)' }} title="Move up">&uarr;</button>
                          <button onClick={() => moveAccount(r.category, r.idx, 1)} style={{ ...btnSmall, background: 'var(--surface2)', color: 'var(--text-muted)' }} title="Move down">&darr;</button>
                          <button onClick={() => startEdit(r.category, r.idx)} style={{ ...btnSmall, background:'var(--brand-green-light)', color:'var(--brand-tan)' }} title="Edit">Edit</button>
                          <button onClick={() => setConfirmDelete(`${r.category}|${r.idx}`)} style={{ ...btnSmall, background: 'var(--red-light)', color: 'var(--red)' }} title="Delete">Del</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
                {/* Add account row */}
                {addingTo === g.category && !collapsed[g.category] && (
                  <tr style={{ background: dark ? 'var(--surface)' : 'var(--tan-10)' }}>
                    <td><input type="text" value={addForm.num} onChange={e => setAddForm(f => ({ ...f, num: e.target.value }))} maxLength={4} placeholder="####" style={{ ...inputStyle, width: 52, fontFamily: 'monospace' }} /></td>
                    <td><input type="text" value={addForm.name} onChange={e => setAddForm(f => ({ ...f, name: e.target.value }))} placeholder="Account name..." style={{ ...inputStyle, width: '100%' }} autoFocus /></td>
                    <td style={{ fontSize: 11, color: 'var(--text-muted)' }}>{COA_STATEMENT_MAP[g.category] || ''}</td>
                    <td style={{ fontSize: 11, color: 'var(--text-muted)' }}>{COA_TYPE_MAP[g.category] || g.category}</td>
                    <td></td>
                    <td></td>
                    <td style={{ textAlign: 'center' }}>
                      <div style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
                        <button onClick={saveAdd} style={{ ...btnSmall, background: '#16a34a', color: '#fff' }}>Add</button>
                        <button onClick={() => { setAddingTo(null); setAddError(''); }} style={{ ...btnSmall, background: 'var(--surface2)', color: 'var(--text-muted)' }}>Cancel</button>
                      </div>
                      {addError && <div style={{ fontSize: 10, color: 'var(--red)', marginTop: 2 }}>{addError}</div>}
                    </td>
                  </tr>
                )}
              </React.Fragment>
            ))}
            {grouped.length === 0 && (
              <tr><td colSpan={7} style={{ textAlign: 'center', padding: 32, color: 'var(--text-muted)' }}>No accounts match your search.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function GeneralLedgerView({ settings = {}, deepLinkAccount, onDeepLinkConsumed, onNavigate }) {
  const theme = TOOL_THEMES.gl;
  const gl = {
    maxNameLen: settings.glMaxAccountNameLen || 60,
    maxAmt: settings.glMaxTransactionAmt || 10000000,
    requireMemo: settings.glRequireMemo !== false,
    requireBalanced: settings.glRequireBalanced !== false,
    lockDays: settings.glLockAfterDays || 0,
    defaultToday: settings.glDefaultDateToday !== false,
    fyStart: settings.glFiscalYearStart || 1,
  };
  const [glEntries, setGlEntries] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(GL_STORAGE_KEY)) || []; } catch { return []; }
  });
  const [tab, setTab] = React.useState('journal');
  const [showForm, setShowForm] = React.useState(false);
  const [filterSource, setFilterSource] = React.useState('all');
  const [filterAccount, setFilterAccount] = React.useState('all');
  const [sortBy, setSortBy] = React.useState('entry-desc');
  const [expandedId, setExpandedId] = React.useState(null);
  const [dateFrom, setDateFrom] = React.useState('');
  const [dateTo, setDateTo] = React.useState('');
  const [detailAccount, setDetailAccount] = React.useState('');
  const [form, setForm] = React.useState({ date: new Date().toISOString().slice(0, 10), memo: '', recurring: false, frequency: 'Monthly', lines: [{ account: '1000 Cash', debit: '', credit: '' }, { account: '2000 Accounts Payable', debit: '', credit: '' }] });
  const [formError, setFormError] = React.useState('');
  const [showClosingConfirm, setShowClosingConfirm] = React.useState(false);
  const [showImport, setShowImport] = React.useState(false);
  const [importText, setImportText] = React.useState('');
  const [importDate, setImportDate] = React.useState(new Date().toISOString().slice(0, 10));
  const [importError, setImportError] = React.useState('');
  const [importPreview, setImportPreview] = React.useState(null);

  // Deep-link from COA: jump to Account Detail tab with pre-selected account
  React.useEffect(() => {
    if (deepLinkAccount) {
      setTab('detail');
      setDetailAccount(deepLinkAccount);
      if (onDeepLinkConsumed) onDeepLinkConsumed();
    }
  }, [deepLinkAccount]);

  React.useEffect(() => {
    const reload = () => { try { setGlEntries(JSON.parse(localStorage.getItem(GL_STORAGE_KEY)) || []); } catch {} };
    window.addEventListener('focus', reload);
    return () => window.removeEventListener('focus', reload);
  }, []);
  React.useEffect(() => { try { setGlEntries(JSON.parse(localStorage.getItem(GL_STORAGE_KEY)) || []); } catch {} }, [tab, filterSource, filterAccount]);

  const saveEntries = (updated) => { setGlEntries(updated); localStorage.setItem(GL_STORAGE_KEY, JSON.stringify(updated)); };
  const resetForm = () => { setForm({ date: gl.defaultToday ? new Date().toISOString().slice(0, 10) : '', memo: '', recurring: false, frequency: 'Monthly', lines: [{ account: '1000 Cash', debit: '', credit: '' }, { account: '2000 Accounts Payable', debit: '', credit: '' }] }); setFormError(''); setShowForm(false); };
  const addLine = () => setForm(f => ({ ...f, lines: [...f.lines, { account: '1000 Cash', debit: '', credit: '' }] }));
  const removeLine = (i) => setForm(f => ({ ...f, lines: f.lines.filter((_, idx) => idx !== i) }));
  const updateLine = (i, field, val) => setForm(f => ({ ...f, lines: f.lines.map((l, idx) => idx === i ? { ...l, [field]: val } : l) }));

  const handleSubmit = () => {
    if (!form.date) { setFormError('Date is required.'); return; }
    if (gl.requireMemo && !form.memo) { setFormError('Memo is required (see Settings to change).'); return; }
    if (form.lines.length < 2) { setFormError('At least two line items required.'); return; }
    const totalDebit = form.lines.reduce((s, l) => s + (parseFloat(l.debit) || 0), 0);
    const totalCredit = form.lines.reduce((s, l) => s + (parseFloat(l.credit) || 0), 0);
    if (totalDebit === 0 && totalCredit === 0) { setFormError('Entry must have amounts.'); return; }
    if (gl.requireBalanced && Math.abs(totalDebit - totalCredit) > 0.005) { setFormError(`Debits ($${totalDebit.toFixed(2)}) must equal credits ($${totalCredit.toFixed(2)}).`); return; }
    const maxLine = Math.max(...form.lines.map(l => Math.max(parseFloat(l.debit) || 0, parseFloat(l.credit) || 0)));
    if (maxLine > gl.maxAmt) { setFormError(`Line item exceeds maximum transaction amount of $${gl.maxAmt.toLocaleString()}.`); return; }
    const jn = nextJournalNum(glEntries, 'manual');
    const entry = {
      id: Date.now().toString() + Math.random().toString(36).slice(2, 6), ...jn,
      date: form.date, memo: form.memo, source: 'manual', recurring: form.recurring || false, frequency: form.frequency || 'Monthly',
      entries: form.lines.map(l => ({ account: l.account, debit: parseFloat(l.debit) || 0, credit: parseFloat(l.credit) || 0 })),
    };
    saveEntries([...glEntries, entry]);
    resetForm();
  };

  const handleDeleteEntry = (id) => saveEntries(glEntries.filter(e => e.id !== id));

  const handleReverse = (entry) => {
    const revSource = `reversal-${entry.id}`;
    const jn = nextJournalNum(glEntries, revSource);
    const rev = {
      id: Date.now().toString() + Math.random().toString(36).slice(2, 6), ...jn,
      date: new Date().toISOString().slice(0, 10), memo: `Reversal of: ${entry.memo}`, source: revSource,
      entries: (entry.entries || []).map(l => ({ account: l.account, debit: l.credit || 0, credit: l.debit || 0 })),
    };
    saveEntries([...glEntries, rev]);
  };

  const handleGenerateNext = (entry) => {
    const freq = entry.frequency || 'Monthly';
    const d = new Date(entry.date);
    if (freq === 'Monthly') d.setMonth(d.getMonth() + 1);
    else if (freq === 'Quarterly') d.setMonth(d.getMonth() + 3);
    else d.setFullYear(d.getFullYear() + 1);
    const jn = nextJournalNum(glEntries, entry.source || 'manual');
    const next = { ...entry, id: Date.now().toString() + Math.random().toString(36).slice(2, 6), ...jn, date: d.toISOString().slice(0, 10) };
    saveEntries([...glEntries, next]);
  };

  const handleClosingEntries = () => {
    const closingDate = new Date().toISOString().slice(0, 10);
    const revenueCats = ['Revenue'];
    const expenseCats = ['Cost of Goods Sold', 'Operating Expenses'];
    const closingLines = [];
    // Close revenue accounts (debit revenue, credit retained earnings)
    Object.entries(accountTotals).forEach(([acct, t]) => {
      const info = getAllAccounts().find(a => a.account === acct);
      if (!info) return;
      if (revenueCats.includes(info.category)) {
        const net = t.credit - t.debit;
        if (Math.abs(net) > 0.005) closingLines.push({ account: acct, debit: net > 0 ? net : 0, credit: net < 0 ? Math.abs(net) : 0 });
      }
      if (expenseCats.includes(info.category)) {
        const net = t.debit - t.credit;
        if (Math.abs(net) > 0.005) closingLines.push({ account: acct, debit: 0, credit: net > 0 ? net : 0 });
      }
    });
    if (closingLines.length === 0) { setShowClosingConfirm(false); return; }
    const totalDebit = closingLines.reduce((s, l) => s + l.debit, 0);
    const totalCredit = closingLines.reduce((s, l) => s + l.credit, 0);
    const reDiff = totalDebit - totalCredit;
    closingLines.push({ account: '3300 Retained Earnings', debit: reDiff < 0 ? Math.abs(reDiff) : 0, credit: reDiff > 0 ? reDiff : 0 });
    const closingSource = `closing-${closingDate}`;
    const jn = nextJournalNum(glEntries, closingSource);
    const entry = { id: Date.now().toString() + Math.random().toString(36).slice(2, 6), ...jn, date: closingDate, memo: 'Closing Entries — Revenue & Expenses to Retained Earnings', source: closingSource, entries: closingLines };
    saveEntries([...glEntries, entry]);
    setShowClosingConfirm(false);
  };

  const parseImportCSV = (text) => {
    const lines = text.trim().split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
    if (lines.length < 2) return { error: 'CSV must have a header row and at least one data row.' };
    const header = lines[0].map(h => h.toLowerCase());
    const acctIdx = header.findIndex(h => h.includes('account'));
    const debitIdx = header.findIndex(h => h.includes('debit'));
    const creditIdx = header.findIndex(h => h.includes('credit'));
    const balIdx = header.findIndex(h => h.includes('balance'));
    if (acctIdx === -1) return { error: 'CSV must have an "Account" column.' };
    if (debitIdx === -1 && creditIdx === -1 && balIdx === -1) return { error: 'CSV must have "Debit" and "Credit" columns, or a "Balance" column.' };
    const validAccts = getAllAccounts().map(a => a.account);
    const rows = [];
    const errors = [];
    for (let i = 1; i < lines.length; i++) {
      const row = lines[i];
      if (row.length < 2 || !row[acctIdx]) continue;
      const acctName = row[acctIdx];
      const matched = validAccts.find(a => a === acctName || a.toLowerCase() === acctName.toLowerCase() || a.split(' ').slice(1).join(' ').toLowerCase() === acctName.toLowerCase() || a.split(' ')[0] === acctName);
      if (!matched) { errors.push(`Row ${i + 1}: Unknown account "${acctName}"`); continue; }
      let debit = 0, credit = 0;
      if (debitIdx !== -1 && creditIdx !== -1) {
        debit = parseFloat(row[debitIdx]) || 0;
        credit = parseFloat(row[creditIdx]) || 0;
      } else if (balIdx !== -1) {
        const bal = parseFloat(row[balIdx]) || 0;
        if (bal > 0) debit = bal; else credit = Math.abs(bal);
      }
      if (debit === 0 && credit === 0) continue;
      rows.push({ account: matched, debit, credit });
    }
    if (errors.length > 0) return { error: errors.join('\n') };
    if (rows.length === 0) return { error: 'No valid balance rows found.' };
    return { rows };
  };

  const handleImportPreview = () => {
    setImportError('');
    setImportPreview(null);
    if (!importText.trim()) { setImportError('Paste CSV data or use the file upload.'); return; }
    const result = parseImportCSV(importText);
    if (result.error) { setImportError(result.error); return; }
    setImportPreview(result.rows);
  };

  const handleImportConfirm = () => {
    if (!importPreview || importPreview.length === 0) return;
    if (!importDate) { setImportError('Date is required.'); return; }
    const totalDebit = importPreview.reduce((s, r) => s + r.debit, 0);
    const totalCredit = importPreview.reduce((s, r) => s + r.credit, 0);
    const diff = totalDebit - totalCredit;
    const lines = [...importPreview];
    if (Math.abs(diff) > 0.005) {
      lines.push({ account: '3000 Owner\'s Equity / Capital', debit: diff < 0 ? Math.abs(diff) : 0, credit: diff > 0 ? diff : 0 });
    }
    const importSource = `import-${importDate}`;
    const jn = nextJournalNum(glEntries, importSource);
    const entry = { id: Date.now().toString() + Math.random().toString(36).slice(2, 6), ...jn, date: importDate, memo: 'Opening Balances — Imported', source: importSource, entries: lines };
    saveEntries([...glEntries, entry]);
    setShowImport(false); setImportText(''); setImportPreview(null); setImportError('');
  };

  const handleImportFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setImportText(ev.target.result); setImportPreview(null); setImportError(''); };
    reader.readAsText(file);
  };

  const exportCSV = (data, filename) => {
    const csv = data.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  };
  const exportJournal = () => {
    const rows = [['Entry #','Date','Memo','Source','Account','Debit','Credit']];
    filtered.forEach(e => (e.entries||[]).forEach(l => rows.push([e.journalNum || e.entryNum||'', e.date, e.memo, e.source, l.account, l.debit||'', l.credit||''])));
    exportCSV(rows, `GL_Journal_${new Date().toISOString().slice(0,10)}.csv`);
  };
  const exportTrial = () => {
    const rows = [['Account','Category','Debits','Credits','Balance']];
    trialAccounts.forEach(a => rows.push([a.account, a.category, a.debit.toFixed(2), a.credit.toFixed(2), a.balance.toFixed(2)]));
    rows.push(['TOTALS','', trialTotalDebit.toFixed(2), trialTotalCredit.toFixed(2), (trialTotalDebit-trialTotalCredit).toFixed(2)]);
    exportCSV(rows, `GL_Trial_Balance_${new Date().toISOString().slice(0,10)}.csv`);
  };

  // Apply date range filter
  const dateFiltered = glEntries.filter(e => {
    if (dateFrom && e.date < dateFrom) return false;
    if (dateTo && e.date > dateTo) return false;
    return true;
  });

  const filtered = dateFiltered.filter(e => {
    if (filterSource === 'manual' && e.source !== 'manual') return false;
    if (filterSource === 'ap' && !e.source?.startsWith('ap-')) return false;
    if (filterSource === 'ar' && !e.source?.startsWith('ar-')) return false;
    if (filterSource === 'closing' && !e.source?.startsWith('closing-')) return false;
    if (filterSource === 'reversal' && !e.source?.startsWith('reversal-')) return false;
    if (filterSource === 'import' && !e.source?.startsWith('import-')) return false;
    if (filterAccount !== 'all' && !e.entries?.some(l => l.account === filterAccount)) return false;
    return true;
  }).sort((a, b) => {
    if (sortBy === 'entry-desc') return (b.journalNum || '').localeCompare(a.journalNum || '') || (b.journalSeq || b.entryNum || 0) - (a.journalSeq || a.entryNum || 0);
    if (sortBy === 'entry-asc') return (a.journalNum || '').localeCompare(b.journalNum || '') || (a.journalSeq || a.entryNum || 0) - (b.journalSeq || b.entryNum || 0);
    if (sortBy === 'date-desc') return b.date.localeCompare(a.date) || b.id.localeCompare(a.id);
    if (sortBy === 'date-asc') return a.date.localeCompare(b.date) || a.id.localeCompare(b.id);
    return 0;
  });

  // Trial balance (respects date range)
  const accountTotals = {};
  dateFiltered.forEach(e => {
    (e.entries || []).forEach(l => {
      if (!accountTotals[l.account]) accountTotals[l.account] = { debit: 0, credit: 0 };
      accountTotals[l.account].debit += l.debit || 0;
      accountTotals[l.account].credit += l.credit || 0;
    });
  });
  const trialAccounts = Object.entries(accountTotals).map(([account, t]) => {
    const info = getAllAccounts().find(a => a.account === account) || { category: 'Other' };
    return { account, category: info.category, debit: t.debit, credit: t.credit, balance: t.debit - t.credit };
  }).sort((a, b) => a.account.localeCompare(b.account));
  const trialTotalDebit = trialAccounts.reduce((s, a) => s + a.debit, 0);
  const trialTotalCredit = trialAccounts.reduce((s, a) => s + a.credit, 0);

  // Account detail
  const detailEntries = detailAccount ? dateFiltered.filter(e => e.entries?.some(l => l.account === detailAccount)).sort((a, b) => a.date.localeCompare(b.date) || (a.entryNum||0) - (b.entryNum||0)) : [];
  let runningBal = 0;
  const detailRows = detailEntries.flatMap(e => (e.entries||[]).filter(l => l.account === detailAccount).map(l => {
    runningBal += (l.debit || 0) - (l.credit || 0);
    return { entryNum: e.entryNum, journalNum: e.journalNum, date: e.date, memo: e.memo, source: e.source, debit: l.debit, credit: l.credit, balance: runningBal };
  }));

  const fmt = (n) => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const dark = useDarkMode();
  const badgeBase = { display:'inline-block', padding:'2px 8px', borderRadius:10, fontSize:10, fontWeight:600 };
  const sourceBadge = (src) => {
    if (src?.startsWith('closing-')) return <span style={{ ...badgeBase, background:'#f59e0b18', color:'#f59e0b' }}>Closing</span>;
    if (src?.startsWith('reversal-')) return <span style={{ ...badgeBase, background:'#ef444418', color:'#ef4444' }}>Reversal</span>;
    if (src?.startsWith('import-')) return <span style={{ ...badgeBase, background:'#8b5cf618', color:'#8b5cf6' }}>Import</span>;
    const isAP = src && src.startsWith('ap-');
    const isAR = src && src.startsWith('ar-');
    if (isAR) return <span onClick={(e) => { e.stopPropagation(); onNavigate && onNavigate('ar'); }} style={{ ...badgeBase, background:'#06b6d418', color:'#06b6d4', cursor:'pointer', textDecoration:'underline' }} title="Go to Accounts Receivable">AR &#8599;</span>;
    if (isAP) return <span onClick={(e) => { e.stopPropagation(); onNavigate && onNavigate('ap'); }} style={{ ...badgeBase, background:'rgba(45,106,79,0.09)', color:'var(--forest-green)', cursor:'pointer', textDecoration:'underline' }} title="Go to Accounts Payable">AP &#8599;</span>;
    return <span style={{ ...badgeBase, background:'#3b82f618', color:'#3b82f6' }}>Manual</span>;
  };
  const allAccountNames = [...new Set(glEntries.flatMap(e => (e.entries || []).map(l => l.account)))].sort();
  const selStyle = {padding:'6px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface2)' : '#fff', color:'var(--text)', fontSize:13};
  const tabStyle = (active) => ({ padding:'8px 18px', borderRadius:'var(--radius-sm) var(--radius-sm) 0 0', border:`1px solid ${active ? 'var(--brand-tan)' : 'var(--border)'}`, borderBottom: active ? '2px solid var(--brand-tan)' : '1px solid var(--border)', background: active ? 'var(--brand-tan)' : 'transparent', color: active ? 'var(--brand-green)' : 'var(--text-muted)', fontWeight: active ? 600 : 400, fontSize:13, cursor:'pointer' });

  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>General Ledger</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>
      </PageHeader>
      <ToolExplainer theme={theme} />

      {/* Tabs */}
      <div style={{display:'flex', gap:4, marginBottom:16}}>
        {[['journal', 'Journal Entries'], ['trial', 'Trial Balance'], ['detail', 'Account Detail']].map(([key, label]) => (
          <button key={key} onClick={() => setTab(key)} style={tabStyle(tab === key)}>{label}</button>
        ))}
      </div>

      {/* Date Range Filter */}
      <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
        <label style={{fontSize:12, fontWeight:600, color:'var(--text-muted)'}}>Date Range:</label>
        <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{...selStyle, padding:'4px 8px'}} />
        <span style={{fontSize:12, color:'var(--text-muted)'}}>to</span>
        <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{...selStyle, padding:'4px 8px'}} />
        {(dateFrom || dateTo) && <button onClick={() => { setDateFrom(''); setDateTo(''); }} style={{background:'none', border:'none', color:'#ef4444', fontSize:11, cursor:'pointer', fontWeight:600}}>Clear</button>}
      </div>

      {tab === 'journal' && <>
        {/* Summary */}
        <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', marginBottom:20, overflow:'hidden'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
            <tbody>
              <tr>
                {[
                  { label: 'Total', value: glEntries.length, color: 'var(--brand-tan)' },
                  { label: 'Manual', value: glEntries.filter(e => e.source === 'manual').length, color: 'var(--charcoal-slate)' },
                  { label: 'AP', value: glEntries.filter(e => e.source?.startsWith('ap-')).length, color: 'var(--forest-green)' },
                  { label: 'AR', value: glEntries.filter(e => e.source?.startsWith('ar-')).length, color: 'var(--copper)' },
                  { label: 'Closing', value: glEntries.filter(e => e.source?.startsWith('closing-')).length, color: 'var(--light-brown)' },
                  { label: 'Reversals', value: glEntries.filter(e => e.source?.startsWith('reversal-')).length, color: 'var(--rust)' },
                  { label: 'Imports', value: glEntries.filter(e => e.source?.startsWith('import-')).length, color: 'var(--light-brown)' },
                  { label: 'Accounts', value: Object.keys(accountTotals).length, color: 'var(--forest-green)' },
                ].map((c, i) => (
                  <td key={i} style={{padding:'8px 12px', textAlign:'center', borderRight: i < 7 ? '1px solid var(--border)' : 'none'}}>
                    <div style={{fontSize:10, color:'var(--text-muted)', marginBottom:2, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.5px'}}>{c.label}</div>
                    <div style={{fontSize:18, fontWeight:700, color: c.color}}>{c.value}</div>
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>

        {/* Controls */}
        <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
          <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={() => { resetForm(); setShowForm(true); }}>+ Add Entry</button>
          <select value={filterSource} onChange={e => setFilterSource(e.target.value)} style={{...selStyle, maxWidth:180}}>
            <option value="all">All Sources</option>
            <option value="manual">Manual Only</option>
            <option value="ap">AP Only</option>
            <option value="ar">AR Only</option>
            <option value="closing">Closing Only</option>
            <option value="reversal">Reversals Only</option>
            <option value="import">Imports Only</option>
          </select>
          <select value={filterAccount} onChange={e => setFilterAccount(e.target.value)} style={{...selStyle, maxWidth:200}}>
            <option value="all">All Accounts</option>
            {allAccountNames.map(a => <option key={a} value={a}>{a}</option>)}
          </select>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{...selStyle, maxWidth:180}}>
            <option value="entry-desc">Entry # (Newest)</option>
            <option value="entry-asc">Entry # (Oldest)</option>
            <option value="date-desc">Date (Newest)</option>
            <option value="date-asc">Date (Oldest)</option>
          </select>
          <TableIO data={filtered.flatMap(e => (e.entries||[]).map(l => ({'Entry #':e.journalNum||e.entryNum||'', Date:e.date, Memo:e.memo, Source:e.source, Account:l.account, Debit:l.debit||'', Credit:l.credit||''})))} filename={`GL_Journal_${new Date().toISOString().slice(0,10)}`} onImportClick={() => { setShowImport(true); setImportText(''); setImportPreview(null); setImportError(''); }} />
          <span style={{fontSize:12, color:'var(--text-muted)', marginLeft:'auto'}}>{filtered.length} entr{filtered.length !== 1 ? 'ies' : 'y'}</span>
        </div>

        {/* Add Entry Form */}
        {showForm && (
          <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:20, marginBottom:20}}>
            <h3 style={{margin:'0 0 16px', fontSize:16, fontWeight:600, color:'var(--text)'}}>New Journal Entry</h3>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16}}>
              <div>
                <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Date *</label>
                <input type="date" value={form.date} onChange={e => setForm(f => ({...f, date: e.target.value}))} style={{width:'100%', padding:'8px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fff', color:'var(--text)', fontSize:13, boxSizing:'border-box'}} />
              </div>
              <div>
                <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Memo {gl.requireMemo ? '*' : ''}</label>
                <input value={form.memo} onChange={e => setForm(f => ({...f, memo: e.target.value}))} placeholder="Description of transaction" style={{width:'100%', padding:'8px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fff', color:'var(--text)', fontSize:13, boxSizing:'border-box'}} />
              </div>
            </div>
            <div style={{display:'flex', gap:16, alignItems:'center', marginBottom:16}}>
              <label style={{display:'flex', alignItems:'center', gap:6, fontSize:12, color:'var(--text-muted)', cursor:'pointer'}}>
                <input type="checkbox" checked={form.recurring} onChange={e => setForm(f => ({...f, recurring: e.target.checked}))} /> Recurring?
              </label>
              {form.recurring && (
                <select value={form.frequency} onChange={e => setForm(f => ({...f, frequency: e.target.value}))} style={selStyle}>
                  <option value="Monthly">Monthly</option>
                  <option value="Quarterly">Quarterly</option>
                  <option value="Annually">Annually</option>
                </select>
              )}
            </div>
            <div style={{marginBottom:8, fontSize:13, fontWeight:600, color:'var(--text)'}}>Line Items</div>
            <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr auto', gap:8, marginBottom:4, fontSize:11, fontWeight:600, color:'var(--text-muted)'}}>
              <span>Account</span><span>Debit</span><span>Credit</span><span></span>
            </div>
            {form.lines.map((line, i) => (
              <div key={i} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr auto', gap:8, marginBottom:6}}>
                <select value={line.account} onChange={e => updateLine(i, 'account', e.target.value)} style={{padding:'6px 10px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fff', color:'var(--text)', fontSize:12}}>
                  {Object.entries(getActiveCOA()).map(([cat, accts]) => (
                    <optgroup key={cat} label={cat}>{accts.map(a => <option key={a} value={a}>{a}</option>)}</optgroup>
                  ))}
                </select>
                <input type="number" step="0.01" placeholder="0.00" value={line.debit} onChange={e => updateLine(i, 'debit', e.target.value)} style={{padding:'6px 10px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fff', color:'var(--text)', fontSize:12}} />
                <input type="number" step="0.01" placeholder="0.00" value={line.credit} onChange={e => updateLine(i, 'credit', e.target.value)} style={{padding:'6px 10px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fff', color:'var(--text)', fontSize:12}} />
                <button onClick={() => removeLine(i)} disabled={form.lines.length <= 2} style={{background:'none', border:'1px solid #ef4444', color:'#ef4444', borderRadius:'var(--radius-sm)', padding:'4px 8px', fontSize:11, cursor: form.lines.length <= 2 ? 'not-allowed' : 'pointer', opacity: form.lines.length <= 2 ? 0.4 : 1}}>X</button>
              </div>
            ))}
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:8, marginBottom:12}}>
              <button onClick={addLine} style={{background:'none', border:'1px solid var(--border)', color:'var(--brand-tan)', borderRadius:'var(--radius-sm)', padding:'4px 12px', fontSize:12, cursor:'pointer', fontWeight:600}}>+ Add Line</button>
              <div style={{fontSize:12, color:'var(--text-muted)'}}>
                Debits: <b style={{color:'var(--text)'}}>{fmt(form.lines.reduce((s, l) => s + (parseFloat(l.debit) || 0), 0))}</b>
                {' | '}Credits: <b style={{color:'var(--text)'}}>{fmt(form.lines.reduce((s, l) => s + (parseFloat(l.credit) || 0), 0))}</b>
              </div>
            </div>
            {formError && <div style={{color:'#ef4444', fontSize:12, marginBottom:10, fontWeight:500}}>{formError}</div>}
            <div style={{display:'flex', gap:8}}>
              <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={handleSubmit}>Post Entry</button>
              <button className="tool-btn tool-btn-secondary" onClick={resetForm}>Cancel</button>
            </div>
          </div>
        )}

        {/* Import Balances Modal */}
        {showImport && (
          <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid #8b5cf6', borderRadius:'var(--radius-md)', padding:20, marginBottom:20}}>
            <h3 style={{margin:'0 0 4px', fontSize:16, fontWeight:600, color:'#8b5cf6'}}>Import GL Balances</h3>
            <p style={{fontSize:12, color:'var(--text-muted)', margin:'0 0 16px'}}>Upload a CSV or paste data with columns: <b>Account, Debit, Credit</b> (or <b>Account, Balance</b> where positive = debit, negative = credit). Account names must match the chart of accounts (number + name, e.g. "1000 Cash") or just the number or name.</p>
            <div style={{display:'flex', gap:12, marginBottom:12, alignItems:'center'}}>
              <div>
                <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Date for Opening Entry</label>
                <input type="date" value={importDate} onChange={e => setImportDate(e.target.value)} style={{padding:'8px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fff', color:'var(--text)', fontSize:13}} />
              </div>
              <div>
                <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Upload CSV File</label>
                <input type="file" accept=".csv,.txt" onChange={handleImportFile} style={{fontSize:12}} />
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>Or Paste CSV Data</label>
              <textarea value={importText} onChange={e => { setImportText(e.target.value); setImportPreview(null); setImportError(''); }} placeholder={'Account,Debit,Credit\n1000 Cash,50000,\n2000 Accounts Payable,,12000\n3000 Owner\'s Equity / Capital,,38000'} rows={8} style={{width:'100%', padding:'10px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface)' : '#fff', color:'var(--text)', fontSize:12, fontFamily:'monospace', boxSizing:'border-box', resize:'vertical'}} />
            </div>
            {importError && <div style={{color:'#ef4444', fontSize:12, marginBottom:10, fontWeight:500, whiteSpace:'pre-wrap'}}>{importError}</div>}
            {importPreview && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12, fontWeight:600, color:'var(--text)', marginBottom:6}}>Preview — {importPreview.length} line{importPreview.length !== 1 ? 's' : ''}</div>
                <div style={{background: dark ? 'var(--surface)' : '#f9fafb', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', overflow:'hidden', maxHeight:200, overflowY:'auto'}}>
                  <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:0, padding:'8px 12px', fontSize:11, fontWeight:700, color:'var(--text-muted)', borderBottom:'1px solid var(--border)'}}>
                    <span>Account</span><span style={{textAlign:'right'}}>Debit</span><span style={{textAlign:'right'}}>Credit</span>
                  </div>
                  {importPreview.map((r, i) => (
                    <div key={i} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:0, padding:'6px 12px', fontSize:12, borderBottom:'1px solid var(--border)', color:'var(--text)'}}>
                      <span>{r.account}</span>
                      <span style={{textAlign:'right'}}>{r.debit ? fmt(r.debit) : ''}</span>
                      <span style={{textAlign:'right'}}>{r.credit ? fmt(r.credit) : ''}</span>
                    </div>
                  ))}
                  <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:0, padding:'8px 12px', fontSize:12, fontWeight:700, borderTop:'2px solid var(--border)', color:'var(--text)'}}>
                    <span>TOTALS</span>
                    <span style={{textAlign:'right'}}>{fmt(importPreview.reduce((s, r) => s + r.debit, 0))}</span>
                    <span style={{textAlign:'right'}}>{fmt(importPreview.reduce((s, r) => s + r.credit, 0))}</span>
                  </div>
                </div>
                {Math.abs(importPreview.reduce((s, r) => s + r.debit, 0) - importPreview.reduce((s, r) => s + r.credit, 0)) > 0.005 && (
                  <div style={{fontSize:11, color:'#f59e0b', marginTop:6, fontWeight:500}}>Note: Debits and credits don't balance. The difference will be posted to Owner's Equity / Capital (3000) automatically.</div>
                )}
              </div>
            )}
            <div style={{display:'flex', gap:8}}>
              {!importPreview ? (
                <button onClick={handleImportPreview} style={{background:'#8b5cf6', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer', fontWeight:600}}>Preview Import</button>
              ) : (
                <button onClick={handleImportConfirm} style={{background:'#8b5cf6', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer', fontWeight:600}}>Confirm &amp; Post</button>
              )}
              <button onClick={() => setShowImport(false)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer'}}>Cancel</button>
            </div>
          </div>
        )}

        {/* Entries List */}
        {filtered.length === 0 ? (
          <div style={{textAlign:'center', padding:40, color:'var(--text-muted)', fontSize:14}}>
            {glEntries.length === 0 ? 'No journal entries yet. Add one manually or create a bill in Accounts Payable.' : 'No entries match this filter.'}
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {filtered.map(entry => {
              const expanded = expandedId === entry.id;
              const isAP = entry.source && entry.source.startsWith('ap-');
              const isClosing = entry.source?.startsWith('closing-');
              const isReversal = entry.source?.startsWith('reversal-');
              const isImport = entry.source?.startsWith('import-');
              const isAR = entry.source?.startsWith('ar-');
              const borderColor = isImport ? '#8b5cf6' : isClosing ? '#f59e0b' : isReversal ? '#ef4444' : isAR ? '#06b6d4' : isAP ? 'var(--forest-green)' : '#3b82f6';
              return (
                <div key={entry.id} style={{
                  background: dark ? 'var(--surface2)' : '#fff',
                  border: '1px solid var(--border)',
                  borderLeft: `4px solid ${borderColor}`,
                  borderRadius: 'var(--radius-md)', overflow:'hidden',
                }}>
                  <div onClick={() => setExpandedId(expanded ? null : entry.id)} style={{
                    padding:'12px 16px', cursor:'pointer', display:'flex', alignItems:'center', gap:12, flexWrap:'wrap',
                  }}>
                    <span style={{fontSize:11, fontWeight:700, color: 'var(--copper)', minWidth:64, fontFamily:'monospace'}}>{entry.journalNum || '#' + (entry.entryNum || 0)}</span>
                    <span style={{fontSize:12, color:'var(--text-muted)', minWidth:80}}>{entry.date}</span>
                    <span style={{flex:1, fontWeight:500, fontSize:13, color:'var(--text)'}}>{entry.memo}</span>
                    {entry.recurring && <span style={{display:'inline-block', padding:'2px 8px', borderRadius:10, fontSize:10, fontWeight:600, background:'#8b5cf618', color:'#8b5cf6'}}>Recurring</span>}
                    {sourceBadge(entry.source)}
                    <span style={{fontSize:12, color:'var(--text-muted)'}}>{(entry.entries || []).length} lines</span>
                    <span style={{fontSize:11, color:'var(--text-muted)', transform: expanded ? 'rotate(180deg)' : 'none', transition:'transform 0.15s'}}>&#9660;</span>
                  </div>
                  {expanded && (
                    <div style={{padding:'0 16px 14px', borderTop:'1px solid var(--border)'}}>
                      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:6, padding:'10px 0 6px', fontSize:11, fontWeight:600, color:'var(--text-muted)'}}>
                        <span>Account</span><span style={{textAlign:'right'}}>Debit</span><span style={{textAlign:'right'}}>Credit</span>
                      </div>
                      {(entry.entries || []).map((l, i) => (
                        <div key={i} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:6, padding:'4px 0', fontSize:13, color:'var(--text)', borderBottom:'1px solid var(--border)'}}>
                          <span style={{color:'var(--brand-tan)'}}>{l.account}</span>
                          <span style={{textAlign:'right', fontWeight: l.debit ? 600 : 400, color: l.debit ? 'var(--brand-tan)' : undefined}}>{l.debit ? fmt(l.debit) : ''}</span>
                          <span style={{textAlign:'right', fontWeight: l.credit ? 600 : 400, color: l.credit ? 'var(--rust)' : undefined}}>{l.credit ? fmt(l.credit) : ''}</span>
                        </div>
                      ))}
                      <div style={{display:'flex', justifyContent:'flex-end', gap:8, marginTop:10, flexWrap:'wrap'}}>
                        {entry.recurring && <button onClick={() => handleGenerateNext(entry)} style={{background:'none', border:'1px solid var(--brand-tan)', color:'var(--brand-tan)', borderRadius:'var(--radius-sm)', padding:'4px 12px', fontSize:11, cursor:'pointer', fontWeight:600}}>Generate Next</button>}
                        {!isAP && !isAR && !isClosing && <button onClick={() => handleReverse(entry)} style={{background:'none', border:'1px solid #f59e0b', color:'#f59e0b', borderRadius:'var(--radius-sm)', padding:'4px 12px', fontSize:11, cursor:'pointer', fontWeight:600}}>Reverse</button>}
                        {!isAP && !isAR && (() => {
                          const locked = gl.lockDays > 0 && ((new Date() - new Date(entry.date)) / 86400000) > gl.lockDays;
                          return locked
                            ? <span style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic'}}>Locked (older than {gl.lockDays} days)</span>
                            : <button onClick={() => handleDeleteEntry(entry.id)} style={{background:'none', border:'1px solid #ef4444', color:'#ef4444', borderRadius:'var(--radius-sm)', padding:'4px 12px', fontSize:11, cursor:'pointer'}}>Delete</button>;
                        })()}
                        {isAP && <span style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic'}}>Managed by AP — edit or delete through <a href="#" onClick={(e) => { e.preventDefault(); e.stopPropagation(); onNavigate && onNavigate('ap'); }} style={{color:'var(--forest-green)', cursor:'pointer', textDecoration:'underline', fontStyle:'italic'}}>Accounts Payable</a></span>}
                        {isAR && <span style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic'}}>Managed by AR — edit or delete through <a href="#" onClick={(e) => { e.preventDefault(); e.stopPropagation(); onNavigate && onNavigate('ar'); }} style={{color:'#06b6d4', cursor:'pointer', textDecoration:'underline', fontStyle:'italic'}}>Accounts Receivable</a></span>}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </>}

      {tab === 'trial' && (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8, flexWrap:'wrap', gap:8}}>
            <div style={{fontSize:12, color:'var(--text-muted)'}}>
              Fiscal Year Start: <b style={{color:'var(--text)'}}>{['January','February','March','April','May','June','July','August','September','October','November','December'][gl.fyStart - 1]}</b>
              <span style={{marginLeft:8, fontStyle:'italic'}}>(change in Settings)</span>
            </div>
            <div style={{display:'flex', gap:8}}>
              <TableIO data={trialAccounts.map(a => ({Account:a.account, Category:a.category, Debits:a.debit.toFixed(2), Credits:a.credit.toFixed(2), Balance:a.balance.toFixed(2)}))} filename={`GL_Trial_Balance_${new Date().toISOString().slice(0,10)}`} />
              <button onClick={() => setShowClosingConfirm(true)} style={{background:'none', border:'1px solid #f59e0b', color:'#f59e0b', borderRadius:'var(--radius-sm)', padding:'6px 12px', fontSize:12, cursor:'pointer', fontWeight:600}}>Generate Closing Entries</button>
            </div>
          </div>

          {showClosingConfirm && (
            <div style={{background: dark ? 'var(--surface2)' : '#fffbeb', border:'1px solid #f59e0b', borderRadius:'var(--radius-md)', padding:16, marginBottom:16}}>
              <div style={{fontWeight:600, fontSize:13, color:'#92400e', marginBottom:8}}>Generate Closing Entries?</div>
              <div style={{fontSize:12, color:'var(--text-muted)', marginBottom:12}}>This will create journal entries that zero out all Revenue and Expense accounts into Retained Earnings (3300). This action is typically performed at year-end.</div>
              <div style={{display:'flex', gap:8}}>
                <button onClick={handleClosingEntries} style={{background:'#f59e0b', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'6px 16px', fontSize:12, cursor:'pointer', fontWeight:600}}>Confirm &amp; Post</button>
                <button onClick={() => setShowClosingConfirm(false)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'6px 16px', fontSize:12, cursor:'pointer'}}>Cancel</button>
              </div>
            </div>
          )}

          <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
            <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr', gap:0, padding:'12px 16px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:12, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'2px solid var(--border)'}}>
              <span>Account</span><span style={{textAlign:'right'}}>Debits</span><span style={{textAlign:'right'}}>Credits</span><span style={{textAlign:'right'}}>Balance</span>
            </div>
            {trialAccounts.length === 0 ? (
              <div style={{padding:30, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>No transactions recorded yet.</div>
            ) : (
              <>
                {Object.keys(getActiveCOA()).map(cat => {
                  const accts = trialAccounts.filter(a => a.category === cat);
                  if (accts.length === 0) return null;
                  return (
                    <React.Fragment key={cat}>
                      <div style={{padding:'10px 16px 4px', fontSize:11, fontWeight:700, color: 'var(--rust)', textTransform:'uppercase', letterSpacing:1}}>{cat}</div>
                      {accts.map(a => (
                        <div key={a.account} onClick={() => { setDetailAccount(a.account); setTab('detail'); }} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr', gap:0, padding:'8px 16px', borderBottom:'1px solid var(--border)', fontSize:13, cursor:'pointer'}} onMouseEnter={e => e.currentTarget.style.background = dark ? 'var(--surface)' : '#f9fafb'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                          <span style={{color: 'var(--brand-tan)', textDecoration:'underline'}}>{a.account}</span>
                          <span style={{textAlign:'right', color:'var(--brand-tan)'}}>{a.debit ? fmt(a.debit) : '-'}</span>
                          <span style={{textAlign:'right', color:'var(--rust)'}}>{a.credit ? fmt(a.credit) : '-'}</span>
                          <span style={{textAlign:'right', fontWeight:600, color: a.balance >= 0 ? 'var(--text)' : '#ef4444'}}>{a.balance >= 0 ? '' : '('}{fmt(a.balance)}{a.balance >= 0 ? '' : ')'}</span>
                        </div>
                      ))}
                    </React.Fragment>
                  );
                })}
                <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr', gap:0, padding:'12px 16px', borderTop:'2px solid var(--border)', fontSize:13, fontWeight:700, background: dark ? 'var(--surface)' : '#f9fafb'}}>
                  <span style={{color:'var(--rust)'}}>TOTALS</span>
                  <span style={{textAlign:'right', color:'var(--brand-tan)'}}>{fmt(trialTotalDebit)}</span>
                  <span style={{textAlign:'right', color:'var(--brand-tan)'}}>{fmt(trialTotalCredit)}</span>
                  <span style={{textAlign:'right', color: Math.abs(trialTotalDebit - trialTotalCredit) < 0.01 ? 'var(--forest-green)' : '#ef4444'}}>
                    {Math.abs(trialTotalDebit - trialTotalCredit) < 0.01 ? 'Balanced' : `Off by ${fmt(trialTotalDebit - trialTotalCredit)}`}
                  </span>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {tab === 'detail' && (
        <div>
          <div style={{display:'flex', gap:10, marginBottom:16, alignItems:'center'}}>
            <label style={{fontSize:12, fontWeight:600, color:'var(--text-muted)'}}>Account:</label>
            <select value={detailAccount} onChange={e => setDetailAccount(e.target.value)} style={{...selStyle, flex:1, maxWidth:400}}>
              <option value="">Select an account...</option>
              {Object.entries(getActiveCOA()).map(([cat, accts]) => (
                <optgroup key={cat} label={cat}>{accts.map(a => <option key={a} value={a}>{a}</option>)}</optgroup>
              ))}
            </select>
          </div>
          {!detailAccount ? (
            <div style={{textAlign:'center', padding:40, color:'var(--text-muted)', fontSize:14}}>Select an account to view its transaction detail and running balance.</div>
          ) : detailRows.length === 0 ? (
            <div style={{textAlign:'center', padding:40, color:'var(--text-muted)', fontSize:14}}>No transactions found for {detailAccount}.</div>
          ) : (
            <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
              <div style={{padding:'12px 16px', background: dark ? 'var(--surface)' : '#f9fafb', borderBottom:'2px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <span style={{fontSize:14, fontWeight:700, color:'var(--brand-tan)'}}>{detailAccount}</span>
                <span style={{fontSize:13, fontWeight:600, color: detailRows[detailRows.length - 1].balance >= 0 ? theme.accent : '#ef4444'}}>Balance: {fmt(detailRows[detailRows.length - 1].balance)}</span>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'0.5fr 0.8fr 2fr 0.8fr 1fr 1fr 1fr', gap:0, padding:'10px 16px', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'1px solid var(--border)'}}>
                <span>#</span><span>Date</span><span>Memo</span><span>Source</span><span style={{textAlign:'right'}}>Debit</span><span style={{textAlign:'right'}}>Credit</span><span style={{textAlign:'right'}}>Balance</span>
              </div>
              {detailRows.map((r, i) => (
                <div key={i} style={{display:'grid', gridTemplateColumns:'0.5fr 0.8fr 2fr 0.8fr 1fr 1fr 1fr', gap:0, padding:'8px 16px', fontSize:12, borderBottom:'1px solid var(--border)', color:'var(--text)'}}>
                  <span style={{fontFamily:'monospace', fontSize:11, color:'var(--copper)'}}>{r.journalNum || '#' + (r.entryNum || 0)}</span>
                  <span>{r.date}</span>
                  <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{r.memo}</span>
                  <span>{sourceBadge(r.source)}</span>
                  <span style={{textAlign:'right', fontWeight: r.debit ? 600 : 400, color: r.debit ? 'var(--brand-tan)' : undefined}}>{r.debit ? fmt(r.debit) : ''}</span>
                  <span style={{textAlign:'right', fontWeight: r.credit ? 600 : 400, color: r.credit ? 'var(--rust)' : undefined}}>{r.credit ? fmt(r.credit) : ''}</span>
                  <span style={{textAlign:'right', fontWeight:600, color: r.balance >= 0 ? 'var(--text)' : '#ef4444'}}>{r.balance >= 0 ? '' : '('}{fmt(r.balance)}{r.balance >= 0 ? '' : ')'}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TrialBalanceReportView() {
  const theme = TOOL_THEMES.rptTrial;
  const glEntries = React.useMemo(() => { try { return JSON.parse(localStorage.getItem(GL_STORAGE_KEY)) || []; } catch { return []; } }, []);
  const [dateFrom, setDateFrom] = React.useState('');
  const [dateTo, setDateTo] = React.useState('');
  const dark = useDarkMode();
  const fmt = (n) => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const dateFiltered = glEntries.filter(e => {
    if (dateFrom && e.date < dateFrom) return false;
    if (dateTo && e.date > dateTo) return false;
    return true;
  });

  const accountTotals = {};
  dateFiltered.forEach(e => {
    (e.entries || []).forEach(l => {
      if (!accountTotals[l.account]) accountTotals[l.account] = { debit: 0, credit: 0 };
      accountTotals[l.account].debit += l.debit || 0;
      accountTotals[l.account].credit += l.credit || 0;
    });
  });
  const trialAccounts = Object.entries(accountTotals).map(([account, t]) => {
    const info = getAllAccounts().find(a => a.account === account) || { category: 'Other' };

  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Trial Balance</h2>

      </PageHeader>
      <ToolExplainer theme={theme} />
      <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
        <label style={{fontSize:12, fontWeight:600, color:'var(--charcoal-slate)'}}>Date Range:</label>
        <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{...selStyle, padding:'4px 8px'}} />
        <span style={{fontSize:12, color:'var(--text-muted)'}}>to</span>
        <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{...selStyle, padding:'4px 8px'}} />
        {(dateFrom || dateTo) && <button onClick={() => { setDateFrom(''); setDateTo(''); }} style={{background:'none', border:'none', color:'#ef4444', fontSize:11, cursor:'pointer', fontWeight:600}}>Clear</button>}
        <div style={{marginLeft:'auto'}}><TableIO data={trialAccounts.map(a => ({Account:a.account, Category:a.category, Debits:a.debit.toFixed(2), Credits:a.credit.toFixed(2), Balance:a.balance.toFixed(2)}))} filename={`Trial_Balance_${new Date().toISOString().slice(0,10)}`} /></div>
      </div>
      <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
        <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr', gap:0, padding:'12px 16px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:12, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'2px solid var(--border)'}}>
          <span>Account</span><span style={{textAlign:'right'}}>Debits</span><span style={{textAlign:'right'}}>Credits</span><span style={{textAlign:'right'}}>Balance</span>
        </div>
        {trialAccounts.length === 0 ? (
