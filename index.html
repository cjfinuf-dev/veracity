// --- Module Detail View (enhanced + fallback) ---
function ModuleDetailView({ moduleId, onBack }) {
  const mod = ACCOUNTING_MODULES.find(m => m.id === moduleId);
  if (!mod) return <div className="empty-state"><h3>Module not found</h3></div>;

  const [showAllStandards, setShowAllStandards] = useState(false);
  const [enhanced, setEnhanced] = useState(null);
  const [enhancedLoaded, setEnhancedLoaded] = useState(false);

  // Load enhanced module data
  React.useEffect(() => {
    fetch('data/enhanced-modules.json')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && data[moduleId]) setEnhanced(data[moduleId]);
        setEnhancedLoaded(true);
      })
      .catch(() => setEnhancedLoaded(true));
  }, [moduleId]);

  // Get related ASU entries for this module's ASC references
  const relatedEntries = React.useMemo(() => {
    if (!mod.ascRefs || mod.ascRefs.length === 0) return [];
    const entries = mod.ascRefs.flatMap(ref => (window.ASU_BY_TOPIC || {})[ref] || []);
    const seen = new Set();
    return entries.filter(e => {
      const key = e._asc_ref || e.patterns[0];
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }, [moduleId]);

  const displayLimit = 8;
  const visibleEntries = showAllStandards ? relatedEntries : relatedEntries.slice(0, displayLimit);

  function extractFasbLink(response) {
    const m = response.match(/https:\/\/www\.fasb\.org\S+/);
    return m ? m[0] : null;
  }

  function getAscLabel(entry) {
    if (entry._asc_ref) return `ASC ${entry._asc_ref}`;
    const p = entry.patterns.find(p => p.match(/^asc \d/));
    return p ? p.toUpperCase() : entry._asu ? `ASU ${entry._asu}` : 'ASC Standard';
  }

  const calloutIcons = { tip: '\u{1F4A1}', warning: '\u26A0\uFE0F', example: '\u{1F4D6}' };

  // Find module title by ID for related module chips
  function getModTitle(id) {
    const m = ACCOUNTING_MODULES.find(x => x.id === id);
    return m ? m.title : id;
  }

  return (
    <div>
      <button className="asc-detail-back" onClick={onBack}>&#8592; Back to Modules</button>
      <div className="asc-detail-header">
        <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:4}}>
          <span className="asc-tag" style={{fontSize:11}}>{mod.num}</span>
          <span className={`module-level level-${mod.level}`}>{mod.level}</span>
          {mod.ascRefs && mod.ascRefs.length > 0 && (
            <span style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic'}}>
              ASC {mod.ascRefs.join(', ')}
            </span>
          )}
        </div>
        <h2>{mod.title}</h2>
        <div className="subtitle">{mod.desc}</div>
      </div>

      <div className="module-detail-content">
        <p>{mod.content.intro}</p>
        {mod.content.formula && <div className="key-formula">{mod.content.formula}</div>}

        {/* SVG Diagram from enhanced data */}
        {enhanced && enhanced.diagram && enhanced.diagram.svg && (
          <div className="module-diagram" dangerouslySetInnerHTML={{__html: enhanced.diagram.svg}} />
        )}

        <h3>Key Concepts</h3>

        {/* Enhanced concepts with details, callouts, examples, sources */}
        {enhanced && enhanced.concepts ? (
          <div>
            {mod.content.concepts.map((c, i) => {
              const ec = enhanced.concepts[i] || {};
              return (
                <div key={i} style={{marginBottom:20}}>
                  <div className="concept-list" style={{listStyle:'none', padding:0}}>
                    <li style={{
                      padding:'var(--space-2) var(--space-3)', marginBottom:0,
                      background:'var(--surface)', borderRadius:'var(--radius-sm)',
                      borderLeft:'3px solid var(--brand-tan)', fontSize:13, lineHeight:1.6
                    }}>
                      <strong>{c.term}:</strong> {c.def}
                    </li>
                  </div>

                  {/* Detail bullets */}
                  {ec.details && ec.details.length > 0 && (
                    <ul className="module-detail-list">
                      {ec.details.map((d, j) => <li key={j}>{d}</li>)}
                    </ul>
                  )}

                  {/* Callout */}
                  {ec.callout && (
                    <div className={`module-callout ${ec.callout.type || 'tip'}`}>
                      <span className="module-callout-icon">{calloutIcons[ec.callout.type] || calloutIcons.tip}</span>
                      <span>{ec.callout.text}</span>
                    </div>
                  )}

                  {/* Example */}
                  {ec.example && ec.example.scenario && (
                    <div className="module-example">
                      <div className="module-example-label">Real-World Example</div>
                      {ec.example.scenario}
                    </div>
                  )}

                  {/* Concept-level sources */}
                  {ec.sources && ec.sources.length > 0 && (
                    <ul className="module-source-list">
                      {ec.sources.map((s, j) => (
                        <li key={j}>
                          <a href={s.url} target="_blank" rel="noopener noreferrer">{s.title}</a>
                          <span className="module-source-date">{s.retrieved}</span>
                        </li>
                      ))}
                    </ul>
                  )}
                </div>
              );
            })}
          </div>
        ) : (
          /* Fallback: original simple concept list */
          <ul className="concept-list">
            {mod.content.concepts.map((c, i) => (
              <li key={i}><strong>{c.term}:</strong> {c.def}</li>
            ))}
          </ul>
        )}

        {/* Key Takeaways */}
        {enhanced && enhanced.keyTakeaways && enhanced.keyTakeaways.length > 0 && (
          <div className="module-takeaways">
            <h4>Key Takeaways</h4>
            <ul>
              {enhanced.keyTakeaways.map((t, i) => <li key={i}>{t}</li>)}
            </ul>
          </div>
        )}

        {/* Related Modules */}
        {enhanced && enhanced.relatedModules && enhanced.relatedModules.length > 0 && (
          <div style={{marginTop:16}}>
            <h3>Related Modules</h3>
            <div className="module-related">
              {enhanced.relatedModules.map(id => (
                <span key={id} className="module-related-chip">{getModTitle(id)}</span>
              ))}
            </div>
          </div>
        )}

        {/* Module-level Sources */}
        {enhanced && enhanced.sources && enhanced.sources.length > 0 && (
          <div style={{marginTop:20}}>
            <h3>Sources &amp; Further Reading</h3>
            <ul className="module-source-list">
              {enhanced.sources.map((s, i) => (
                <li key={i}>
                  <a href={s.url} target="_blank" rel="noopener noreferrer">{s.title}</a>
                  <span className="module-source-date">{s.retrieved}</span>
                </li>
              ))}
            </ul>
          </div>
        )}

        {/* Related ASC Standards (preserved from original) */}
        {relatedEntries.length > 0 && (
          <div style={{marginTop:24}}>
            <h3 style={{display:'flex', alignItems:'center', gap:8}}>
              Related ASC Standards
              <span style={{fontSize:12, fontWeight:400, color:'var(--text-muted)'}}>
                ({relatedEntries.length} entries from FASB codification)
              </span>
            </h3>
            <div style={{display:'flex', flexDirection:'column', gap:10, marginTop:8}}>
              {visibleEntries.map((entry, i) => {
                const link = extractFasbLink(entry.response);
                const summary = entry.response.replace(/\n.*$/s, '').slice(0, 250);
                return (
                  <div key={i} style={{
                    background:'var(--surface-alt, #f8f7f4)',
                    border:'1px solid var(--border, #e5e2d9)',
                    borderRadius:8, padding:'12px 16px'
                  }}>
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4}}>
                      <strong style={{fontSize:13, color:'var(--accent, #6366f1)'}}>{getAscLabel(entry)}</strong>
                      {entry._asu && <span style={{fontSize:11, color:'var(--text-muted)'}}>ASU {entry._asu}</span>}
                    </div>
                    <p style={{fontSize:13, margin:'4px 0 8px', lineHeight:1.5, color:'var(--text-secondary, #555)'}}>
                      {summary}{summary.length >= 250 ? '...' : ''}
                    </p>
                    {link && (
                      <a href={link} target="_blank" rel="noopener noreferrer"
                        style={{fontSize:12, color:'var(--accent, #6366f1)', textDecoration:'none'}}>
                        View official FASB text &#8599;
                      </a>
                    )}
                  </div>
                );
              })}
            </div>
            {relatedEntries.length > displayLimit && (
              <button onClick={() => setShowAllStandards(!showAllStandards)}
                style={{
                  marginTop:10, background:'none', border:'1px solid var(--border, #e5e2d9)',
                  borderRadius:6, padding:'6px 14px', cursor:'pointer', fontSize:12,
                  color:'var(--accent, #6366f1)'
                }}>
                {showAllStandards ? 'Show fewer' : `Show all ${relatedEntries.length} standards`}
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function NewProjectForm({ onSave, onCancel }) {
  const [f, setF] = useState({ customerName: '', street: '', city: '', state: '', zip: '', phone: '', email: '', systemSize: '', panelCount: '', contractValue: '' });
  const [errors, setErrors] = useState({});

  const set = (k, v) => {
    const rule = LIMITS[k];
    if (rule && rule.max && typeof v === 'string' && v.length > rule.max) v = v.slice(0, rule.max);
    if (k === 'phone') v = formatPhone(v);
    if (k === 'zip') v = formatZip(v);
    if (k === 'city') v = v.replace(/[^a-zA-Z\s.\-']/g, '');
    setF(prev => ({ ...prev, [k]: v }));
    setErrors(prev => ({ ...prev, [k]: null }));
  };

  const handleSubmit = () => {
    const newErrors = {};
    if (!f.customerName.trim()) newErrors.customerName = "Customer name is required";
    const addrErrs = validateAddress(f.street, f.city, f.state, f.zip);
    if (addrErrs) Object.assign(newErrors, addrErrs);
    const phoneErr = validatePhone(f.phone);
    if (phoneErr) newErrors.phone = phoneErr;
    if (f.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)) newErrors.email = "Invalid email format";
    if (f.systemSize && (parseFloat(f.systemSize) < 0 || parseFloat(f.systemSize) > 500)) newErrors.systemSize = "System size: 0-500 kW";
    if (f.panelCount && (parseInt(f.panelCount) < 0 || parseInt(f.panelCount) > 2000)) newErrors.panelCount = "Panel count: 0-2,000";
    if (f.contractValue && (parseFloat(f.contractValue) < 0 || parseFloat(f.contractValue) > 50000000)) newErrors.contractValue = "Contract value out of range";
    if (Object.keys(newErrors).length) { setErrors(newErrors); return; }
    onSave(f);
  };

  return (
    <div className="form-overlay" onClick={onCancel}>
      <div className="form-panel" onClick={e => e.stopPropagation()}>
        <h2>New Solar Project</h2>
        <div className="form-group">
          <label>Customer Name</label>
          <input value={f.customerName} onChange={e => set('customerName', e.target.value)} maxLength={60} />
          {!errors.customerName && <div className="form-hint">Max 60 characters</div>}
          {errors.customerName && <div className="form-error">{errors.customerName}</div>}
        </div>
        <div className="form-group">
          <label>Street Address</label>
          <input value={f.street} onChange={e => set('street', e.target.value)} placeholder="123 Main St" maxLength={100} />
          {errors.street && <div className="form-error">{errors.street}</div>}
        </div>
        <div className="form-row form-row-3">
          <div className="form-group">
            <label>City</label>
            <input value={f.city} onChange={e => set('city', e.target.value)} placeholder="Austin" maxLength={50} />
            {errors.city && <div className="form-error">{errors.city}</div>}
          </div>
          <div className="form-group">
            <label>State</label>
            <select value={f.state} onChange={e => set('state', e.target.value)} className="form-select">
              <option value="">Select...</option>
              {US_STATES.map(([code, name]) => <option key={code} value={code}>{code} -- {name}</option>)}
            </select>
            {errors.state && <div className="form-error">{errors.state}</div>}
          </div>
          <div className="form-group">
            <label>ZIP Code</label>
            <input value={f.zip} onChange={e => set('zip', e.target.value)} placeholder="78701" maxLength={10} />
            {!errors.zip && <div className="form-hint">5 or 9 digit</div>}
            {errors.zip && <div className="form-error">{errors.zip}</div>}
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label>Phone</label>
            <input value={f.phone} onChange={e => set('phone', e.target.value)} placeholder="(555) 234-5678" maxLength={14} />
            {!errors.phone && <div className="form-hint">US format: (XXX) XXX-XXXX</div>}
            {errors.phone && <div className="form-error">{errors.phone}</div>}
          </div>
          <div className="form-group">
            <label>Email</label>
            <input value={f.email} onChange={e => set('email', e.target.value)} placeholder="name@example.com" maxLength={80} />
            {!errors.email && <div className="form-hint">Max 80 characters</div>}
            {errors.email && <div className="form-error">{errors.email}</div>}
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label>System Size (kW)</label>
            <input type="number" value={f.systemSize} onChange={e => set('systemSize', e.target.value)} placeholder="e.g. 8.5" min={0} max={500} />
            {!errors.systemSize && <div className="form-hint">0-500 kW</div>}
            {errors.systemSize && <div className="form-error">{errors.systemSize}</div>}
          </div>
          <div className="form-group">
            <label>Panel Count</label>
            <input type="number" value={f.panelCount} onChange={e => set('panelCount', e.target.value)} placeholder="e.g. 24" min={0} max={2000} />
            {!errors.panelCount && <div className="form-hint">0-2,000</div>}
            {errors.panelCount && <div className="form-error">{errors.panelCount}</div>}
          </div>
        </div>
        <div className="form-group">
          <label>Contract Value ($)</label>
          <input type="number" value={f.contractValue} onChange={e => set('contractValue', e.target.value)} placeholder="e.g. 35000" min={0} max={50000000} />
          {errors.contractValue && <div className="form-error">{errors.contractValue}</div>}
        </div>
        <div className="form-actions">
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          <button className="btn btn-green" style={{borderRadius:'var(--radius-full)', padding:'8px 20px'}} onClick={handleSubmit}>Create Project</button>
        </div>
      </div>
    </div>
  );
}

function LifecycleTab({ project, stats, onUpdate }) {
  const [expanded, setExpanded] = useState({});
  const toggle = (i) => setExpanded(prev => ({ ...prev, [i]: !prev[i] }));

  const toggleStep = (mi, si) => {
    const updated = JSON.parse(JSON.stringify(project));
    const step = updated.milestones[mi].steps[si];
    step.completed = !step.completed;
    step.completedDate = step.completed ? new Date().toISOString() : null;
    onUpdate(() => updated);
  };
  const updateStepNotes = (mi, si, notes) => {
    if (notes.length > 200) return;
    const updated = JSON.parse(JSON.stringify(project));
    updated.milestones[mi].steps[si].notes = notes;
    onUpdate(() => updated);
  };

  return (
    <div>
      {project.milestones.map((m, mi) => {
        const done = m.steps.filter(s => s.completed).length;
        const total = m.steps.length;
        const allDone = done === total;
        const isCurrent = m === stats.currentMilestone && !stats.isComplete;
        const isOpen = expanded[mi] ?? isCurrent;
        return (
          <div key={mi} style={{
            background:'var(--bg-white)', border:'1px solid var(--border)', borderRadius:'var(--radius-md)',
            marginBottom:12, overflow:'hidden', boxShadow:'var(--shadow-card)', transition:'transform 0.15s, box-shadow 0.15s',
          }}>
            <div onClick={() => toggle(mi)} style={{
              display:'flex', justifyContent:'space-between', alignItems:'center',
              padding:'14px 20px', cursor:'pointer', transition:'transform 0.15s, box-shadow 0.15s',
              borderLeft: allDone ? '4px solid var(--green)' : isCurrent ? '4px solid var(--brand-tan)' : '4px solid transparent',
              background: allDone ? 'rgba(205,170,125,0.04)' : isCurrent ? 'var(--tan-10)' : 'transparent',
            }}
            onMouseEnter={e => { e.currentTarget.parentElement.style.boxShadow='var(--shadow-card-hover)'; e.currentTarget.parentElement.style.transform='translateY(-2px)'; }}
            onMouseLeave={e => { e.currentTarget.parentElement.style.boxShadow='var(--shadow-card)'; e.currentTarget.parentElement.style.transform='none'; }}>
              <div>
                <div style={{fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text-muted)'}}>PHASE {mi + 1}: {m.name.toUpperCase()}</div>
              </div>
              <span style={{fontSize:13, fontWeight:600, color:'var(--green)'}}>{done}/{total} STEPS {isOpen ? '\u25BE' : '\u25B8'}</span>
            </div>
            {isOpen && (
              <div style={{padding:'8px 20px 16px 20px'}}>
                {m.steps.map((s, si) => (
                  <div key={si} style={{padding:'6px 0'}}>
                    <div style={{display:'flex', alignItems:'center', gap:10}}>
                      <div onClick={() => toggleStep(mi, si)} style={{
                        width:20, height:20, borderRadius:'50%', border: s.completed ? '2px solid var(--green)' : '2px solid var(--border-strong)',
                        background: s.completed ? 'var(--green)' : 'transparent', cursor:'pointer', flexShrink:0,
                        display:'flex', alignItems:'center', justifyContent:'center',
                      }}>
                        {s.completed && <span style={{color:'#fff', fontSize:11, lineHeight:1}}>&#10003;</span>}
                      </div>
                      <span style={{fontSize:13, flex:1, color: s.completed ? 'var(--text-muted)' : 'var(--text)', textDecoration: s.completed ? 'line-through' : 'none'}}>{s.name}</span>
                      {s.completedDate && <span style={{fontSize:11, color:'var(--text-muted)', whiteSpace:'nowrap'}}>{fmtDateTime(s.completedDate)}</span>}
                    </div>
                    <div style={{paddingLeft:30, marginTop:2}}>
                      <BufferedInput
                        style={{width:'100%', padding:'4px 8px', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, color:'var(--text)'}}
                        placeholder="Add notes..."
                        value={s.notes} maxLength={200}
                        onCommit={v => updateStepNotes(mi, si, v)}
                      />
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function FinanceTab({ project, stats, onUpdate }) {
  const costKeys = [['equipment','Equipment'],['labor','Labor'],['permits','Permits'],['design','Design'],['overhead','Overhead'],['other','Other']];

  const setCost = (key, val) => {
    const num = parseFloat(val);
    if (val !== '' && (num < 0 || num > 50000000)) return;
    const updated = JSON.parse(JSON.stringify(project));
    updated.costs[key] = val;
    onUpdate(() => updated);
  };
  const setContractValue = (val) => {
    const num = parseFloat(val);
    if (val !== '' && (num < 0 || num > 50000000)) return;
    onUpdate({ contractValue: parseFloat(val) || 0 });
  };
  const addPayment = () => {
    const updated = JSON.parse(JSON.stringify(project));
    updated.payments.push({ id: Date.now(), milestoneName: '', triggerStage: '', amount: 0, status: 'pending', remittedDate: null, notes: '' });
    onUpdate(() => updated);
  };
  const updatePayment = (i, field, val) => {
    if (field === 'amount' && val !== '' && (parseFloat(val) < 0 || parseFloat(val) > 50000000)) return;
    if (field === 'milestoneName' && val.length > 50) return;
    const updated = JSON.parse(JSON.stringify(project));
    updated.payments[i][field] = val;
    if (field === 'status' && val === 'remitted') updated.payments[i].remittedDate = new Date().toISOString();
    if (field === 'status' && val === 'pending') updated.payments[i].remittedDate = null;
    onUpdate(() => updated);
  };
  const removePayment = (i) => {
    const updated = JSON.parse(JSON.stringify(project));
    updated.payments.splice(i, 1);
    onUpdate(() => updated);
  };

  return (
    <div>
      <div className="finance-grid">
        {/* Cost Breakdown — white card */}
        <div className="finance-card">
          <h3>Cost Breakdown</h3>
          {costKeys.map(([k, label]) => (
            <div className="finance-row" key={k}>
              <label>{label}</label>
              <BufferedInput className="finance-input" type="number" min="0" max="50000000" value={project.costs[k] || ''} onCommit={v => setCost(k, v)} placeholder="0" />
            </div>
          ))}
          <div className="finance-row finance-total">
            <label style={{ fontWeight: 700, color: 'var(--text)' }}>Total Cost</label>
            <span className="value">{fmt(stats.totalCost)}</span>
          </div>
        </div>
        {/* Financial Summary — green card */}
        <div style={{
          background:'linear-gradient(135deg, var(--brand-green) 0%, var(--brand-green-light) 100%)',
          borderRadius:'var(--radius-md)', padding:'var(--space-6)',
          boxShadow:'var(--shadow-card)', color:'#fff', transition:'transform 0.15s, box-shadow 0.15s',
        }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow='var(--shadow-card-hover)'; e.currentTarget.style.transform='translateY(-2px)'; }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow='var(--shadow-card)'; e.currentTarget.style.transform='none'; }}>
          <h3 style={{fontSize:14, fontWeight:600, color:'rgba(255,255,255,0.7)', textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:16}}>Financial Summary</h3>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.6)', marginBottom:2}}>Contract Value</div>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <BufferedInput className="finance-input" type="number" min="0" max="50000000" value={project.contractValue || ''} onCommit={v => setContractValue(v)} placeholder="0" style={{background:'rgba(255,255,255,0.15)', border:'1px solid rgba(255,255,255,0.2)', color:'#fff', width:140}} />
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.6)', marginBottom:2}}>Total Costs</div>
            <div style={{fontSize:22, fontWeight:700}}>{fmt(stats.totalCost)}</div>
          </div>
          <div style={{borderTop:'1px solid rgba(255,255,255,0.15)', paddingTop:12}}>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.6)', marginBottom:2}}>Gross Margin</div>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span style={{fontSize:22, fontWeight:700}}>{fmt(stats.margin)}</span>
              <span style={{padding:'3px 10px', borderRadius:'var(--radius-full)', background: stats.marginPct >= 0 ? 'rgba(205,170,125,0.2)' : 'rgba(220,38,38,0.2)', fontSize:13, fontWeight:600}}>{stats.marginPct.toFixed(1)}%</span>
            </div>
          </div>
        </div>
      </div>

      {/* Payment Ledger */}
      <div style={{marginTop:24}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <h3 style={{fontSize:16, fontWeight:700, color:'var(--accent-text)', margin:0}}>Payment Ledger</h3>
          <button className="btn btn-green btn-sm" style={{borderRadius:'var(--radius-full)', padding:'6px 16px'}} onClick={addPayment}>+ Add Payment</button>
        </div>
        {project.payments.length > 0 ? (
          <table className="payment-table">
            <thead><tr><th>Payment Name</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {project.payments.map((p, i) => (
                <tr key={p.id || i}>
                  <td><BufferedInput className="name-input" maxLength={50} value={p.milestoneName} onCommit={v => updatePayment(i, 'milestoneName', v)} placeholder="e.g. Deposit" /></td>
                  <td><BufferedInput className="amount-input" type="number" min="0" max="50000000" value={p.amount || ''} onCommit={v => updatePayment(i, 'amount', v)} placeholder="0" /></td>
                  <td>
                    {p.status === 'pending'
                      ? <button className="btn btn-green btn-sm" onClick={() => updatePayment(i, 'status', 'remitted')}>Remit</button>
                      : <span style={{display:'flex', alignItems:'center', gap:6}}><span style={{fontSize:12, color:'var(--green)', fontWeight:600}}>Remitted</span><button className="btn btn-secondary btn-sm" onClick={() => updatePayment(i, 'status', 'pending')} style={{padding:'2px 8px', fontSize:11}}>Undo</button></span>}
                  </td>
                  <td><button className="btn btn-danger btn-sm" onClick={() => removePayment(i)} style={{ padding: '2px 8px' }}>x</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        ) : <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>No payments yet. Click "+ Add Payment" to start tracking.</p>}
      </div>
    </div>
  );
}
