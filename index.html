  const TERMS_DAYS = { 'Due on Receipt': 0, 'Net 15': 15, 'Net 30': 30, 'Net 45': 45, 'Net 60': 60, 'Net 90': 90 };
  const FREQ_OPTIONS = ['Monthly', 'Quarterly', 'Annually'];

  const [bills, setBills] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
  });
  const [vendors, setVendors] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(AP_VENDORS_KEY)) || []; } catch { return []; }
  });
  React.useEffect(() => { localStorage.setItem(AP_VENDORS_KEY, JSON.stringify(vendors)); }, [vendors]);
  React.useEffect(() => { if (vendors.length === 0 && bills.length > 0) { setVendors([...new Set(bills.map(b => b.vendor))].sort()); } }, []);
  const [apTab, setApTab] = React.useState('bills');
  const [showForm, setShowForm] = React.useState(false);
  const [filter, setFilter] = React.useState('all');
  const [sortBy, setSortBy] = React.useState('due');
  const [editId, setEditId] = React.useState(null);
  const [vendorFilter, setVendorFilter] = React.useState(null);
  const [payingId, setPayingId] = React.useState(null);
  const [payAmt, setPayAmt] = React.useState('');
  const [viewId, setViewId] = React.useState(null);
  const [editing, setEditing] = React.useState(false);
  const [deleteConfirmId, setDeleteConfirmId] = React.useState(null);
  const emptyForm = (() => { const inv = new Date().toISOString().slice(0, 10); const d = new Date(); d.setDate(d.getDate() + 30); return { vendor: '', amount: '', invoiceDate: inv, dueDate: d.toISOString().slice(0, 10), terms: 'Net 30', category: 'Supplies', description: '', invoiceNum: '', status: 'Unpaid', recurring: false, frequency: 'Monthly' }; })();
  const [form, setForm] = React.useState({...emptyForm});
  const [showImport, setShowImport] = React.useState(false);
  const [importText, setImportText] = React.useState('');
  const [importError, setImportError] = React.useState('');
  const [importPreview, setImportPreview] = React.useState(null);

  const parseAPImportCSV = (text) => {
    const lines = text.trim().split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
    if (lines.length < 2) return { error: 'CSV must have a header row and at least one data row.' };
    const header = lines[0].map(h => h.toLowerCase());
    const col = (keywords) => header.findIndex(h => keywords.some(k => h.includes(k)));
    const vendorIdx = col(['vendor', 'supplier', 'payee']);
    const amtIdx = col(['amount', 'total']);
    const invDateIdx = col(['invoice date', 'inv date', 'bill date', 'date']);
    const dueIdx = col(['due date', 'due']);
    const catIdx = col(['category', 'type', 'expense']);
    const invNumIdx = col(['invoice #', 'invoice num', 'inv #', 'inv num', 'number']);
    const descIdx = col(['description', 'memo', 'note']);
    const termsIdx = col(['terms', 'payment terms']);
    const statusIdx = col(['status']);
    if (vendorIdx === -1) return { error: 'CSV must have a "Vendor" column.' };
    if (amtIdx === -1) return { error: 'CSV must have an "Amount" column.' };
    const today = new Date().toISOString().slice(0, 10);
    const rows = []; const errors = [];
    for (let i = 1; i < lines.length; i++) {
      const r = lines[i];
      if (r.length < 2 || !r[vendorIdx]) continue;
      const vendor = r[vendorIdx];
      const amount = parseFloat(r[amtIdx]);
      if (!amount || amount <= 0) { errors.push('Row ' + (i+1) + ': Invalid amount'); continue; }
      const invoiceDate = (invDateIdx !== -1 && r[invDateIdx]) ? r[invDateIdx] : today;
      const terms = (termsIdx !== -1 && r[termsIdx] && TERMS_OPTIONS.includes(r[termsIdx])) ? r[termsIdx] : 'Net 30';
      let dueDate = (dueIdx !== -1 && r[dueIdx]) ? r[dueIdx] : '';
      if (!dueDate) dueDate = calcDueDate(invoiceDate, terms) || invoiceDate;
      let category = 'Other';
      if (catIdx !== -1 && r[catIdx]) {
        const match = CATEGORIES.find(c => c.toLowerCase() === r[catIdx].toLowerCase());
        if (match) category = match;
      }
      const invoiceNum = (invNumIdx !== -1 && r[invNumIdx]) ? r[invNumIdx] : '';
      const description = (descIdx !== -1 && r[descIdx]) ? r[descIdx] : '';
      const status = (statusIdx !== -1 && r[statusIdx] && STATUS_OPTIONS.includes(r[statusIdx])) ? r[statusIdx] : 'Unpaid';
      rows.push({ vendor, amount, invoiceDate, dueDate, terms, category, invoiceNum, description, status });
    }
    if (errors.length > 0) return { error: errors.join('\n') };
    if (rows.length === 0) return { error: 'No valid rows found.' };
    return { rows };
  };
  const handleAPImportPreview = () => {
    setImportError(''); setImportPreview(null);
    if (!importText.trim()) { setImportError('Paste CSV data or use the file upload.'); return; }
    const result = parseAPImportCSV(importText);
    if (result.error) { setImportError(result.error); return; }
    setImportPreview(result.rows);
  };
  const handleAPImportConfirm = () => {
    if (!importPreview || importPreview.length === 0) return;
    const newBills = importPreview.map(r => {
      const id = Date.now().toString() + Math.random().toString(36).slice(2, 6);
      const bill = { ...r, id, amountPaid: 0, payments: [], recurring: false, frequency: 'Monthly' };
      const expAcct = AP_CATEGORY_TO_ACCOUNT[r.category] || '6120 Miscellaneous Expense';
      postToGL({ date: r.invoiceDate, memo: 'AP Import — ' + r.vendor + (r.invoiceNum ? ' #' + r.invoiceNum : ''), source: 'ap-bill-' + id, entries: [{ account: expAcct, debit: r.amount, credit: 0 }, { account: '2000 Accounts Payable', debit: 0, credit: r.amount }] });
      return bill;
    });
    setBills(prev => [...prev, ...newBills]);
    const importedVendors = [...new Set(importPreview.map(r => r.vendor))].filter(v => v && !vendors.includes(v));
    if (importedVendors.length) setVendors(prev => [...prev, ...importedVendors].sort());
    setShowImport(false); setImportText(''); setImportPreview(null); setImportError('');
  };
  const handleAPImportFile = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setImportText(ev.target.result); setImportPreview(null); setImportError(''); };
    reader.readAsText(file);
  };

  React.useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(bills)); }, [bills]);

  // Auto-mark overdue
  React.useEffect(() => {
    const today = new Date().toISOString().slice(0, 10);
    setBills(prev => prev.map(b => (b.status === 'Unpaid' || b.status === 'Partial') && b.dueDate < today ? { ...b, status: 'Overdue' } : b));
  }, []);

  // Auto-calc due date from invoice date + terms
  const calcDueDate = (invDate, terms) => {
    if (!invDate || terms === 'Custom') return '';
    const days = TERMS_DAYS[terms] || 0;
    const d = new Date(invDate);
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  };

  const handleTermsChange = (terms) => {
    const dueDate = terms === 'Custom' ? form.dueDate : calcDueDate(form.invoiceDate, terms);
    setForm(f => ({...f, terms, dueDate}));
  };
  const handleInvDateChange = (invoiceDate) => {
    const dueDate = form.terms === 'Custom' ? form.dueDate : calcDueDate(invoiceDate, form.terms);
    setForm(f => ({...f, invoiceDate, dueDate}));
  };

  const resetForm = () => { const inv = new Date().toISOString().slice(0, 10); const dd = new Date(); dd.setDate(dd.getDate() + 30); setForm({...emptyForm, invoiceDate: inv, dueDate: dd.toISOString().slice(0, 10)}); setEditId(null); setShowForm(false); };

  const handleSubmit = () => {
    if (!form.vendor || !form.amount || !form.dueDate) return;
    if (form.invoiceNum) {
      const dup = bills.find(b => b.id !== editId && b.vendor === form.vendor && b.invoiceNum === form.invoiceNum);
      if (dup) { alert(`Duplicate invoice #${form.invoiceNum} already exists for vendor "${form.vendor}".`); return; }
    }
    if (form.vendor && !vendors.includes(form.vendor)) setVendors(prev => [...prev, form.vendor].sort());
    const bill = { ...form, amount: parseFloat(form.amount), id: editId || Date.now().toString(), amountPaid: editId ? (bills.find(b=>b.id===editId)?.amountPaid || 0) : 0, payments: editId ? (bills.find(b=>b.id===editId)?.payments || []) : [] };
    if (editId) {
      setBills(prev => prev.map(b => b.id === editId ? {...b, ...bill} : b));
    } else {
      setBills(prev => [...prev, bill]);
      const expAcct = AP_CATEGORY_TO_ACCOUNT[form.category] || '6120 Miscellaneous Expense';
      postToGL({
        date: form.invoiceDate || form.dueDate, memo: `AP — ${form.vendor}${form.invoiceNum ? ' #' + form.invoiceNum : ''}${form.description ? ' — ' + form.description : ''}`,
        source: `ap-bill-${bill.id}`,
        entries: [
          { account: expAcct, debit: parseFloat(form.amount), credit: 0 },
          { account: '2000 Accounts Payable', debit: 0, credit: parseFloat(form.amount) },
        ],
      });
    }
    resetForm();
  };

  const handleEdit = (bill) => {
    setForm({ vendor: bill.vendor, amount: bill.amount.toString(), invoiceDate: bill.invoiceDate || '', dueDate: bill.dueDate, terms: bill.terms || 'Custom', category: bill.category, description: bill.description || '', invoiceNum: bill.invoiceNum || '', status: bill.status, recurring: bill.recurring || false, frequency: bill.frequency || 'Monthly' });
    setEditId(bill.id);
    setShowForm(true);
  };

  const handleDelete = (id) => {
    setBills(prev => prev.filter(b => b.id !== id));
    removeGLBySource(`ap-bill-${id}`);
    removeGLBySource(`ap-payment-${id}`);
  };

  const handlePayment = (id) => {
    const bill = bills.find(b => b.id === id);
    if (!bill) return;
    const amt = parseFloat(payAmt);
    if (!amt || amt <= 0) return;
    const remaining = bill.amount - (bill.amountPaid || 0);
    const payment = Math.min(amt, remaining);
    const paidDate = new Date().toISOString().slice(0, 10);
    const newPaid = (bill.amountPaid || 0) + payment;
    const fullyPaid = Math.abs(newPaid - bill.amount) < 0.005;
    const newPayments = [...(bill.payments || []), { date: paidDate, amount: payment }];
    setBills(prev => prev.map(b => b.id === id ? { ...b, amountPaid: newPaid, payments: newPayments, status: fullyPaid ? 'Paid' : 'Partial', ...(fullyPaid ? { paidDate } : {}) } : b));
    postToGL({
      date: paidDate, memo: `AP Payment — ${bill.vendor}${fullyPaid ? ' (final)' : ' (partial)'}`,
      source: `ap-payment-${id}-${Date.now()}`,
      entries: [
        { account: '2000 Accounts Payable', debit: payment, credit: 0 },
        { account: '1000 Cash', debit: 0, credit: payment },
      ],
    });
    setPayingId(null); setPayAmt('');
  };

  const handleGenerateNext = (bill) => {
    const freq = bill.frequency || 'Monthly';
    const d = new Date(bill.dueDate);
    if (freq === 'Monthly') d.setMonth(d.getMonth() + 1);
    else if (freq === 'Quarterly') d.setMonth(d.getMonth() + 3);
    else d.setFullYear(d.getFullYear() + 1);
    const invD = new Date(bill.invoiceDate || bill.dueDate);
    if (freq === 'Monthly') invD.setMonth(invD.getMonth() + 1);
    else if (freq === 'Quarterly') invD.setMonth(invD.getMonth() + 3);
    else invD.setFullYear(invD.getFullYear() + 1);
    const newBill = { ...bill, id: Date.now().toString(), dueDate: d.toISOString().slice(0,10), invoiceDate: invD.toISOString().slice(0,10), status: 'Unpaid', amountPaid: 0, payments: [], paidDate: undefined, invoiceNum: '' };
    setBills(prev => [...prev, newBill]);
    const expAcct = AP_CATEGORY_TO_ACCOUNT[newBill.category] || '6120 Miscellaneous Expense';
    postToGL({
      date: newBill.invoiceDate, memo: `AP — ${newBill.vendor} (recurring)`,
      source: `ap-bill-${newBill.id}`,
      entries: [
        { account: expAcct, debit: newBill.amount, credit: 0 },
        { account: '2000 Accounts Payable', debit: 0, credit: newBill.amount },
      ],
    });
  };

  const exportCSV = () => {
    const rows = [['Vendor','Invoice #','Amount','Paid','Remaining','Invoice Date','Due Date','Terms','Category','Status','Description']];
    filtered.forEach(b => rows.push([b.vendor, b.invoiceNum||'', b.amount, b.amountPaid||0, b.amount-(b.amountPaid||0), b.invoiceDate||'', b.dueDate, b.terms||'', b.category, b.status, b.description||'']));
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `AP_Bills_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  };

  const today = new Date().toISOString().slice(0, 10);
  const filtered = bills.filter(b => {
    if (vendorFilter && b.vendor !== vendorFilter) return false;
    if (filter === 'unpaid') return b.status === 'Unpaid' || b.status === 'Scheduled' || b.status === 'Partial';
    if (filter === 'overdue') return b.status === 'Overdue';
    if (filter === 'paid') return b.status === 'Paid';
    if (filter === 'partial') return b.status === 'Partial';
    return true;
  }).sort((a, b) => {
    if (sortBy === 'due') return a.dueDate.localeCompare(b.dueDate);
    if (sortBy === 'amount') return b.amount - a.amount;
    return a.vendor.localeCompare(b.vendor);
  });

  const totalUnpaid = bills.filter(b => b.status !== 'Paid').reduce((s, b) => s + b.amount - (b.amountPaid || 0), 0);
  const totalOverdue = bills.filter(b => b.status === 'Overdue').reduce((s, b) => s + b.amount - (b.amountPaid || 0), 0);
  const totalPaid = bills.reduce((s, b) => s + (b.amountPaid || 0), 0);
  const dueThisWeek = bills.filter(b => {
    if (b.status === 'Paid') return false;
    const d = new Date(b.dueDate); const now = new Date(); const weekOut = new Date(now.getTime() + 7 * 86400000);
    return d >= now && d <= weekOut;
  }).reduce((s, b) => s + b.amount - (b.amountPaid || 0), 0);

  const statusColor = statusColorShared;
  const fmt = (n) => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const dark = useDarkMode();
  const inputStyle = sharedInputStyle(dark);
  const lblStyle = sharedLblStyle;
  const selStyle = {padding:'6px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface2)' : '#fff', color:'var(--text)', fontSize:13};
  const tabStyle = (active) => ({ padding:'8px 20px', borderRadius:'var(--radius-sm) var(--radius-sm) 0 0', border:`1px solid ${active ? 'var(--brand-tan)' : 'var(--border)'}`, borderBottom: active ? '2px solid var(--brand-tan)' : '1px solid var(--border)', background: active ? 'var(--brand-tan)' : 'transparent', color: active ? 'var(--brand-green)' : 'var(--text-muted)', fontWeight: active ? 600 : 400, fontSize:13, cursor:'pointer' });

  // Aging buckets
  const agingData = (() => {
    const vendors = {};
    bills.filter(b => b.status !== 'Paid').forEach(b => {
      if (!vendors[b.vendor]) vendors[b.vendor] = { current: 0, d30: 0, d60: 0, d90: 0, d90p: 0, total: 0 };
      const rem = b.amount - (b.amountPaid || 0);
      const days = Math.max(0, Math.ceil((new Date() - new Date(b.dueDate)) / 86400000));
      const v = vendors[b.vendor];
      if (days <= 0 || new Date(b.dueDate) >= new Date()) v.current += rem;
      else if (days <= 30) v.d30 += rem;
      else if (days <= 60) v.d60 += rem;
      else if (days <= 90) v.d90 += rem;
      else v.d90p += rem;
      v.total += rem;
    });
    return Object.entries(vendors).map(([vendor, d]) => ({ vendor, ...d })).sort((a, b) => b.total - a.total);
  })();
  const agingTotals = agingData.reduce((t, r) => ({ current: t.current+r.current, d30: t.d30+r.d30, d60: t.d60+r.d60, d90: t.d90+r.d90, d90p: t.d90p+r.d90p, total: t.total+r.total }), { current:0, d30:0, d60:0, d90:0, d90p:0, total:0 });

  // Vendor summary
  const vendorData = (() => {
    const vendors = {};
    bills.forEach(b => {
      if (!vendors[b.vendor]) vendors[b.vendor] = { billed: 0, paid: 0, outstanding: 0, count: 0, paidDays: [] };
      const v = vendors[b.vendor];
      v.billed += b.amount; v.paid += (b.amountPaid || 0); v.outstanding += b.amount - (b.amountPaid || 0); v.count++;
      if (b.paidDate && b.invoiceDate) v.paidDays.push(Math.ceil((new Date(b.paidDate) - new Date(b.invoiceDate)) / 86400000));
    });
    return Object.entries(vendors).map(([vendor, d]) => ({ vendor, ...d, avgDays: d.paidDays.length ? Math.round(d.paidDays.reduce((a,b)=>a+b,0)/d.paidDays.length) : null })).sort((a, b) => b.outstanding - a.outstanding);
  })();

  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Accounts Payable</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>

        {/* Summary Cards */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(170px, 1fr))', gap:12, marginBottom:20}}>
          {[
            { label: 'Outstanding', value: fmt(totalUnpaid), color: 'var(--brand-tan)' },
            { label: 'Overdue', value: fmt(totalOverdue), color: 'var(--rust)' },
            { label: 'Due This Week', value: fmt(dueThisWeek), color: 'var(--copper)' },
            { label: 'Total Paid', value: fmt(totalPaid), color: 'var(--forest-green)' },
          ].map((card, i) => (
            <div key={i} style={{background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.2)', borderLeft:`4px solid ${card.color}`, borderRadius:'var(--radius-md)', padding:'12px 14px'}}>
              <div style={{fontSize:11, color:'rgba(255,255,255,0.7)', marginBottom:2}}>{card.label}</div>
              <div style={{fontSize:20, fontWeight:700, color: card.color}}>{card.value}</div>
            </div>
          ))}
        </div>
      </PageHeader>
      <ToolExplainer theme={theme} />

      {/* Tabs */}
      <div style={{display:'flex', gap:4, marginBottom:16}}>
        {[['bills','Bills'],['aging','Aging Report'],['vendors','Vendors']].map(([k,l]) => (
          <button key={k} onClick={() => { setApTab(k); if (k !== 'bills') setVendorFilter(null); }} style={tabStyle(apTab === k)}>{l}</button>
        ))}
      </div>

      {apTab === 'bills' && <>
        {/* Controls */}
        <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
          <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={() => { resetForm(); setShowForm(true); }}>+ Add Bill</button>
          <select value={filter} onChange={e => setFilter(e.target.value)} style={{...selStyle, maxWidth:180}}>
            <option value="all">All Bills</option><option value="unpaid">Unpaid/Partial</option><option value="overdue">Overdue</option><option value="partial">Partial</option><option value="paid">Paid</option>
          </select>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{...selStyle, maxWidth:180}}>
            <option value="due">Sort by Due Date</option><option value="amount">Sort by Amount</option><option value="vendor">Sort by Vendor</option>
          </select>
          <TableIO data={filtered.map(b => ({Vendor:b.vendor, 'Invoice #':b.invoiceNum||'', Amount:b.amount, Paid:b.amountPaid||0, Remaining:b.amount-(b.amountPaid||0), 'Invoice Date':b.invoiceDate||'', 'Due Date':b.dueDate, Terms:b.terms||'', Category:b.category, Status:b.status, Description:b.description||''}))} filename={`AP_Bills_${new Date().toISOString().slice(0,10)}`} onImportClick={() => { setShowImport(true); setImportText(''); setImportPreview(null); setImportError(''); }} />
          {vendorFilter && <span style={{fontSize:12, color:'var(--brand-tan)', fontWeight:600}}>Vendor: {vendorFilter} <button onClick={() => setVendorFilter(null)} style={{background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontWeight:700}}>x</button></span>}
          <span style={{fontSize:12, color:'var(--text-muted)', marginLeft:'auto'}}>{filtered.length} bill{filtered.length !== 1 ? 's' : ''}</span>
        </div>

        {/* Add/Edit Form */}
        {showForm && (
          <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:20, marginBottom:20}}>
            <h3 style={{margin:'0 0 16px', fontSize:16, fontWeight:600, color:'var(--text)'}}>{editId ? 'Edit Bill' : 'Add New Bill'}</h3>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12}}>
              <div>
                <label style={lblStyle}>Vendor *</label>
                <input value={form.vendor} onChange={e => setForm(f => ({...f, vendor: e.target.value}))} placeholder="e.g. Office Depot" list="ap-vendors" style={inputStyle} />
                <datalist id="ap-vendors">{vendors.map(v => <option key={v} value={v} />)}</datalist>
              </div>
              <div>
                <label style={lblStyle}>Amount *</label>
                <input type="number" step="0.01" value={form.amount} onChange={e => setForm(f => ({...f, amount: e.target.value}))} placeholder="0.00" style={inputStyle} />
              </div>
              <div>
                <label style={lblStyle}>Invoice # (optional)</label>
                <input value={form.invoiceNum} onChange={e => setForm(f => ({...f, invoiceNum: e.target.value}))} placeholder="INV-001" style={inputStyle} />
              </div>
              <div>
                <label style={lblStyle}>Invoice Date</label>
                <input type="date" value={form.invoiceDate} onChange={e => handleInvDateChange(e.target.value)} style={inputStyle} />
              </div>
              <div>
                <label style={lblStyle}>Payment Terms</label>
                <select value={form.terms} onChange={e => handleTermsChange(e.target.value)} style={inputStyle}>
                  {TERMS_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div>
                <label style={lblStyle}>Due Date *{form.terms !== 'Custom' ? ' (auto)' : ''}</label>
                <input type="date" value={form.dueDate} onChange={e => setForm(f => ({...f, dueDate: e.target.value}))} style={inputStyle} readOnly={form.terms !== 'Custom'} />
              </div>
              <div>
                <label style={lblStyle}>Category</label>
                <select value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))} style={inputStyle}>
                  {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={lblStyle}>Description (optional)</label>
                <input value={form.description} onChange={e => setForm(f => ({...f, description: e.target.value}))} placeholder="Notes..." style={inputStyle} />
              </div>
              <div style={{display:'flex', flexDirection:'column', justifyContent:'flex-end'}}>
                <label style={{...lblStyle, display:'flex', alignItems:'center', gap:8, cursor:'pointer'}}>
                  <input type="checkbox" checked={form.recurring} onChange={e => setForm(f => ({...f, recurring: e.target.checked}))} />
                  Recurring
                </label>
                {form.recurring && (
                  <select value={form.frequency} onChange={e => setForm(f => ({...f, frequency: e.target.value}))} style={{...inputStyle, marginTop:4}}>
                    {FREQ_OPTIONS.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                )}
              </div>
              {editId && (
                <div>
                  <label style={lblStyle}>Status</label>
                  <select value={form.status} onChange={e => setForm(f => ({...f, status: e.target.value}))} style={inputStyle}>
                    {STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              )}
            </div>
            <div style={{display:'flex', gap:8, marginTop:16}}>
              <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={handleSubmit}>{editId ? 'Update' : 'Add Bill'}</button>
              <button className="tool-btn tool-btn-secondary" onClick={resetForm}>Cancel</button>
            </div>
          </div>
        )}

        {/* AP Import Panel */}
        {showImport && (
          <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent, marginBottom: 16}}>
            <div style={{fontWeight:600, fontSize:14, marginBottom:12, color: theme.accent}}>Import Bills from CSV</div>
            <div style={{fontSize:12, color:'var(--text-muted)', marginBottom:8}}>Required columns: <b>Vendor</b>, <b>Amount</b>. Optional: Invoice Date, Due Date, Category, Invoice #, Description, Terms, Status.</div>
            <div style={{display:'flex', gap:12, alignItems:'center', marginBottom:8}}>
              <input type="file" accept=".csv,.txt" onChange={handleAPImportFile} style={{fontSize:12}} />
            </div>
            <textarea value={importText} onChange={e => { setImportText(e.target.value); setImportPreview(null); }} placeholder={'Vendor, Amount, Invoice Date, Due Date, Category, Invoice #, Description, Terms, Status\nABC Supply, 1500, 2026-03-01, 2026-03-31, Supplies, INV-001, Office supplies, Net 30, Unpaid'} rows={5} style={{width:'100%', fontFamily:'monospace', fontSize:12, padding:8, borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', resize:'vertical'}} />
            {importError && <div style={{color:'#ef4444', fontSize:12, marginTop:4, whiteSpace:'pre-wrap'}}>{importError}</div>}
            {importPreview && (
              <div style={{marginTop:8, maxHeight:200, overflow:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)'}}>
                <table style={{width:'100%', fontSize:11, borderCollapse:'collapse'}}>
                  <thead><tr style={{background:'var(--surface2)'}}>{['Vendor','Amount','Inv Date','Due Date','Category','Invoice #','Status'].map(h => <th key={h} style={{padding:'4px 8px', textAlign:'left', borderBottom:'1px solid var(--border)'}}>{h}</th>)}</tr></thead>
                  <tbody>{importPreview.map((r,i) => <tr key={i}><td style={{padding:'4px 8px'}}>{r.vendor}</td><td style={{padding:'4px 8px'}}>${r.amount.toFixed(2)}</td><td style={{padding:'4px 8px'}}>{r.invoiceDate}</td><td style={{padding:'4px 8px'}}>{r.dueDate}</td><td style={{padding:'4px 8px'}}>{r.category}</td><td style={{padding:'4px 8px'}}>{r.invoiceNum}</td><td style={{padding:'4px 8px'}}>{r.status}</td></tr>)}</tbody>
                </table>
              </div>
            )}
            <div style={{display:'flex', gap:8, marginTop:12}}>
              <button onClick={handleAPImportPreview} style={{background:'var(--brand-green-light)', color:'var(--brand-tan)', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer', fontWeight:600}}>Preview Import</button>
              {importPreview && importPreview.length > 0 && (
                <button onClick={handleAPImportConfirm} style={{background:'var(--brand-green-light)', color:'var(--brand-tan)', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer', fontWeight:600}}>Confirm &amp; Post ({importPreview.length} bills)</button>
              )}
              <button onClick={() => setShowImport(false)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer'}}>Cancel</button>
            </div>
          </div>
        )}

        {/* Delete Confirmation Modal */}
        {deleteConfirmId && (() => {
          const b = bills.find(x => x.id === deleteConfirmId);
          return (
            <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center'}} onClick={() => setDeleteConfirmId(null)}>
              <div onClick={e => e.stopPropagation()} style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:28, maxWidth:420, width:'90%', textAlign:'center'}}>
                <div style={{fontSize:36, marginBottom:8}}>&#9888;</div>
                <h3 style={{margin:'0 0 8px', fontSize:17, fontWeight:700, color:'var(--text)'}}>Delete Bill?</h3>
                <p style={{fontSize:13, color:'var(--text-muted)', margin:'0 0 20px', lineHeight:1.5}}>Are you sure you want to permanently delete {b ? `the bill from ${b.vendor}` : 'this bill'}? This action cannot be undone. All associated GL entries will also be removed.</p>
                <div style={{display:'flex', gap:10, justifyContent:'center'}}>
                  <button onClick={() => setDeleteConfirmId(null)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'8px 24px', fontSize:13, cursor:'pointer', fontWeight:600}}>Cancel</button>
                  <button onClick={() => { handleDelete(deleteConfirmId); setDeleteConfirmId(null); setViewId(null); }} style={{background:'#ef4444', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 24px', fontSize:13, cursor:'pointer', fontWeight:600}}>Delete Permanently</button>
                </div>
              </div>
            </div>
          );
        })()}

        {/* Bill Detail View */}
        {viewId && (() => {
          const bill = bills.find(b => b.id === viewId);
          if (!bill) { setViewId(null); return null; }
          const remaining = bill.amount - (bill.amountPaid || 0);
          const daysUntil = Math.ceil((new Date(bill.dueDate) - new Date()) / 86400000);
          const urgency = bill.status === 'Paid' ? '' : daysUntil < 0 ? `${Math.abs(daysUntil)}d overdue` : daysUntil === 0 ? 'Due today' : daysUntil <= 7 ? `Due in ${daysUntil}d` : '';
          const fieldLabel = {fontSize:11, color:'var(--text-muted)', marginBottom:2, textTransform:'uppercase', letterSpacing:'0.5px', fontWeight:600};
          return (
            <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:24}}>
              {/* Header: Back + Vendor + Status */}
              <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:8}}>
                <button onClick={() => { setViewId(null); setPayingId(null); setEditing(false); setEditId(null); }} style={{background:'none', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 12px', cursor:'pointer', color:'var(--text-muted)', fontSize:13, fontWeight:600}}>&#8592; Back</button>
                <div style={{flex:1}}>
                  {editing ? <input value={form.vendor} onChange={e => setForm(f => ({...f, vendor: e.target.value}))} style={inputStyle} /> : <h3 style={{margin:0, fontSize:20, fontWeight:700, color:'var(--rust)'}}>{bill.vendor}</h3>}
                  {bill.invoiceNum && !editing && <div style={{fontSize:13, color:'var(--charcoal-slate)', marginTop:2}}>Invoice #{bill.invoiceNum}</div>}
                </div>
                <span style={{ display:'inline-block', padding:'4px 14px', borderRadius:12, fontSize:12, fontWeight:600, background: statusColor(bill.status) + '18', color: statusColor(bill.status) }}>{bill.status}</span>
                {urgency && <span style={{fontSize:12, color: daysUntil < 0 ? '#ef4444' : daysUntil <= 3 ? '#f59e0b' : 'var(--text-muted)', fontWeight:600}}>{urgency}</span>}
              </div>

              {/* Amounts — prominent */}
              <div style={{display:'flex', gap:32, padding:'16px 0', marginBottom:16, borderBottom:'1px solid var(--border)'}}>
                <div>
                  <div style={fieldLabel}>Amount</div>
                  {editing ? <input type="number" step="0.01" value={form.amount} onChange={e => setForm(f => ({...f, amount: e.target.value}))} style={inputStyle} /> : <div style={{fontSize:28, fontWeight:700, color:'var(--brand-tan)', fontVariantNumeric:'tabular-nums'}}>{fmt(bill.amount)}</div>}
                </div>
                <div>
                  <div style={fieldLabel}>Remaining</div>
                  <div style={{fontSize:28, fontWeight:700, color: remaining > 0 ? '#8b5cf6' : 'var(--forest-green)', fontVariantNumeric:'tabular-nums'}}>{fmt(remaining)}</div>
                </div>
              </div>

              {/* Details section */}
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px 32px', marginBottom:16, paddingBottom:16, borderBottom:'1px solid var(--border)'}}>
                {editing && <div><div style={fieldLabel}>Invoice #</div><input value={form.invoiceNum} onChange={e => setForm(f => ({...f, invoiceNum: e.target.value}))} style={inputStyle} /></div>}
                <div><div style={fieldLabel}>Invoice Date</div>{editing ? <input type="date" value={form.invoiceDate} onChange={e => handleInvDateChange(e.target.value)} style={inputStyle} /> : <div style={{fontSize:14}}>{bill.invoiceDate || '—'}</div>}</div>
                <div><div style={fieldLabel}>Due Date</div>{editing ? <input type="date" value={form.dueDate} onChange={e => setForm(f => ({...f, dueDate: e.target.value}))} style={inputStyle} readOnly={form.terms !== 'Custom'} /> : <div style={{fontSize:14}}>{bill.dueDate}</div>}</div>
                <div><div style={fieldLabel}>Terms</div>{editing ? <select value={form.terms} onChange={e => handleTermsChange(e.target.value)} style={inputStyle}>{TERMS_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}</select> : <div style={{fontSize:14}}>{bill.terms || '—'}</div>}</div>
                <div><div style={fieldLabel}>Category</div>{editing ? <select value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))} style={inputStyle}>{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select> : <div style={{fontSize:14}}>{bill.category}</div>}</div>
                <div style={{gridColumn: editing ? 'span 1' : 'span 2'}}><div style={fieldLabel}>Description</div>{editing ? <input value={form.description} onChange={e => setForm(f => ({...f, description: e.target.value}))} style={inputStyle} /> : <div style={{fontSize:14}}>{bill.description || '—'}</div>}</div>
                {editing && <div><div style={fieldLabel}>Status</div><select value={form.status} onChange={e => setForm(f => ({...f, status: e.target.value}))} style={inputStyle}>{STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}</select></div>}
              </div>

              {/* Settings section */}
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px 32px', marginBottom:24}}>
                <div><div style={fieldLabel}>Recurring</div>{editing ? <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:14}}><input type="checkbox" checked={form.recurring} onChange={e => setForm(f => ({...f, recurring: e.target.checked}))} /> Yes</label> : <div style={{fontSize:14, color: bill.recurring ? '#8b5cf6' : 'var(--text-muted)'}}>{bill.recurring ? bill.frequency : 'No'}</div>}</div>
                {editing && form.recurring && <div><div style={fieldLabel}>Frequency</div><select value={form.frequency} onChange={e => setForm(f => ({...f, frequency: e.target.value}))} style={inputStyle}>{FREQ_OPTIONS.map(f => <option key={f} value={f}>{f}</option>)}</select></div>}
              </div>

              {/* Actions */}
              <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:20, paddingTop:16, borderTop:'1px solid var(--border)'}}>
                {editing ? (<>
                  <button onClick={() => { handleSubmit(); setEditing(false); }} className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)', padding:'8px 18px', fontSize:13}}>Save Changes</button>
                  <button onClick={() => setEditing(false)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer'}}>Cancel</button>
                </>) : (<>
                  {bill.status !== 'Paid' && <button onClick={() => { setPayingId(payingId === bill.id ? null : bill.id); setPayAmt(remaining.toFixed(2)); }} style={{background:'var(--forest-green)', color:'#fff', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600}}>Record Payment</button>}
                  <button onClick={() => { setForm({ vendor: bill.vendor, amount: bill.amount.toString(), invoiceDate: bill.invoiceDate || '', dueDate: bill.dueDate, terms: bill.terms || 'Custom', category: bill.category, description: bill.description || '', invoiceNum: bill.invoiceNum || '', status: bill.status, recurring: bill.recurring || false, frequency: bill.frequency || 'Monthly' }); setEditId(bill.id); setEditing(true); }} style={{background:'none', border:'1px solid var(--brand-tan)', color:'var(--brand-tan)', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600}}>Edit Bill</button>
                  {bill.recurring && <button onClick={() => handleGenerateNext(bill)} style={{background:'none', border:'1px solid #8b5cf6', color:'#8b5cf6', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600}}>Generate Next Period</button>}
                  <button onClick={() => setDeleteConfirmId(bill.id)} style={{background:'none', border:'1px solid #ef4444', color:'#ef4444', borderRadius:'var(--radius-sm)', padding:'8px 18px', fontSize:13, cursor:'pointer', fontWeight:600, marginLeft:'auto'}}>Delete</button>
                </>)}
              </div>

              {/* Payment mini-form */}
              {payingId === bill.id && (
                <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:16, padding:12, background: dark ? 'var(--surface)' : '#f9fafb', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)'}}>
                  <span style={{fontSize:13, color:'var(--text-muted)'}}>Payment amount:</span>
                  <input type="number" step="0.01" value={payAmt} onChange={e => setPayAmt(e.target.value)} style={{...inputStyle, width:140}} />
                  <button onClick={() => handlePayment(bill.id)} className="tool-btn tool-btn-primary" style={{background:'var(--forest-green)', color:'#fff', padding:'8px 18px', fontSize:13}}>Pay</button>
                  <button onClick={() => setPayingId(null)} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:13}}>Cancel</button>
                </div>
              )}

              {/* Payment History */}
              {bill.payments && bill.payments.length > 0 && (
                <div>
                  <div style={{fontSize:13, fontWeight:600, color:'var(--text)', marginBottom:8}}>Payment History</div>
                  <div style={{border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', overflow:'hidden'}}>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', padding:'8px 12px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'1px solid var(--border)'}}>
                      <span>Date</span><span style={{textAlign:'right'}}>Amount</span>
                    </div>
                    {bill.payments.map((p, i) => (
                      <div key={i} style={{display:'grid', gridTemplateColumns:'1fr 1fr', padding:'8px 12px', fontSize:13, borderBottom: i < bill.payments.length - 1 ? '1px solid var(--border)' : 'none'}}>
                        <span>{p.date}</span><span style={{textAlign:'right', fontVariantNumeric:'tabular-nums'}}>{fmt(p.amount)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })()}

        {/* Bills List */}
        {!viewId && (filtered.length === 0 ? (
          <div style={{textAlign:'center', padding:40, color:'var(--text-muted)', fontSize:14}}>
            {bills.length === 0 ? 'No bills yet. Click "+ Add Bill" to get started.' : 'No bills match this filter.'}
          </div>
        ) : (
          <div style={{border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden', background: dark ? 'var(--surface2)' : '#fff'}}>
            {filtered.map((bill, idx) => (
              <div key={bill.id} onClick={() => setViewId(bill.id)} style={{ borderLeft:`4px solid ${statusColor(bill.status)}`, borderBottom: idx < filtered.length - 1 ? '1px solid var(--border)' : 'none', padding:'10px 16px', cursor:'pointer', transition:'background 0.15s' }} onMouseEnter={e => e.currentTarget.style.background = dark ? 'var(--surface)' : '#f9fafb'} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 120px 100px', alignItems:'center', gap:10}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:600, fontSize:14, color:'var(--rust)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                      {bill.vendor}
                      {bill.invoiceNum && <span style={{fontSize:11, color:'var(--charcoal-slate)', marginLeft:8}}>#{bill.invoiceNum}</span>}
                      {bill.recurring && <span style={{fontSize:10, color:'#8b5cf6', marginLeft:6}} title={`Recurring ${bill.frequency}`}>&#x21bb;</span>}
                    </div>
                    <div style={{fontSize:12, color:'var(--text-muted)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                      {bill.category}{bill.terms ? ` · ${bill.terms}` : ''}{bill.description ? ` — ${bill.description}` : ''}
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700, fontSize:16, color:'var(--brand-tan)', fontVariantNumeric:'tabular-nums'}}>{fmt(bill.amount)}</div>
                    <div style={{fontSize:11, color:'var(--text-muted)'}}>Due {bill.dueDate}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <span style={{ display:'inline-block', padding:'3px 10px', borderRadius:12, fontSize:11, fontWeight:600, background: statusColor(bill.status) + '18', color: statusColor(bill.status) }}>{bill.status}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        ))}
      </>}

      {apTab === 'aging' && (
        <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
          <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'10px 14px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'2px solid var(--border)'}}>
            <span>Vendor</span><span style={{textAlign:'right', color:'var(--forest-green)'}}>Current</span><span style={{textAlign:'right', color:'#f59e0b'}}>1-30</span><span style={{textAlign:'right', color:'#f97316'}}>31-60</span><span style={{textAlign:'right', color:'#ef4444'}}>61-90</span><span style={{textAlign:'right', color:'#dc2626'}}>90+</span><span style={{textAlign:'right'}}>Total</span>
          </div>
          {agingData.length === 0 ? (
            <div style={{padding:30, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>No outstanding bills.</div>
          ) : (<>
            {agingData.map(r => (
              <div key={r.vendor} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'8px 14px', borderBottom:'1px solid var(--border)', fontSize:12}}>
                <span style={{color:'var(--text)', fontWeight:500, cursor:'pointer', textDecoration:'underline'}} onClick={() => { setVendorFilter(r.vendor); setApTab('bills'); }}>{r.vendor}</span>
                <span style={{textAlign:'right', color: r.current ? 'var(--forest-green)' : 'var(--text-muted)'}}>{r.current ? fmt(r.current) : '-'}</span>
                <span style={{textAlign:'right', color: r.d30 ? '#f59e0b' : 'var(--text-muted)'}}>{r.d30 ? fmt(r.d30) : '-'}</span>
                <span style={{textAlign:'right', color: r.d60 ? '#f97316' : 'var(--text-muted)'}}>{r.d60 ? fmt(r.d60) : '-'}</span>
                <span style={{textAlign:'right', color: r.d90 ? '#ef4444' : 'var(--text-muted)'}}>{r.d90 ? fmt(r.d90) : '-'}</span>
                <span style={{textAlign:'right', color: r.d90p ? '#dc2626' : 'var(--text-muted)'}}>{r.d90p ? fmt(r.d90p) : '-'}</span>
                <span style={{textAlign:'right', fontWeight:600, color:'var(--text)'}}>{fmt(r.total)}</span>
              </div>
            ))}
            <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'10px 14px', borderTop:'2px solid var(--border)', fontSize:12, fontWeight:700, background: dark ? 'var(--surface)' : '#f9fafb'}}>
              <span style={{color:'var(--text)'}}>TOTALS</span>
              <span style={{textAlign:'right', color:'var(--forest-green)'}}>{fmt(agingTotals.current)}</span>
              <span style={{textAlign:'right', color:'#f59e0b'}}>{fmt(agingTotals.d30)}</span>
              <span style={{textAlign:'right', color:'#f97316'}}>{fmt(agingTotals.d60)}</span>
              <span style={{textAlign:'right', color:'#ef4444'}}>{fmt(agingTotals.d90)}</span>
              <span style={{textAlign:'right', color:'#dc2626'}}>{fmt(agingTotals.d90p)}</span>
              <span style={{textAlign:'right', color:'var(--text)'}}>{fmt(agingTotals.total)}</span>
            </div>
          </>)}
        </div>
      )}

      {apTab === 'vendors' && (
        <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', overflow:'hidden'}}>
          <div style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'10px 14px', background: dark ? 'var(--surface)' : '#f9fafb', fontSize:11, fontWeight:700, color:'var(--charcoal-slate)', borderBottom:'2px solid var(--border)'}}>
            <span>Vendor</span><span style={{textAlign:'right'}}>Total Billed</span><span style={{textAlign:'right'}}>Paid</span><span style={{textAlign:'right'}}>Outstanding</span><span style={{textAlign:'center'}}>Bills</span><span style={{textAlign:'right'}}>Avg Days to Pay</span>
          </div>
          {vendorData.length === 0 ? (
            <div style={{padding:30, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>No vendors yet.</div>
          ) : vendorData.map(v => (
            <div key={v.vendor} style={{display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr', gap:0, padding:'8px 14px', borderBottom:'1px solid var(--border)', fontSize:12}}>
              <span style={{color:'var(--text)', fontWeight:500, cursor:'pointer', textDecoration:'underline'}} onClick={() => { setVendorFilter(v.vendor); setApTab('bills'); }}>{v.vendor}</span>
              <span style={{textAlign:'right', color:'var(--text)'}}>{fmt(v.billed)}</span>
              <span style={{textAlign:'right', color:'var(--forest-green)'}}>{fmt(v.paid)}</span>
              <span style={{textAlign:'right', color: v.outstanding > 0 ? '#f59e0b' : 'var(--text-muted)', fontWeight: v.outstanding > 0 ? 600 : 400}}>{fmt(v.outstanding)}</span>
              <span style={{textAlign:'center', color:'var(--text)'}}>{v.count}</span>
              <span style={{textAlign:'right', color:'var(--text-muted)'}}>{v.avgDays !== null ? `${v.avgDays}d` : '-'}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// --- Tool 11b: Accounts Receivable ---
const AR_REVENUE_TO_ACCOUNT = {
  'Product Sales': '4100 Product Sales', 'Service Revenue': '4010 Service Revenue', 'Consulting': '4020 Consulting Revenue',
  'Subscription': '4200 Subscription Revenue', 'Rental Income': '4300 Rental Income', 'Other': '4600 Other Income',
};

function ARManagementView() {
  const theme = TOOL_THEMES.ar;
  const STORAGE_KEY = 'veracity-ar-invoices';
  const AR_CUSTOMERS_KEY = 'veracity-ar-customers';
  const CATEGORIES = ['Product Sales', 'Service Revenue', 'Consulting', 'Subscription', 'Rental Income', 'Other'];
  const STATUS_OPTIONS = ['Unpaid', 'Partial', 'Paid', 'Overdue', 'Written Off'];
  const TERMS_OPTIONS = ['Due on Receipt', 'Net 15', 'Net 30', 'Net 45', 'Net 60', 'Net 90', 'Custom'];
  const TERMS_DAYS = { 'Due on Receipt': 0, 'Net 15': 15, 'Net 30': 30, 'Net 45': 45, 'Net 60': 60, 'Net 90': 90 };
  const FREQ_OPTIONS = ['Monthly', 'Quarterly', 'Annually'];

  const [invoices, setInvoices] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
  });
  const [customers, setCustomers] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(AR_CUSTOMERS_KEY)) || []; } catch { return []; }
  });
  React.useEffect(() => { localStorage.setItem(AR_CUSTOMERS_KEY, JSON.stringify(customers)); }, [customers]);
  React.useEffect(() => { if (customers.length === 0 && invoices.length > 0) { setCustomers([...new Set(invoices.map(i => i.customer))].sort()); } }, []);
  const [arTab, setArTab] = React.useState('invoices');
  const [showForm, setShowForm] = React.useState(false);
  const [filter, setFilter] = React.useState('all');
  const [sortBy, setSortBy] = React.useState('due');
  const [editId, setEditId] = React.useState(null);
  const [customerFilter, setCustomerFilter] = React.useState(null);
  const [payingId, setPayingId] = React.useState(null);
  const [payAmt, setPayAmt] = React.useState('');
  const [viewId, setViewId] = React.useState(null);
  const [editing, setEditing] = React.useState(false);
  const [deleteConfirmId, setDeleteConfirmId] = React.useState(null);
  const emptyForm = (() => { const inv = new Date().toISOString().slice(0, 10); const d = new Date(); d.setDate(d.getDate() + 30); return { customer: '', amount: '', invoiceDate: inv, dueDate: d.toISOString().slice(0, 10), terms: 'Net 30', category: 'Service Revenue', description: '', invoiceNum: '', status: 'Unpaid', recurring: false, frequency: 'Monthly' }; })();
  const [form, setForm] = React.useState({...emptyForm});
  const [showImport, setShowImport] = React.useState(false);
  const [importText, setImportText] = React.useState('');
  const [importError, setImportError] = React.useState('');
  const [importPreview, setImportPreview] = React.useState(null);

  const parseARImportCSV = (text) => {
    const lines = text.trim().split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
    if (lines.length < 2) return { error: 'CSV must have a header row and at least one data row.' };
    const header = lines[0].map(h => h.toLowerCase());
    const col = (keywords) => header.findIndex(h => keywords.some(k => h.includes(k)));
    const custIdx = col(['customer', 'client', 'buyer']);
    const amtIdx = col(['amount', 'total']);
    const invDateIdx = col(['invoice date', 'inv date', 'date']);
    const dueIdx = col(['due date', 'due']);
    const catIdx = col(['category', 'type', 'revenue']);
    const invNumIdx = col(['invoice #', 'invoice num', 'inv #', 'inv num', 'number']);
    const descIdx = col(['description', 'memo', 'note']);
    const termsIdx = col(['terms', 'payment terms']);
    const statusIdx = col(['status']);
    if (custIdx === -1) return { error: 'CSV must have a "Customer" column.' };
    if (amtIdx === -1) return { error: 'CSV must have an "Amount" column.' };
    const today = new Date().toISOString().slice(0, 10);
    const rows = []; const errors = [];
    for (let i = 1; i < lines.length; i++) {
      const r = lines[i];
      if (r.length < 2 || !r[custIdx]) continue;
      const customer = r[custIdx];
      const amount = parseFloat(r[amtIdx]);
      if (!amount || amount <= 0) { errors.push('Row ' + (i+1) + ': Invalid amount'); continue; }
      const invoiceDate = (invDateIdx !== -1 && r[invDateIdx]) ? r[invDateIdx] : today;
      const terms = (termsIdx !== -1 && r[termsIdx] && TERMS_OPTIONS.includes(r[termsIdx])) ? r[termsIdx] : 'Net 30';
      let dueDate = (dueIdx !== -1 && r[dueIdx]) ? r[dueIdx] : '';
      if (!dueDate) dueDate = calcDueDate(invoiceDate, terms) || invoiceDate;
      let category = 'Service Revenue';
      if (catIdx !== -1 && r[catIdx]) {
        const match = CATEGORIES.find(c => c.toLowerCase() === r[catIdx].toLowerCase());
        if (match) category = match;
      }
      const invoiceNum = (invNumIdx !== -1 && r[invNumIdx]) ? r[invNumIdx] : '';
      const description = (descIdx !== -1 && r[descIdx]) ? r[descIdx] : '';
      const status = (statusIdx !== -1 && r[statusIdx] && STATUS_OPTIONS.includes(r[statusIdx])) ? r[statusIdx] : 'Unpaid';
      rows.push({ customer, amount, invoiceDate, dueDate, terms, category, invoiceNum, description, status });
    }
    if (errors.length > 0) return { error: errors.join('\n') };
    if (rows.length === 0) return { error: 'No valid rows found.' };
    return { rows };
  };
  const handleARImportPreview = () => {
    setImportError(''); setImportPreview(null);
    if (!importText.trim()) { setImportError('Paste CSV data or use the file upload.'); return; }
    const result = parseARImportCSV(importText);
    if (result.error) { setImportError(result.error); return; }
    setImportPreview(result.rows);
  };
  const handleARImportConfirm = () => {
    if (!importPreview || importPreview.length === 0) return;
    const newInvoices = importPreview.map(r => {
      const id = Date.now().toString() + Math.random().toString(36).slice(2, 6);
      const inv = { ...r, id, amountPaid: 0, payments: [], recurring: false, frequency: 'Monthly' };
      const revAcct = AR_REVENUE_TO_ACCOUNT[r.category] || '4600 Other Income';
      postToGL({ date: r.invoiceDate, memo: 'AR Import — ' + r.customer + (r.invoiceNum ? ' #' + r.invoiceNum : ''), source: 'ar-invoice-' + id, entries: [{ account: '1100 Accounts Receivable', debit: r.amount, credit: 0 }, { account: revAcct, debit: 0, credit: r.amount }] });
      return inv;
    });
    setInvoices(prev => [...prev, ...newInvoices]);
    const importedCustomers = [...new Set(importPreview.map(r => r.customer))].filter(c => c && !customers.includes(c));
    if (importedCustomers.length) setCustomers(prev => [...prev, ...importedCustomers].sort());
    setShowImport(false); setImportText(''); setImportPreview(null); setImportError('');
  };
  const handleARImportFile = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setImportText(ev.target.result); setImportPreview(null); setImportError(''); };
    reader.readAsText(file);
  };

  React.useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(invoices)); }, [invoices]);

  // Auto-mark overdue
  React.useEffect(() => {
    const today = new Date().toISOString().slice(0, 10);
    setInvoices(prev => prev.map(inv => (inv.status === 'Unpaid' || inv.status === 'Partial') && inv.dueDate < today ? { ...inv, status: 'Overdue' } : inv));
  }, []);

  const calcDueDate = (invDate, terms) => {
    if (!invDate || terms === 'Custom') return '';
    const days = TERMS_DAYS[terms] || 0;
    const d = new Date(invDate);
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  };

  const handleTermsChange = (terms) => {
    const dueDate = terms === 'Custom' ? form.dueDate : calcDueDate(form.invoiceDate, terms);
    setForm(f => ({...f, terms, dueDate}));
  };
  const handleInvDateChange = (invoiceDate) => {
    const dueDate = form.terms === 'Custom' ? form.dueDate : calcDueDate(invoiceDate, form.terms);
    setForm(f => ({...f, invoiceDate, dueDate}));
  };

  const resetForm = () => { const inv = new Date().toISOString().slice(0, 10); const dd = new Date(); dd.setDate(dd.getDate() + 30); setForm({...emptyForm, invoiceDate: inv, dueDate: dd.toISOString().slice(0, 10)}); setEditId(null); setShowForm(false); };

  const handleSubmit = () => {
    if (!form.customer || !form.amount || !form.dueDate) return;
    if (form.invoiceNum) {
      const dup = invoices.find(i => i.id !== editId && i.customer === form.customer && i.invoiceNum === form.invoiceNum);
      if (dup) { alert(`Duplicate invoice #${form.invoiceNum} already exists for customer "${form.customer}".`); return; }
    }
    if (form.customer && !customers.includes(form.customer)) setCustomers(prev => [...prev, form.customer].sort());
    const inv = { ...form, amount: parseFloat(form.amount), id: editId || Date.now().toString(), amountPaid: editId ? (invoices.find(i=>i.id===editId)?.amountPaid || 0) : 0, payments: editId ? (invoices.find(i=>i.id===editId)?.payments || []) : [] };
    if (editId) {
      setInvoices(prev => prev.map(i => i.id === editId ? {...i, ...inv} : i));
    } else {
      setInvoices(prev => [...prev, inv]);
      const revAcct = AR_REVENUE_TO_ACCOUNT[form.category] || '4600 Other Income';
      postToGL({
        date: form.invoiceDate || form.dueDate, memo: `AR — ${form.customer}${form.invoiceNum ? ' #' + form.invoiceNum : ''}${form.description ? ' — ' + form.description : ''}`,
        source: `ar-invoice-${inv.id}`,
        entries: [
          { account: '1100 Accounts Receivable', debit: parseFloat(form.amount), credit: 0 },
          { account: revAcct, debit: 0, credit: parseFloat(form.amount) },
        ],
      });
    }
    resetForm();
  };

  const handleEdit = (inv) => {
    setForm({ customer: inv.customer, amount: inv.amount.toString(), invoiceDate: inv.invoiceDate || '', dueDate: inv.dueDate, terms: inv.terms || 'Custom', category: inv.category, description: inv.description || '', invoiceNum: inv.invoiceNum || '', status: inv.status, recurring: inv.recurring || false, frequency: inv.frequency || 'Monthly' });
    setEditId(inv.id);
    setShowForm(true);
  };

  const handleDelete = (id) => {
    setInvoices(prev => prev.filter(i => i.id !== id));
    removeGLBySource(`ar-invoice-${id}`);
    removeGLBySource(`ar-payment-${id}`);
  };

  const handlePayment = (id) => {
    const inv = invoices.find(i => i.id === id);
    if (!inv) return;
    const amt = parseFloat(payAmt);
    if (!amt || amt <= 0) return;
    const remaining = inv.amount - (inv.amountPaid || 0);
    const payment = Math.min(amt, remaining);
    const paidDate = new Date().toISOString().slice(0, 10);
    const newPaid = (inv.amountPaid || 0) + payment;
    const fullyPaid = Math.abs(newPaid - inv.amount) < 0.005;
    const newPayments = [...(inv.payments || []), { date: paidDate, amount: payment }];
    setInvoices(prev => prev.map(i => i.id === id ? { ...i, amountPaid: newPaid, payments: newPayments, status: fullyPaid ? 'Paid' : 'Partial', ...(fullyPaid ? { paidDate } : {}) } : i));
    postToGL({
      date: paidDate, memo: `AR Payment — ${inv.customer}${fullyPaid ? ' (final)' : ' (partial)'}`,
      source: `ar-payment-${id}-${Date.now()}`,
      entries: [
        { account: '1000 Cash', debit: payment, credit: 0 },
        { account: '1100 Accounts Receivable', debit: 0, credit: payment },
      ],
    });
    setPayingId(null); setPayAmt('');
  };

  const handleWriteOff = (id) => {
    const inv = invoices.find(i => i.id === id);
    if (!inv) return;
    const remaining = inv.amount - (inv.amountPaid || 0);
    if (remaining <= 0) return;
    setInvoices(prev => prev.map(i => i.id === id ? { ...i, status: 'Written Off', amountPaid: inv.amount, payments: [...(i.payments || []), { date: new Date().toISOString().slice(0, 10), amount: remaining, type: 'write-off' }] } : i));
    postToGL({
      date: new Date().toISOString().slice(0, 10), memo: `AR Write-Off — ${inv.customer} (bad debt)`,
      source: `ar-writeoff-${id}-${Date.now()}`,
      entries: [
        { account: '6290 Bad Debt Expense', debit: remaining, credit: 0 },
        { account: '1100 Accounts Receivable', debit: 0, credit: remaining },
      ],
    });
  };

  const handleGenerateNext = (inv) => {
    const freq = inv.frequency || 'Monthly';
    const d = new Date(inv.dueDate);
    if (freq === 'Monthly') d.setMonth(d.getMonth() + 1);
    else if (freq === 'Quarterly') d.setMonth(d.getMonth() + 3);
    else d.setFullYear(d.getFullYear() + 1);
    const invD = new Date(inv.invoiceDate || inv.dueDate);
    if (freq === 'Monthly') invD.setMonth(invD.getMonth() + 1);
    else if (freq === 'Quarterly') invD.setMonth(invD.getMonth() + 3);
    else invD.setFullYear(invD.getFullYear() + 1);
    const newInv = { ...inv, id: Date.now().toString(), dueDate: d.toISOString().slice(0,10), invoiceDate: invD.toISOString().slice(0,10), status: 'Unpaid', amountPaid: 0, payments: [], paidDate: undefined, invoiceNum: '' };
    setInvoices(prev => [...prev, newInv]);
    const revAcct = AR_REVENUE_TO_ACCOUNT[newInv.category] || '4600 Other Income';
    postToGL({
      date: newInv.invoiceDate, memo: `AR — ${newInv.customer} (recurring)`,
      source: `ar-invoice-${newInv.id}`,
      entries: [
        { account: '1100 Accounts Receivable', debit: newInv.amount, credit: 0 },
        { account: revAcct, debit: 0, credit: newInv.amount },
      ],
    });
  };

  const exportCSV = () => {
    const rows = [['Customer','Invoice #','Amount','Paid','Remaining','Invoice Date','Due Date','Terms','Category','Status','Description']];
    filtered.forEach(i => rows.push([i.customer, i.invoiceNum||'', i.amount, i.amountPaid||0, i.amount-(i.amountPaid||0), i.invoiceDate||'', i.dueDate, i.terms||'', i.category, i.status, i.description||'']));
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `AR_Invoices_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  };

  const today = new Date().toISOString().slice(0, 10);
  const filtered = invoices.filter(i => {
    if (customerFilter && i.customer !== customerFilter) return false;
    if (filter === 'unpaid') return i.status === 'Unpaid' || i.status === 'Partial';
    if (filter === 'overdue') return i.status === 'Overdue';
    if (filter === 'paid') return i.status === 'Paid';
    if (filter === 'partial') return i.status === 'Partial';
    if (filter === 'writtenoff') return i.status === 'Written Off';
    return true;
  }).sort((a, b) => {
    if (sortBy === 'due') return a.dueDate.localeCompare(b.dueDate);
    if (sortBy === 'amount') return b.amount - a.amount;
    return a.customer.localeCompare(b.customer);
  });

  const totalOutstanding = invoices.filter(i => i.status !== 'Paid' && i.status !== 'Written Off').reduce((s, i) => s + i.amount - (i.amountPaid || 0), 0);
  const totalOverdue = invoices.filter(i => i.status === 'Overdue').reduce((s, i) => s + i.amount - (i.amountPaid || 0), 0);
  const totalCollected = invoices.reduce((s, i) => s + (i.amountPaid || 0), 0);
  const dueThisWeek = invoices.filter(i => {
    if (i.status === 'Paid' || i.status === 'Written Off') return false;
    const d = new Date(i.dueDate); const now = new Date(); const weekOut = new Date(now.getTime() + 7 * 86400000);
    return d >= now && d <= weekOut;
  }).reduce((s, i) => s + i.amount - (i.amountPaid || 0), 0);

  const statusColor = statusColorShared;
  const fmt = (n) => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const dark = useDarkMode();
  const inputStyle = sharedInputStyle(dark);
  const lblStyle = sharedLblStyle;
  const selStyle = {padding:'6px 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background: dark ? 'var(--surface2)' : '#fff', color:'var(--text)', fontSize:13};
  const tabStyle = (active) => ({ padding:'8px 20px', borderRadius:'var(--radius-sm) var(--radius-sm) 0 0', border:`1px solid ${active ? 'var(--brand-tan)' : 'var(--border)'}`, borderBottom: active ? '2px solid var(--brand-tan)' : '1px solid var(--border)', background: active ? 'var(--brand-tan)' : 'transparent', color: active ? 'var(--brand-green)' : 'var(--text-muted)', fontWeight: active ? 600 : 400, fontSize:13, cursor:'pointer' });

  // Aging buckets
  const agingData = (() => {
    const customers = {};
    invoices.filter(i => i.status !== 'Paid' && i.status !== 'Written Off').forEach(i => {
      if (!customers[i.customer]) customers[i.customer] = { current: 0, d30: 0, d60: 0, d90: 0, d90p: 0, total: 0 };
      const rem = i.amount - (i.amountPaid || 0);
      const days = Math.max(0, Math.ceil((new Date() - new Date(i.dueDate)) / 86400000));
      const c = customers[i.customer];
      if (days <= 0 || new Date(i.dueDate) >= new Date()) c.current += rem;
      else if (days <= 30) c.d30 += rem;
      else if (days <= 60) c.d60 += rem;
      else if (days <= 90) c.d90 += rem;
      else c.d90p += rem;
      c.total += rem;
    });
    return Object.entries(customers).map(([customer, d]) => ({ customer, ...d })).sort((a, b) => b.total - a.total);
  })();
  const agingTotals = agingData.reduce((t, r) => ({ current: t.current+r.current, d30: t.d30+r.d30, d60: t.d60+r.d60, d90: t.d90+r.d90, d90p: t.d90p+r.d90p, total: t.total+r.total }), { current:0, d30:0, d60:0, d90:0, d90p:0, total:0 });

  // Customer summary
  const customerData = (() => {
    const customers = {};
    invoices.forEach(i => {
      if (!customers[i.customer]) customers[i.customer] = { billed: 0, collected: 0, outstanding: 0, count: 0, paidDays: [], writtenOff: 0 };
      const c = customers[i.customer];
      c.billed += i.amount; c.count++;
      if (i.status === 'Written Off') { c.writtenOff += i.amount - (i.amountPaid || 0); c.collected += (i.amountPaid || 0); }
      else { c.collected += (i.amountPaid || 0); c.outstanding += i.amount - (i.amountPaid || 0); }
      if (i.paidDate && i.invoiceDate) c.paidDays.push(Math.ceil((new Date(i.paidDate) - new Date(i.invoiceDate)) / 86400000));
    });
    return Object.entries(customers).map(([customer, d]) => ({ customer, ...d, avgDays: d.paidDays.length ? Math.round(d.paidDays.reduce((a,b)=>a+b,0)/d.paidDays.length) : null })).sort((a, b) => b.outstanding - a.outstanding);
  })();

  return (
    <div className="tool-container" style={{maxWidth:960}}>
      <PageHeader accent={theme.accent}>
        <h2 className="tool-title" style={{color: '#fff'}}>Accounts Receivable</h2>
        <p style={{fontSize:13, color:'rgba(255,255,255,0.7)', margin:'4px 0 0'}}>{theme.whyItMatters}</p>

        {/* Summary Cards */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(170px, 1fr))', gap:12, marginBottom:20}}>
          {[
            { label: 'Outstanding', value: fmt(totalOutstanding), color: 'var(--brand-tan)' },
            { label: 'Overdue', value: fmt(totalOverdue), color: 'var(--rust)' },
            { label: 'Due This Week', value: fmt(dueThisWeek), color: 'var(--copper)' },
            { label: 'Total Collected', value: fmt(totalCollected), color: 'var(--forest-green)' },
          ].map((card, i) => (
            <div key={i} style={{background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.2)', borderLeft:`4px solid ${card.color}`, borderRadius:'var(--radius-md)', padding:'12px 14px'}}>
              <div style={{fontSize:11, color:'rgba(255,255,255,0.7)', marginBottom:2}}>{card.label}</div>
              <div style={{fontSize:20, fontWeight:700, color: card.color}}>{card.value}</div>
            </div>
          ))}
        </div>
      </PageHeader>
      <ToolExplainer theme={theme} />

      {/* Tabs */}
      <div style={{display:'flex', gap:4, marginBottom:16}}>
        {[['invoices','Invoices'],['aging','Aging Report'],['customers','Customers']].map(([k,l]) => (
          <button key={k} onClick={() => { setArTab(k); if (k !== 'invoices') setCustomerFilter(null); }} style={tabStyle(arTab === k)}>{l}</button>
        ))}
      </div>

      {arTab === 'invoices' && <>
        {/* Controls */}
        <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
          <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={() => { resetForm(); setShowForm(true); }}>+ Create Invoice</button>
          <select value={filter} onChange={e => setFilter(e.target.value)} style={{...selStyle, maxWidth:180}}>
            <option value="all">All Invoices</option><option value="unpaid">Unpaid/Partial</option><option value="overdue">Overdue</option><option value="partial">Partial</option><option value="paid">Paid</option><option value="writtenoff">Written Off</option>
          </select>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{...selStyle, maxWidth:180}}>
            <option value="due">Sort by Due Date</option><option value="amount">Sort by Amount</option><option value="customer">Sort by Customer</option>
          </select>
          <TableIO data={filtered.map(i => ({Customer:i.customer, 'Invoice #':i.invoiceNum||'', Amount:i.amount, Paid:i.amountPaid||0, Remaining:i.amount-(i.amountPaid||0), 'Invoice Date':i.invoiceDate||'', 'Due Date':i.dueDate, Terms:i.terms||'', Category:i.category, Status:i.status, Description:i.description||''}))} filename={`AR_Invoices_${new Date().toISOString().slice(0,10)}`} onImportClick={() => { setShowImport(true); setImportText(''); setImportPreview(null); setImportError(''); }} />
          {customerFilter && <span style={{fontSize:12, color:'var(--brand-tan)', fontWeight:600}}>Customer: {customerFilter} <button onClick={() => setCustomerFilter(null)} style={{background:'none', border:'none', color:'#ef4444', cursor:'pointer', fontWeight:700}}>x</button></span>}
          <span style={{fontSize:12, color:'var(--text-muted)', marginLeft:'auto'}}>{filtered.length} invoice{filtered.length !== 1 ? 's' : ''}</span>
        </div>

        {/* Add/Edit Form */}
        {showForm && (
          <div style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:20, marginBottom:20}}>
            <h3 style={{margin:'0 0 16px', fontSize:16, fontWeight:600, color:'var(--text)'}}>{editId ? 'Edit Invoice' : 'Create New Invoice'}</h3>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12}}>
              <div>
                <label style={lblStyle}>Customer *</label>
                <input value={form.customer} onChange={e => setForm(f => ({...f, customer: e.target.value}))} placeholder="e.g. Acme Corp" list="ar-customers" style={inputStyle} />
                <datalist id="ar-customers">{customers.map(c => <option key={c} value={c} />)}</datalist>
              </div>
              <div>
                <label style={lblStyle}>Amount *</label>
                <input type="number" step="0.01" value={form.amount} onChange={e => setForm(f => ({...f, amount: e.target.value}))} placeholder="0.00" style={inputStyle} />
              </div>
              <div>
                <label style={lblStyle}>Invoice # (optional)</label>
                <input value={form.invoiceNum} onChange={e => setForm(f => ({...f, invoiceNum: e.target.value}))} placeholder="INV-001" style={inputStyle} />
              </div>
              <div>
                <label style={lblStyle}>Invoice Date</label>
                <input type="date" value={form.invoiceDate} onChange={e => handleInvDateChange(e.target.value)} style={inputStyle} />
              </div>
              <div>
                <label style={lblStyle}>Payment Terms</label>
                <select value={form.terms} onChange={e => handleTermsChange(e.target.value)} style={inputStyle}>
                  {TERMS_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div>
                <label style={lblStyle}>Due Date *{form.terms !== 'Custom' ? ' (auto)' : ''}</label>
                <input type="date" value={form.dueDate} onChange={e => setForm(f => ({...f, dueDate: e.target.value}))} style={inputStyle} readOnly={form.terms !== 'Custom'} />
              </div>
              <div>
                <label style={lblStyle}>Revenue Category</label>
                <select value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))} style={inputStyle}>
                  {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={lblStyle}>Description (optional)</label>
                <input value={form.description} onChange={e => setForm(f => ({...f, description: e.target.value}))} placeholder="Notes..." style={inputStyle} />
              </div>
              <div style={{display:'flex', flexDirection:'column', justifyContent:'flex-end'}}>
                <label style={{...lblStyle, display:'flex', alignItems:'center', gap:8, cursor:'pointer'}}>
                  <input type="checkbox" checked={form.recurring} onChange={e => setForm(f => ({...f, recurring: e.target.checked}))} />
                  Recurring
                </label>
                {form.recurring && (
                  <select value={form.frequency} onChange={e => setForm(f => ({...f, frequency: e.target.value}))} style={{...inputStyle, marginTop:4}}>
                    {FREQ_OPTIONS.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                )}
              </div>
              {editId && (
                <div>
                  <label style={lblStyle}>Status</label>
                  <select value={form.status} onChange={e => setForm(f => ({...f, status: e.target.value}))} style={inputStyle}>
                    {STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              )}
            </div>
            <div style={{display:'flex', gap:8, marginTop:16}}>
              <button className="tool-btn tool-btn-primary" style={{background:'var(--brand-green-light)', color:'var(--brand-tan)'}} onClick={handleSubmit}>{editId ? 'Update' : 'Create Invoice'}</button>
              <button className="tool-btn tool-btn-secondary" onClick={resetForm}>Cancel</button>
            </div>
          </div>
        )}

        {/* AR Import Panel */}
        {showImport && (
          <div className="tool-card" style={{borderTop: '2px solid ' + theme.accent, marginBottom: 16}}>
            <div style={{fontWeight:600, fontSize:14, marginBottom:12, color: theme.accent}}>Import Invoices from CSV</div>
            <div style={{fontSize:12, color:'var(--text-muted)', marginBottom:8}}>Required columns: <b>Customer</b>, <b>Amount</b>. Optional: Invoice Date, Due Date, Category, Invoice #, Description, Terms, Status.</div>
            <div style={{display:'flex', gap:12, alignItems:'center', marginBottom:8}}>
              <input type="file" accept=".csv,.txt" onChange={handleARImportFile} style={{fontSize:12}} />
            </div>
            <textarea value={importText} onChange={e => { setImportText(e.target.value); setImportPreview(null); }} placeholder={'Customer, Amount, Invoice Date, Due Date, Category, Invoice #, Description, Terms, Status\nAcme Corp, 5000, 2026-03-01, 2026-03-31, Service Revenue, INV-100, March consulting, Net 30, Unpaid'} rows={5} style={{width:'100%', fontFamily:'monospace', fontSize:12, padding:8, borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', background:'var(--surface2)', color:'var(--text)', resize:'vertical'}} />
            {importError && <div style={{color:'#ef4444', fontSize:12, marginTop:4, whiteSpace:'pre-wrap'}}>{importError}</div>}
            {importPreview && (
              <div style={{marginTop:8, maxHeight:200, overflow:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)'}}>
                <table style={{width:'100%', fontSize:11, borderCollapse:'collapse'}}>
                  <thead><tr style={{background:'var(--surface2)'}}>{['Customer','Amount','Inv Date','Due Date','Category','Invoice #','Status'].map(h => <th key={h} style={{padding:'4px 8px', textAlign:'left', borderBottom:'1px solid var(--border)'}}>{h}</th>)}</tr></thead>
                  <tbody>{importPreview.map((r,i) => <tr key={i}><td style={{padding:'4px 8px'}}>{r.customer}</td><td style={{padding:'4px 8px'}}>${r.amount.toFixed(2)}</td><td style={{padding:'4px 8px'}}>{r.invoiceDate}</td><td style={{padding:'4px 8px'}}>{r.dueDate}</td><td style={{padding:'4px 8px'}}>{r.category}</td><td style={{padding:'4px 8px'}}>{r.invoiceNum}</td><td style={{padding:'4px 8px'}}>{r.status}</td></tr>)}</tbody>
                </table>
              </div>
            )}
            <div style={{display:'flex', gap:8, marginTop:12}}>
              <button onClick={handleARImportPreview} style={{background:'var(--brand-green-light)', color:'var(--brand-tan)', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer', fontWeight:600}}>Preview Import</button>
              {importPreview && importPreview.length > 0 && (
                <button onClick={handleARImportConfirm} style={{background:'var(--brand-green-light)', color:'var(--brand-tan)', border:'none', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer', fontWeight:600}}>Confirm &amp; Post ({importPreview.length} invoices)</button>
              )}
              <button onClick={() => setShowImport(false)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', borderRadius:'var(--radius-sm)', padding:'8px 20px', fontSize:13, cursor:'pointer'}}>Cancel</button>
            </div>
          </div>
        )}

        {/* Delete Confirmation Modal */}
        {deleteConfirmId && (() => {
          const d = invoices.find(x => x.id === deleteConfirmId);
          return (
            <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center'}} onClick={() => setDeleteConfirmId(null)}>
              <div onClick={e => e.stopPropagation()} style={{background: dark ? 'var(--surface2)' : '#fff', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:28, maxWidth:420, width:'90%', textAlign:'center'}}>
                <div style={{fontSize:36, marginBottom:8}}>&#9888;</div>
                <h3 style={{margin:'0 0 8px', fontSize:17, fontWeight:700, color:'var(--text)'}}>Delete Invoice?</h3>
                <p style={{fontSize:13, color:'var(--text-muted)', margin:'0 0 20px', lineHeight:1.5}}>Are you sure you want to permanently delete {d ? `the invoice for ${d.customer}` : 'this invoice'}? This action cannot be undone. All associated GL entries will also be removed.</p>
                <div style={{display:'flex', gap:10, justifyContent:'center'}}>
